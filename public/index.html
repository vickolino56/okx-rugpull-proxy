<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rug Pull Detector</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #080c12; color: #e0e0e0; min-height: 100vh; padding-bottom: 40px; }
  a { color: inherit; text-decoration: none; }

  .header { background: #0a0e16; border-bottom: 0.5px solid #1a2030; padding: 12px 24px; display: flex; align-items: center; margin-bottom: 24px; }
  .header-logo { width: 30px; height: 30px; background: linear-gradient(135deg, #1D9E75, #378ADD); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0; }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .header-title { font-size: 14px; font-weight: 500; color: #fff; }
  .header-sub { font-size: 10px; color: #444; }

  .container { max-width: 780px; margin: 0 auto; padding: 0 20px; }
  .card { background: #0d1117; border: 0.5px solid #1e2530; border-radius: 12px; padding: 14px 16px; margin-bottom: 12px; }
  .card-title { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }

  .search-wrap { display: flex; gap: 10px; align-items: center; }
  .search-input { flex: 1; font-size: 13px; padding: 10px 14px; border-radius: 8px; border: 0.5px solid #1e2530; outline: none; color: #e0e0e0; background: #060a10; font-family: inherit; }
  .search-input.error { border-color: #E24B4A55; }
  .search-btn { padding: 10px 22px; border-radius: 8px; background: #1D9E75; color: #fff; font-size: 13px; font-weight: 500; border: none; cursor: pointer; white-space: nowrap; }
  .search-btn:disabled { background: #1a2030; cursor: not-allowed; }
  .input-error { font-size: 11px; color: #E24B4A; margin-top: 6px; padding: 0 2px; }

  .history-wrap { margin-top: 10px; display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .history-label { font-size: 10px; color: #444; flex-shrink: 0; }
  .history-btn { font-size: 11px; padding: 3px 8px; border-radius: 5px; border: 0.5px solid #1e2530; background: #060a10; color: #666; cursor: pointer; max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .history-btn:hover { color: #999; border-color: #2a3040; }

  .loading { text-align: center; padding: 48px 0; color: #444; font-size: 13px; }
  .spinner { width: 28px; height: 28px; border: 2px solid #1e2530; border-top: 2px solid #1D9E75; border-radius: 50%; margin: 0 auto 14px; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-box { background: #1a0808; border: 0.5px solid rgba(226,75,74,0.2); border-radius: 12px; padding: 24px; text-align: center; margin-bottom: 12px; }
  .error-title { font-size: 14px; font-weight: 500; color: #E24B4A; margin-bottom: 6px; }
  .error-msg { font-size: 12px; color: #884444; line-height: 1.6; }

  .not-found-box { background: #0d1117; border: 1.5px solid #EF9F27; border-radius: 14px; padding: 20px; margin-bottom: 12px; }
  .not-found-title { font-size: 15px; font-weight: 500; color: #EF9F27; margin-bottom: 6px; }
  .not-found-msg { font-size: 12px; color: #888; line-height: 1.7; margin-bottom: 16px; }
  .steps-box { background: #060a10; border: 0.5px solid #1e2530; border-radius: 10px; padding: 14px 16px; margin-bottom: 14px; }
  .steps-title { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
  .step { display: flex; gap: 10px; margin-bottom: 10px; }
  .step:last-child { margin-bottom: 0; }
  .step-num { width: 20px; height: 20px; border-radius: 50%; background: #EF9F2722; border: 0.5px solid #EF9F2755; color: #EF9F27; font-size: 10px; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
  .step-title { font-size: 12px; font-weight: 500; color: #e0e0e0; margin-bottom: 2px; }
  .step-desc { font-size: 11px; color: #666; line-height: 1.5; }
  .not-found-links { display: flex; gap: 8px; flex-wrap: wrap; }
  .nf-btn { font-size: 12px; padding: 7px 14px; border-radius: 8px; border: 0.5px solid; cursor: pointer; display: inline-block; }

  /* CONSOLIDATED CARD */
  .consolidated-card { border-radius: 12px; padding: 16px 18px; margin-bottom: 12px; border: 1.5px solid; }
  .consolidated-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
  .consolidated-left { flex: 1; }
  .consolidated-meta { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; font-weight: 500; }
  .consolidated-title { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
  .consolidated-stats { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 0.5px solid #1e253088; }
  .consolidated-stat-label { font-size: 10px; color: #555; margin-bottom: 2px; }
  .consolidated-stat-value { font-size: 14px; font-weight: 500; }

  .risk-badge { display: flex; flex-direction: column; align-items: center; gap: 6px; flex-shrink: 0; }
  .risk-badge-pill { padding: 6px 14px; border-radius: 20px; font-size: 11px; font-weight: 600; border: 1.5px solid; white-space: nowrap; text-align: center; }

  .critical-points { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
  .critical-point { display: flex; align-items: center; gap: 5px; font-size: 11px; padding: 4px 9px; border-radius: 5px; border: 0.5px solid; }
  .critical-point-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

  .pool-status-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
  .pool-status-row { display: flex; align-items: center; gap: 8px; font-size: 11px; padding: 6px 10px; border-radius: 6px; background: #060a1066; }
  .pool-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .pool-row-link { color: #555; font-family: monospace; font-size: 10px; text-decoration: underline; text-decoration-color: #2a3040; }
  .pool-row-link:hover { color: #888; }

  /* CONTEXT BADGE */
  .context-note { font-size:10px; color:#378ADD; background:#378ADD11; border:0.5px solid #378ADD33; border-radius:4px; padding:2px 6px; white-space:nowrap; flex-shrink:0; }

  /* CONTEXT BADGE — shown on secondary pools of healthy tokens */
  .context-note { font-size: 10px; color: #378ADD; background: #378ADD11; border: 0.5px solid #378ADD33; border-radius: 4px; padding: 2px 6px; white-space: nowrap; flex-shrink: 0; }

  .token-strip { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 10px 12px; background: #060a1088; border: 0.5px solid #1e2530; border-radius: 8px; flex-wrap: wrap; margin-top: 12px; }
  .token-strip-name { font-size: 12px; font-weight: 500; color: #e0e0e0; }
  .token-strip-addr { font-size: 10px; color: #7F77DD; font-family: monospace; word-break: break-all; margin-top: 2px; }
  .token-strip-links { display: flex; gap: 6px; flex-shrink: 0; flex-wrap: wrap; }
  .token-strip-link { font-size: 11px; padding: 3px 9px; border-radius: 5px; border: 0.5px solid #1e2530; color: #666; background: #060a10; white-space: nowrap; }
  .token-strip-link:hover { color: #999; }

  .conclusion-inline { border-radius: 10px; padding: 14px 16px; margin-top: 12px; border: 0.5px solid #1e2530; background: #060a1088; }
  .conclusion-inline-title { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .conclusion-inline-text { font-size: 12px; color: #ccc; line-height: 1.8; margin-bottom: 10px; }
  .conclusion-inline-client { padding-top: 10px; border-top: 0.5px solid #1e2530; }
  .conclusion-inline-client-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; font-weight: 600; }
  .conclusion-inline-client-text { font-size: 12px; line-height: 1.7; }

  /* RECOMMENDED POOLS — shown when there are good pools */
  .recommended-pools { margin-top: 10px; padding-top: 10px; border-top: 0.5px solid #1e2530; }
  .recommended-pools-label { font-size: 10px; color: #1D9E75; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; font-weight: 600; }
  .recommended-pool-row { display: flex; align-items: center; gap: 8px; font-size: 11px; padding: 5px 8px; border-radius: 5px; background: #081a1288; border: 0.5px solid #1D9E7533; margin-bottom: 4px; }

  .concl-copy-btn { width: 100%; padding: 9px; border-radius: 8px; border: 0.5px solid #1e2530; background: #060a10; color: #555; font-size: 11px; cursor: pointer; margin-top: 12px; }
  .concl-copy-btn:hover { color: #999; }
  .concl-copy-btn.copied { border-color: #1D9E75; color: #1D9E75; background: #081a12; }

  .pair-tabs-wrap { margin-bottom: 12px; }
  .pair-tabs-header { display: flex; border-bottom: 0.5px solid #1e2530; overflow-x: auto; }
  .pair-tab { padding: 9px 16px; font-size: 12px; cursor: pointer; border-bottom: 2px solid transparent; color: #555; white-space: nowrap; display: flex; align-items: center; gap: 6px; transition: color 0.15s; }
  .pair-tab:hover { color: #999; }
  .pair-tab.active { color: #e0e0e0; border-bottom-color: #1D9E75; }
  .pair-tab.tab-rug.active  { border-bottom-color: #E24B4A; color: #E24B4A; }
  .pair-tab.tab-crit.active { border-bottom-color: #E24B4A; color: #E24B4A; }
  .pair-tab.tab-high.active { border-bottom-color: #EF9F27; color: #EF9F27; }
  .pair-tab.tab-med.active  { border-bottom-color: #7F77DD; color: #7F77DD; }
  .pair-tab-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .pair-tab-content { display: none; }
  .pair-tab-content.active { display: block; padding-top: 12px; }

  .diag-box { background: #0a0e16; border-radius: 14px; padding: 18px 20px; margin-bottom: 12px; }
  .diag-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 14px; gap: 12px; }
  .diag-label { font-size: 10px; color: #555; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
  .diag-title { font-size: 20px; font-weight: 500; margin-bottom: 4px; }
  .diag-sub { font-size: 12px; color: #888; }
  .pool-risk-badge { padding: 5px 12px; border-radius: 16px; font-size: 11px; font-weight: 600; border: 1.5px solid; white-space: nowrap; flex-shrink: 0; }

  /* SECONDARY POOL NOTICE */
  .secondary-pool-notice { background: #0a1a2a; border: 0.5px solid #378ADD33; border-radius: 8px; padding: 10px 14px; margin-bottom: 12px; font-size: 11px; color: #378ADD; line-height: 1.6; }

  /* EXPAND POOLS BUTTON */
  .expand-pools-btn { width:100%; padding:8px; border-radius:8px; border:0.5px solid #1e2530; background:#060a10; color:#555; font-size:11px; cursor:pointer; margin-top:4px; }
  .expand-pools-btn:hover { color:#999; border-color:#2a3040; }
  .pool-rows-extra { display:none; }
  .pool-rows-extra.expanded { display:flex; flex-direction:column; gap:6px; }

  .flags { display: flex; flex-direction: column; gap: 5px; }
  .flag-item { display: flex; gap: 8px; align-items: flex-start; border-radius: 7px; padding: 8px 12px; }
  .flag-badge { font-size: 9px; font-weight: 500; padding: 2px 5px; border-radius: 3px; flex-shrink: 0; margin-top: 1px; white-space: nowrap; }
  .flag-tech { font-size: 10px; color: #555; margin-top: 2px; }

  .diag-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 14px; gap: 10px; }
  .reanalyze-btn { font-size: 11px; padding: 6px 12px; border-radius: 6px; border: 0.5px solid #1e2530; background: #060a10; color: #555; cursor: pointer; }
  .reanalyze-btn:hover { color: #999; }
  .copy-btn { font-size: 11px; padding: 6px 14px; border-radius: 6px; border: 0.5px solid #1e2530; background: #060a10; color: #666; cursor: pointer; }
  .copy-btn.copied { border-color: #1D9E75; color: #1D9E75; background: #081a12; }
  .data-ts { font-size: 10px; color: #333; }

  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .grid4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; }

  .stat { background: #060a10; border: 0.5px solid #1e2530; border-radius: 8px; padding: 10px 12px; }
  .stat-label { font-size: 10px; color: #555; margin-bottom: 3px; }
  .stat-value { font-size: 14px; font-weight: 500; color: #e0e0e0; }
  .stat.alert-yellow { border-color: #EF9F2744; background: #1f1208; }
  .stat.alert-red { border-color: #E24B4A44; background: #200808; }

  .rug-confirm-hint { background: #130808; border: 0.5px solid #5a151533; border-radius: 8px; padding: 12px 14px; margin-top: 8px; font-size: 11px; color: #999; line-height: 1.8; }
  .rug-confirm-hint strong { color: #e0e0e0; }
  .rug-confirm-hint ol { margin: 8px 0 8px 16px; }
  .rug-confirm-hint ol li { margin-bottom: 4px; }
  .rug-confirm-link { color: #E24B4A; text-decoration: underline; }

  .liq-disclaimer { font-size: 10px; color: #444; margin-top: 8px; }
  .liq-disclaimer a { color: #555; text-decoration: underline; }

  .bar-wrap { height: 4px; border-radius: 2px; background: #1e2530; overflow: hidden; margin-top: 6px; }
  .bar-fill { height: 100%; border-radius: 2px; }
  .buysell-wrap { margin-top: 10px; }
  .buysell-labels { display: flex; justify-content: space-between; font-size: 10px; color: #555; margin-bottom: 3px; }
  .buysell-bar { height: 4px; border-radius: 2px; background: #3a1a1a; overflow: hidden; }
  .buysell-fill { height: 100%; background: #1D9E75; border-radius: 2px; }

  .supply-inner { background: #060a10; border: 0.5px solid #1e2530; border-radius: 8px; padding: 12px 14px; }
  .supply-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .supply-text { font-size: 12px; font-weight: 500; margin-bottom: 2px; }
  .supply-sub { font-size: 11px; color: #555; }
  .supply-pct { font-size: 18px; font-weight: 500; flex-shrink: 0; margin-left: 12px; }
  .supply-foot { display: flex; justify-content: space-between; font-size: 10px; color: #444; margin-top: 4px; }

  .footer { text-align: center; font-size: 10px; color: #1e2530; margin-top: 8px; }
  .liq-big { font-size: 20px; font-weight: 500; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-logo">R</div>
    <div>
      <div class="header-title">Rug Pull Detector <span style="font-size:10px;color:#444;font-weight:400">v5.7</span></div>
      <div class="header-sub">Token Risk Analyzer · Solana</div>
    </div>
  </div>
</div>

<div class="container">
  <div class="card">
    <div class="search-wrap">
      <input class="search-input" id="addressInput" placeholder="Cole o contract address do token Solana..." />
      <button class="search-btn" id="analyzeBtn" onclick="analyze()">Analisar →</button>
    </div>
    <div id="inputError" class="input-error" style="display:none"></div>
    <div class="history-wrap" id="historyWrap" style="display:none">
      <span class="history-label">Recentes:</span>
      <div id="historyList" style="display:flex;gap:6px;flex-wrap:wrap"></div>
    </div>
  </div>
  <div id="result"></div>
  <div class="footer">Feito por Vinicius Fernandes · Solana</div>
</div>

<script>
var currentToken = null;
var analysisTime = null;
var currentAddress = null;
var sessionHistory = [];
var allPairsData = [];
var PROXY_BASE = 'https://okx-rugpull-proxy.vercel.app';

// ─────────────────────────────────────────────
// UTILITIES
// ─────────────────────────────────────────────
function isValidSolanaAddress(a){return /^[1-9A-HJ-NP-Za-km-z]{32,44}$/.test(a);}
function fmt(n){
  if(n==null||isNaN(n)) return '—';
  if(n>=1e6) return '$'+(n/1e6).toFixed(2)+'M';
  if(n>=1e3) return '$'+(n/1e3).toFixed(2)+'K';
  return '$'+Number(n).toFixed(2);
}
function pct(n){if(n==null) return '—'; var v=Number(n).toFixed(2); return (Number(v)>0?'+':'')+v+'%';}
function pctColor(v){if(v==null) return '#666'; return Number(v)>=0?'#1D9E75':'#E24B4A';}
function timeAgo(ts){
  if(!ts) return '—';
  var diff=Date.now()-ts,d=Math.floor(diff/86400000),h=Math.floor(diff/3600000),m=Math.floor(diff/60000);
  if(d>0) return d+(d>1?' dias':' dia')+' atrás';
  if(h>0) return h+(h>1?' horas':' hora')+' atrás';
  return m+' min atrás';
}
function ageDays(ts){return ts?(Date.now()-ts)/86400000:999;}
function shortAddr(a){if(!a) return '—'; return a.substring(0,6)+'...'+a.substring(a.length-4);}

// ─────────────────────────────────────────────
// HISTORY
// ─────────────────────────────────────────────
function addToHistory(addr,name,sym){
  sessionHistory=sessionHistory.filter(function(h){return h.addr!==addr;});
  sessionHistory.unshift({addr:addr,label:(sym||addr.substring(0,8)+'...')+(name?' · '+name.substring(0,12):'')});
  if(sessionHistory.length>5) sessionHistory=sessionHistory.slice(0,5);
  renderHistory();
}
function renderHistory(){
  if(sessionHistory.length===0){document.getElementById('historyWrap').style.display='none';return;}
  document.getElementById('historyWrap').style.display='flex';
  document.getElementById('historyList').innerHTML=sessionHistory.map(function(h){
    return '<button class="history-btn" title="'+h.addr+'" onclick="loadHistory(\''+h.addr+'\')">'+h.label+'</button>';
  }).join('');
}
function loadHistory(addr){document.getElementById('addressInput').value=addr;analyze();}

// ─────────────────────────────────────────────
// RISK LEVELS
// ─────────────────────────────────────────────
var RISK_LEVELS=[
  {min:100,label:'Possível Fraude',   color:'#E24B4A',level:'FRAUD'},
  {min:75, label:'Risco Crítico',     color:'#E24B4A',level:'CRIT' },
  {min:46, label:'Alto Risco',        color:'#EF9F27',level:'HIGH' },
  {min:21, label:'Atenção',           color:'#7F77DD',level:'MED'  },
  {min:0,  label:'Sem Risco Aparente',color:'#1D9E75',level:'OK'   },
];
function scoreToLevel(score){
  for(var i=0;i<RISK_LEVELS.length;i++) if(score>=RISK_LEVELS[i].min) return RISK_LEVELS[i];
  return RISK_LEVELS[RISK_LEVELS.length-1];
}
function riskBadge(lv,large){
  var size=large?'font-size:13px;padding:8px 18px':'font-size:11px;padding:5px 12px';
  return '<div class="risk-badge"><div class="risk-badge-pill" style="color:'+lv.color+';border-color:'+lv.color+'44;background:'+lv.color+'11;'+size+'">'+lv.label+'</div></div>';
}

// ─────────────────────────────────────────────
// TOKEN CONTEXT THRESHOLDS
// totalLiq > HIGH_LIQ_THRESHOLD → secondary pools get downgraded flags
// ─────────────────────────────────────────────
var HIGH_LIQ_THRESHOLD   = 500000;  // $500K total → relativize pools < $5K
var MEDIUM_LIQ_THRESHOLD = 100000;  // $100K total → mild relativization

// ─────────────────────────────────────────────
// FLAGS + SCORE
// ctx = { totalLiq, isHighLiqToken, isMedLiqToken, isSecondaryPool }
// ─────────────────────────────────────────────
var FLAG_DEFS={
  LIQ_HI:   {weight:35,level:'HIGH'},
  LIQ_MED:  {weight:15,level:'MED'},
  LIQ_SEC:  {weight:8, level:'MED'},   // secondary pool on healthy token
  VOL:      {weight:20,level:'HIGH'},
  AGE_HI:   {weight:25,level:'HIGH'},
  AGE_MED:  {weight:10,level:'MED'},
  DUMP:     {weight:25,level:'HIGH'},
  SELL:     {weight:15,level:'HIGH'},
  ABANDON:  {weight:20,level:'HIGH'},
  PUMP:     {weight:10,level:'MED'},
  SUPPLY:   {weight:5, level:'MED'},
  DEAD:     {weight:20,level:'HIGH'},
  PUMP_DUMP:{weight:30,level:'HIGH'},
  LIQ_MCAP: {weight:15,level:'HIGH'},
  FDV_LIQ:  {weight:20,level:'HIGH'},
  NEAR_ZERO:{weight:10,level:'MED'},
  SPREAD:   {weight:15,level:'HIGH'},
  MAKERS:   {weight:20,level:'HIGH'},
};
var MAX_RAW=293;
var LEVEL_FLOOR={HIGH:46,MED:21,OK:0};

function getScoreAndFlags(liq,vol,buys,sells,fdv,mkt,pairCreatedAt,pc24,liqBase,liqQuote,makers,ctx){
  var flags=[],rawScore=0;
  var total=buys+sells;
  var sellRatio=total>0?(sells/total)*100:50;
  var buyRatio =total>0?(buys/total)*100:50;
  var age=ageDays(pairCreatedAt);
  var pc24n=pc24!=null?Number(pc24):null;
  var isHighLiq = ctx && ctx.isHighLiqToken;
  var isMedLiq  = ctx && ctx.isMedLiqToken;
  var isSecondary = ctx && ctx.isSecondaryPool;

  function add(key,agent,tech){rawScore+=FLAG_DEFS[key].weight;flags.push({key:key,agent:agent,tech:tech});}

  // RUG — absolute, never relativized
  if(liq<5){
    flags.push({key:'RUG',agent:'A liquidez deste pool é praticamente zero ('+fmt(liq)+'). O cliente não conseguirá vender nesta pool — liquidez possivelmente removida.',tech:'Liquidez menor que $5.'});
    return {rawScore:100,flags:flags};
  }

  // LIQUIDITY FLAGS — context-aware
  if(liq<1000){
    if(isHighLiq && isSecondary){
      // This is a small pool on a large token — downgrade to informational
      add('LIQ_SEC',
        'Esta é uma pool secundária com liquidez baixa ('+fmt(liq)+'). O token possui liquidez significativa em outras pools — o cliente deve utilizar as pools principais para venda.',
        'Pool secundária com '+fmt(liq)+' de liquidez. Token tem '+fmt(ctx.totalLiq)+' no total.');
    } else if(isMedLiq && isSecondary){
      add('LIQ_MED',
        'Liquidez baixa nesta pool ('+fmt(liq)+'). Verifique as outras pools do token para encontrar melhores condições de venda.',
        'Liquidez crítica de '+fmt(liq)+' nesta pool.');
    } else {
      add('LIQ_HI','Liquidez insuficiente para qualquer troca. A venda pode falhar ou resultar em grande perda de valor.','Liquidez crítica de '+fmt(liq)+'.');
    }
  } else if(liq<5000){
    if(isHighLiq && isSecondary){
      add('LIQ_SEC',
        'Pool secundária com liquidez limitada ('+fmt(liq)+'). O token possui pools principais com liquidez muito maior — prefira essas para execução da venda.',
        'Pool secundária com '+fmt(liq)+'. Token total: '+fmt(ctx.totalLiq)+'.');
    } else {
      add('LIQ_MED','Liquidez baixa — o cliente pode conseguir vender mas receberá menos do que o valor exibido.','Liquidez de '+fmt(liq)+'.');
    }
  }

  // VOLUME DESPROPORCIONAL — only flag if not clearly explained by large token activity
  if(vol>liq*10 && !(isHighLiq && liq>50000)){
    add('VOL','Volume desproporcional à liquidez — possíveis transações artificiais para simular atividade.','Volume 24h ('+fmt(vol)+') é '+Math.round(vol/liq)+'x maior que a liquidez.');
  }

  // IDADE
  if(age<1) add('AGE_HI','Token criado há menos de 24 horas. Histórico insuficiente para avaliação.','Par criado há '+timeAgo(pairCreatedAt)+'.');
  else if(age<7) add('AGE_MED','Token com menos de 7 dias de existência. Histórico limitado.','Par criado há '+timeAgo(pairCreatedAt)+'.');

  // DUMP — always relevant
  if(pc24n!=null&&pc24n<=-90) add('DUMP','Queda de '+Math.abs(pc24n).toFixed(1)+'% nas últimas 24h — possível dump em andamento ou rug pull em curso.','Variação 24h: '+pct(pc24)+'.');

  // PRESSÃO VENDEDORA — less concerning on large tokens (normal market activity)
  if(sellRatio>80&&total>0&&!isHighLiq) add('SELL','Mais de 80% das transações são vendas. Pressão vendedora anormal.', Math.round(sellRatio)+'% das transações são vendas.');

  // POOL ABANDONADA — only flag if not a large token (large tokens have many pools, some less active)
  if(total===0&&!isHighLiq) add('ABANDON','Nenhuma transação nas últimas 24h. Pool inativa.','Zero transações nas últimas 24h.');

  // PUMP — only concerning if not large token
  if(buyRatio>90&&total>0&&!isHighLiq) add('PUMP','Quase todas as transações são compras. Possível pump artificial.',Math.round(buyRatio)+'% das transações são compras.');

  // SUPPLY
  if(fdv>0&&mkt>0&&Math.abs(fdv-mkt)/fdv<0.01) add('SUPPLY','100% do supply já está em circulação. O criador pode vender qualquer quantidade sem restrições.','FDV igual ao Market Cap.');

  // TOKEN MORTO — only for isolated tokens
  if(vol<500&&age>7&&total<50&&!isHighLiq&&!isMedLiq) add('DEAD','Volume extremamente baixo para um token com mais de 7 dias. Pool praticamente inativa.','Volume 24h de apenas '+fmt(vol)+' com '+total+' transações.');

  // PUMP & DUMP
  if(pc24n!=null&&pc24n<=-85&&vol<500&&age>7&&!isHighLiq) add('PUMP_DUMP','Padrão consistente com pump & dump: queda severa e volume próximo de zero.','Queda de '+Math.abs(pc24n).toFixed(1)+'% com volume de apenas '+fmt(vol)+'.');

  // LIQ vs MCAP — only for isolated tokens
  if(mkt>0&&liq>0&&liq<mkt*0.01&&!isHighLiq) add('LIQ_MCAP','A liquidez disponível é inferior a 1% do Market Cap. Qualquer venda de volume médio vai colapsar o preço.','Liquidez ('+fmt(liq)+') é apenas '+((liq/mkt)*100).toFixed(2)+'% do Market Cap.');

  // FDV vs LIQ
  if(fdv>0&&liq>0&&fdv>liq*1000&&!isHighLiq) add('FDV_LIQ','O valor total do token é mais de 1000x maior que a liquidez disponível.','FDV ('+fmt(fdv)+') é '+Math.round(fdv/liq)+'x maior que a liquidez.');

  // NEAR ZERO MCAP
  if(mkt>0&&mkt<100) add('NEAR_ZERO','Market Cap abaixo de $100. O token praticamente não possui valor de mercado.','Market Cap de apenas '+fmt(mkt)+'.');

  // SPREAD
  if(liqBase>0&&liqQuote>0){
    var br=(liqBase/(liqBase+liqQuote))*100;
    if(br>99) add('SPREAD','O pool contém quase exclusivamente tokens e muito pouco SOL. Qualquer venda vai colapsar o preço imediatamente.','Token representa '+br.toFixed(1)+'% da liquidez do pool.');
  }

  // MAKERS
  if(makers!=null&&makers<20&&age>7&&total>0&&!isHighLiq) add('MAKERS','Menos de 20 traders únicos nas últimas 24h. Atividade concentrada — possível wash trading.','Apenas '+makers+' traders únicos nas últimas 24h.');

  if(flags.length===0) flags.push({key:'OK',agent:'Nenhum sinal de alerta detectado nesta pool. Análise manual recomendada.',tech:'Nenhuma flag crítica detectada.'});

  return {rawScore:rawScore,flags:flags};
}

function normalizeScore(raw,flags){
  if(raw>=100) return 100;
  var normalized=Math.min(99,Math.round((raw/MAX_RAW)*99));
  var floor=0;
  flags.forEach(function(f){
    if(f.key==='RUG') return;
    var def=FLAG_DEFS[f.key];
    if(def){var lf=LEVEL_FLOOR[def.level]||0;if(lf>floor) floor=lf;}
  });
  return Math.max(normalized,floor);
}

// ─────────────────────────────────────────────
function getConsolidatedRisk(pairs){
  // First pass: calculate total liquidity
  var totalLiq=0;
  pairs.forEach(function(p){ totalLiq+=((p.liquidity&&p.liquidity.usd)||0); });
  var isHighLiqToken = totalLiq >= HIGH_LIQ_THRESHOLD;
  var isMedLiqToken  = totalLiq >= MEDIUM_LIQ_THRESHOLD;

  // Find the primary pool (highest liquidity)
  var primaryLiq = (pairs[0] && pairs[0].liquidity && pairs[0].liquidity.usd) || 0;

  var rugCount=0,weightedSum=0,totalWeight=0;
  var pairStatuses=[],allFlags=[];

  pairs.forEach(function(p,i){
    var liq=(p.liquidity&&p.liquidity.usd)||0;
    var vol=(p.volume&&p.volume.h24)||0;
    var buys=(p.txns&&p.txns.h24&&p.txns.h24.buys)||0;
    var sells=(p.txns&&p.txns.h24&&p.txns.h24.sells)||0;
    var fdv=p.fdv||0,mkt=p.marketCap||0;
    var pc24=p.priceChange&&p.priceChange.h24;
    var liqB=(p.liquidity&&p.liquidity.base)||0;
    var liqQ=(p.liquidity&&p.liquidity.quote)||0;
    var makers=p.makers!=null?p.makers:(p.txns&&p.txns.h24&&p.txns.h24.makers)||null;

    // A pool is "secondary" if the token has significant total liquidity
    // and this pool holds less than 10% of it
    var isSecondaryPool = isHighLiqToken && liq < (totalLiq * 0.1) && i > 0;

    var ctx={totalLiq:totalLiq,isHighLiqToken:isHighLiqToken,isMedLiqToken:isMedLiqToken,isSecondaryPool:isSecondaryPool};
    var result=getScoreAndFlags(liq,vol,buys,sells,fdv,mkt,p.pairCreatedAt,pc24,liqB,liqQ,makers,ctx);
    var score=normalizeScore(result.rawScore,result.flags);
    var lv=scoreToLevel(score);

    // Secondary pools on healthy tokens: cap their weight contribution
    var weight = isSecondaryPool ? 0.3 : (lv.level==='FRAUD'?3:lv.level==='CRIT'?2:1);
    weightedSum+=score*weight;
    totalWeight+=weight;
    if(lv.level==='FRAUD') rugCount++;

    result.flags.forEach(function(f){if(f.key!=='OK'&&allFlags.indexOf(f.key)<0) allFlags.push(f.key);});
    pairStatuses.push({
      dex:p.dexId||'—',pairAddr:p.pairAddress||'',liq:liq,
      level:lv,score:score,flags:result.flags,
      isSecondary:isSecondaryPool,ctx:ctx
    });
  });

  var total=pairs.length,activeCount=total-rugCount;
  var consolidatedScore,finalLevel,label;

  if(rugCount===total){
    consolidatedScore=100; finalLevel=scoreToLevel(100);
    label='Possível Fraude · Rug Pull Confirmado';
  } else {
    consolidatedScore=totalWeight>0?Math.min(99,Math.round(weightedSum/totalWeight)):0;

    // Apply floor only from flags that appear on PRIMARY pools
    // For high-liq tokens, cap floor at MED (45) so secondary pool issues never push consolidated to HIGH
    var floor=0;
    var floorCap = isHighLiqToken ? 45 : 999;
    allFlags.forEach(function(k){
      if(k==='RUG'||k==='LIQ_SEC') return;
      // Only raise floor if this flag appears on at least one non-secondary pool
      var onPrimary = pairStatuses.some(function(ps){
        return !ps.isSecondary && ps.flags.some(function(f){return f.key===k;});
      });
      if(!onPrimary && isHighLiqToken) return;
      var def=FLAG_DEFS[k];
      if(def){var lf=Math.min(LEVEL_FLOOR[def.level]||0,floorCap);if(lf>floor) floor=lf;}
    });
    consolidatedScore=Math.max(consolidatedScore,floor);

    // High-liq token with healthy primary pools: hard cap at Atenção (45)
    if(isHighLiqToken && rugCount===0){
      var top2healthy=pairStatuses.slice(0,2).every(function(ps){
        return ps.level.level==='OK'||ps.level.level==='MED';
      });
      if(top2healthy) consolidatedScore=Math.min(consolidatedScore,45);
    }

    finalLevel=scoreToLevel(consolidatedScore);
    if(rugCount>0){
      label='Rug Pull em '+rugCount+' Pool'+(rugCount>1?'s':'')+' · '+activeCount+' ainda ativa'+(activeCount>1?'s':'');
    } else {
      label=finalLevel.label;
    }
  }

  // Identify recommended pools (OK or MED level, liq >= $1000)
  var recommendedPools=pairStatuses.filter(function(ps){
    return (ps.level.level==='OK'||ps.level.level==='MED')&&ps.liq>=1000;
  });

  return {
    totalLiq,rugCount,totalPairs:total,activeCount,
    level:finalLevel,score:consolidatedScore,label,
    pairStatuses,allFlags,
    isHighLiqToken,isMedLiqToken,primaryLiq,recommendedPools
  };
}

function renderSupply(fdv,mkt){
  var diff=fdv-mkt,pctOut=fdv>0?(diff/fdv)*100:0;
  var isEqual=Math.abs(pctOut)<1;
  var color=isEqual?'#1D9E75':pctOut<20?'#1D9E75':pctOut<50?'#EF9F27':'#E24B4A';
  var label=isEqual?'100% do supply em circulação — nenhum token bloqueado'
    :pctOut<20?Math.round(pctOut)+'% fora de circulação — diferença pequena, risco baixo'
    :pctOut<50?Math.round(pctOut)+'% fora de circulação — quantidade relevante, monitorar'
    :Math.round(pctOut)+'% ainda não circula — risco alto de pressão vendedora futura';
  var barW=Math.min(100,Math.max(0,100-pctOut));
  return '<div class="supply-inner">'
    +'<div class="supply-row"><div><div class="supply-text" style="color:'+color+'">'+label+'</div>'
    +(!isEqual?'<div class="supply-sub">Estimado fora de circulação: '+fmt(diff>0?diff:0)+'</div>':'')
    +'</div><div class="supply-pct" style="color:'+color+'">'+(isEqual?'0%':Math.round(pctOut)+'%')+'</div></div>'
    +'<div class="bar-wrap"><div class="bar-fill" style="width:'+barW+'%;background:'+color+'"></div></div>'
    +'<div class="supply-foot"><span>Em circulação: '+fmt(mkt)+'</span><span>FDV total: '+fmt(fdv)+'</span></div>'
    +'</div>';
}

function statCard(l,v,c,a){

}

// ─────────────────────────────────────────────
// SMART CONCLUSION — context-aware
// ─────────────────────────────────────────────
function buildConclusion(risk){
  var flags=risk.allFlags;
  var hasGoodPools = risk.recommendedPools.length > 0;
  var rugCount = risk.rugCount;
  var total = risk.totalPairs;
  var isHighLiq = risk.isHighLiqToken;
  var primaryLiq = risk.primaryLiq;
  var conclusionText, clientLabel, clientColor, clientText;
  var recommendedHtml = '';

  // Build recommended pools section if applicable
  if(hasGoodPools && rugCount > 0){
    recommendedHtml = '<div class="recommended-pools">'
      +'<div class="recommended-pools-label">✓ Pools disponíveis para venda</div>'
      + risk.recommendedPools.map(function(ps,i){
          return '<div class="recommended-pool-row">'
            +'<div class="pool-dot" style="background:#1D9E75"></div>'
            +'<span style="color:#1D9E75">'+ps.dex+'</span>'
            +'<span style="color:#555;font-family:monospace;font-size:10px">'+shortAddr(ps.pairAddr)+'</span>'
            +'<span style="color:#1D9E75;margin-left:auto">'+fmt(ps.liq)+'</span>'
            +'</div>';
        }).join('')
      +'</div>';
  }

  // ── Scenario 1: All pools rug
  if(rugCount===total){
    conclusionText='Todas as '+total+' pools deste token tiveram a liquidez removida. O token existe na blockchain, mas não pode ser vendido em nenhuma exchange descentralizada no momento.';
    clientLabel='Não confirme a venda'; clientColor='#E24B4A';
    clientText='Informe ao cliente que a venda não é possível no momento. Isso não é uma limitação da OKX — é o estado atual do token na blockchain. Oriente com empatia que o valor não é recuperável nas condições atuais.';
  }

  // ── Scenario 2: High liquidity token — healthy primary pools
  else if(isHighLiq && hasGoodPools && rugCount===0 && risk.score < 46){
    var top5 = risk.pairStatuses.slice(0,5);
    var top5Liq = top5.reduce(function(s,ps){ return s+ps.liq; },0);
    var top5Pct = risk.totalLiq>0?((top5Liq/risk.totalLiq)*100).toFixed(1):'—';
    var goodPoolDesc = risk.recommendedPools.slice(0,3).map(function(ps){ return ps.dex+' ('+fmt(ps.liq)+')'; }).join(', ');
    conclusionText='As 5 principais pools concentram '+fmt(top5Liq)+' de '+fmt(risk.totalLiq)+' da liquidez total ('+top5Pct+'%). '
      +'Pools secundárias podem não ter liquidez suficiente para execução de vendas — oriente o cliente a utilizar as pools principais: '+goodPoolDesc+'.';
    clientLabel='Token saudável · Oriente sobre a pool correta'; clientColor='#1D9E75';
    clientText='O token possui liquidez suficiente para venda. Se o cliente estiver tentando vender em uma pool secundária com pouca liquidez, instrua-o a utilizar as pools recomendadas: '+goodPoolDesc+'.';
  }

  // ── Scenario 3: High liquidity token with some concerning flags
  else if(isHighLiq && hasGoodPools && risk.score < 75){
    var top5b = risk.pairStatuses.slice(0,5);
    var top5Liqb = top5b.reduce(function(s,ps){ return s+ps.liq; },0);
    var top5Pctb = risk.totalLiq>0?((top5Liqb/risk.totalLiq)*100).toFixed(1):'—';
    conclusionText='As 5 principais pools concentram '+fmt(top5Liqb)+' de '+fmt(risk.totalLiq)+' da liquidez total ('+top5Pctb+'%). '
      +'Algumas pools secundárias apresentam sinais de atenção, mas existem pools principais com boa liquidez disponíveis para venda.';
    clientLabel='Atenção · Oriente sobre a pool correta'; clientColor='#7F77DD';
    clientText='A venda pode ser realizada nas pools com boa liquidez. Verifique se o cliente está tentando vender em uma pool secundária e oriente-o a utilizar as pools principais do token.';
  }

  // ── Scenario 4: Partial rug — some pools dead, some alive
  else if(rugCount>0 && hasGoodPools){
    conclusionText=rugCount+' de '+total+' pools tiveram liquidez removida. Ainda há '+risk.recommendedPools.length+' pool'+(risk.recommendedPools.length>1?'s ativas com liquidez':' ativa com liquidez')+' disponível para venda.';
    clientLabel='Venda parcialmente possível · Oriente sobre a pool correta'; clientColor='#EF9F27';
    clientText='Informe ao cliente que a venda é possível apenas nas pools ativas. Verifique qual pool o cliente está utilizando — se for uma pool com liquidez removida, instrua-o a tentar em uma das pools disponíveis listadas acima.';
  }

  // ── Scenario 5: Partial rug — no good pools
  else if(rugCount>0 && !hasGoodPools){
    conclusionText=rugCount+' de '+total+' pools tiveram liquidez removida. As pools restantes apresentam liquidez insuficiente para executar uma venda sem colapsar o preço.';
    clientLabel='Não confirme a venda'; clientColor='#E24B4A';
    clientText='Informe ao cliente que a venda não é possível nas condições atuais. As pools com liquidez removida são inoperantes e as restantes têm liquidez insuficiente para uma venda sem grande perda de valor.';
  }

  // ── Scenario 6: Pump & Dump detected
  else if(flags.indexOf('PUMP_DUMP')>=0){
    conclusionText='Padrão consistente com pump & dump: queda severa de preço combinada com volume praticamente zerado. O token perdeu quase todo o valor desde o lançamento.';
    clientLabel='Alto Risco · Oriente o cliente sobre o valor real'; clientColor='#E24B4A';
    clientText='Informe ao cliente que o token apresenta padrão de pump & dump. A venda pode ser tentada, mas o valor obtido provavelmente será muito inferior ao exibido na carteira. O cliente deve estar ciente antes de prosseguir.';
  }

  // ── Scenario 7: Dead token + unbalanced pool
  else if(flags.indexOf('DEAD')>=0 && flags.indexOf('SPREAD')>=0){
    conclusionText='Token praticamente inativo com pool desequilibrada — quase sem SOL disponível como contraparte. Qualquer tentativa de venda provavelmente não será executável ou resultará em colapso imediato de preço.';
    clientLabel='Alto Risco · Venda improvável sem perda severa'; clientColor='#EF9F27';
    clientText='Informe ao cliente que o token tem volume extremamente baixo e a pool não tem SOL suficiente para absorver a venda. O valor obtido pode ser uma fração mínima do exibido na carteira.';
  }

  // ── Scenario 8: Dead token
  else if(flags.indexOf('DEAD')>=0){
    conclusionText='Token com volume irrisório e poucas transações para um token com mais de 7 dias. Pool comercialmente inativa — há liquidez, mas o interesse de mercado é praticamente inexistente.';
    clientLabel='Atenção · Oriente sobre liquidez baixa'; clientColor='#EF9F27';
    clientText='Informe ao cliente que o token tem pouca atividade de mercado. A venda pode ser tentada, mas o valor obtido pode ser inferior ao esperado devido à baixa liquidez disponível.';
  }

  // ── Scenario 9: Dump in progress
  else if(flags.indexOf('DUMP')>=0 && flags.indexOf('PUMP_DUMP')<0){
    conclusionText='Queda superior a 90% nas últimas 24h indica possível dump em andamento. O valor exibido na carteira pode ser muito diferente do que o cliente conseguirá resgatar.';
    clientLabel='Alto Risco · Não confirme valor de resgate'; clientColor='#E24B4A';
    clientText='Informe ao cliente que o token está em queda acentuada. Não confirme qualquer estimativa de valor — o preço de execução pode ser significativamente inferior ao atual.';
  }

  // ── Scenario 10: Wash trading
  else if(flags.indexOf('MAKERS')>=0 && flags.indexOf('VOL')>=0){
    conclusionText='Volume desproporcional gerado por um número muito pequeno de traders únicos. Padrão consistente com wash trading — atividade artificial entre carteiras do mesmo operador.';
    clientLabel='Atenção · Possível wash trading'; clientColor='#EF9F27';
    clientText='Informe ao cliente que a atividade do token pode ser artificial. O volume exibido não reflete interesse real de mercado, o que pode dificultar a execução de uma venda a preço justo.';
  }

  // ── Scenario 11: New token + pump
  else if(flags.indexOf('AGE_HI')>=0 && flags.indexOf('PUMP')>=0){
    conclusionText='Token criado há menos de 24 horas com quase 100% das transações sendo compras. Padrão típico de pump artificial em token recém-lançado — alto risco de queda abrupta.';
    clientLabel='Alto Risco · Token novíssimo em pump'; clientColor='#EF9F27';
    clientText='Informe ao cliente que o token tem menos de 24h de existência e apresenta sinais de pump artificial. Não há histórico suficiente e o risco de perda total é elevado.';
  }

  // ── Scenario 12: Critical score
  else if(risk.score>=75){
    conclusionText='Múltiplos sinais de risco crítico detectados neste token. A combinação de fatores indica alto potencial de perda para o cliente.';
    clientLabel='Risco Crítico · Não confirme a venda'; clientColor='#E24B4A';
    clientText='Não confirme qualquer estimativa de venda ou valor. Verifique manualmente as pools antes de orientar o cliente. Se não for possível confirmar a viabilidade, informe os riscos e deixe a decisão com ele.';
  }

  // ── Scenario 13: High risk
  else if(risk.score>=46){
    conclusionText='Sinais de alto risco detectados. A venda pode ser possível, mas com risco de perda significativa de valor.';
    clientLabel='Alto Risco · Oriente com cautela'; clientColor='#EF9F27';
    clientText='Oriente o cliente sobre os riscos antes de prosseguir. A venda pode ser tentada, mas o valor obtido pode ser inferior ao esperado. Não garanta o resultado.';
  }

  // ── Scenario 14: Attention
  else if(risk.score>=21){
    conclusionText='Alguns pontos de atenção detectados, sem sinais críticos confirmados. O token parece negociável mas com ressalvas.';
    clientLabel='Atenção · Informe os pontos detectados'; clientColor='#7F77DD';
    clientText='Informe o cliente sobre os pontos de atenção e prossiga normalmente se ele confirmar que deseja vender.';
  }

  // ── Default: OK
  else {
    conclusionText='Nenhum padrão de fraude ou risco elevado identificado. O token parece negociável nas condições atuais.';
    clientLabel='Sem risco aparente · Prossiga normalmente'; clientColor='#1D9E75';
    clientText='Os dados automáticos não indicam fraude. Prossiga normalmente com o atendimento ao cliente.';
  }

  return '<div class="conclusion-inline">'
    +'<div class="conclusion-inline-title">Conclusão</div>'
    +'<div class="conclusion-inline-text">'+conclusionText+'</div>'
    +(recommendedHtml)
    +'<div class="conclusion-inline-client">'
    +'<div class="conclusion-inline-client-label" style="color:'+clientColor+'">'+clientLabel+'</div>'
    +'<div class="conclusion-inline-client-text" style="color:'+clientColor+'cc">'+clientText+'</div>'
    +'</div>'
    +'</div>';
}

function renderConsolidatedCard(risk,tokenAddr,tokenName,tokenSym,dexUrl){
  var color=risk.level.color;

  var critFlags=risk.allFlags.filter(function(k){return k!=='LIQ_SEC';});
  var critHtml=critFlags.length>0
    ? critFlags.map(function(key){
        var fs=FLAG_STYLE[key]||FLAG_STYLE.OK;
        return '<div class="critical-point" style="background:'+fs.bg+';border-color:'+fs.border+'">'
          +'<div class="critical-point-dot" style="background:'+fs.color+'"></div>'
          +'<span style="color:'+fs.color+'">'+(FLAG_SHORT[key]||key)+'</span></div>';
      }).join('')
    : '';

  var VISIBLE_POOLS = 5;
  var poolRowHtml = function(ps,i){
    return '<div class="pool-status-row">'
      +'<div class="pool-dot" style="background:'+ps.level.color+'"></div>'
      +'<span style="color:#888">Pool '+(i+1)+' · '+ps.dex+'</span>'
      +'<a class="pool-row-link" href="https://solscan.io/account/'+ps.pairAddr+'" target="_blank">'+shortAddr(ps.pairAddr)+' ↗</a>'
      +(ps.isSecondary?'<span class="context-note">Secundária</span>':'')
      +'<span style="color:'+ps.level.color+';margin-left:auto">'+fmt(ps.liq)+' · '+ps.level.label+'</span>'
      +'</div>';
  };

  var visiblePools = risk.pairStatuses.slice(0, VISIBLE_POOLS);
  var extraPools   = risk.pairStatuses.slice(VISIBLE_POOLS);
  var poolRows = '<div class="pool-status-list">'
    + visiblePools.map(poolRowHtml).join('');

  if(extraPools.length > 0){
    poolRows += '<div class="pool-rows-extra" id="poolRowsExtra">'
      + extraPools.map(function(ps,i){ return poolRowHtml(ps, i+VISIBLE_POOLS); }).join('')
      + '</div>'
      + '<button class="expand-pools-btn" id="expandPoolsBtn" onclick="toggleExtraPools()">'
      + '↓ Ver mais '+extraPools.length+' pool'+(extraPools.length>1?'s':'')+' secundária'+(extraPools.length>1?'s':'')
      + '</button>';
  }
  poolRows += '</div>';

  return '<div class="consolidated-card" style="background:'+color+'0d;border-color:'+color+'55">'
    +'<div class="consolidated-top">'
    +'<div class="consolidated-left">'
    +'<div class="consolidated-meta" style="color:'+color+'">Diagnóstico Consolidado · '+risk.totalPairs+' pool'+(risk.totalPairs>1?'s encontradas':' encontrada')+'</div>'
    +'<div class="consolidated-title" style="color:'+color+'">'+risk.label+'</div>'
    +'</div>'
    +riskBadge(risk.level,true)
    +'</div>'
    +'<div class="consolidated-stats">'
    +'<div><div class="consolidated-stat-label">Liquidez total</div><div class="consolidated-stat-value" style="color:'+color+'">'+fmt(risk.totalLiq)+'</div></div>'
    +'<div><div class="consolidated-stat-label">Pools analisadas</div><div class="consolidated-stat-value">'+risk.totalPairs+'</div></div>'
    +(risk.rugCount>0?'<div><div class="consolidated-stat-label">Pools com rug</div><div class="consolidated-stat-value" style="color:#E24B4A">'+risk.rugCount+'</div></div>':'')
    +(risk.recommendedPools.length>0?'<div><div class="consolidated-stat-label">Pools recomendadas</div><div class="consolidated-stat-value" style="color:#1D9E75">'+risk.recommendedPools.length+'</div></div>':'')
    +'</div>'
    +(critHtml?'<div style="font-size:10px;color:#444;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px">Pontos críticos detectados</div><div class="critical-points">'+critHtml+'</div>':'')
    +poolRows
    +buildConclusion(risk)
    +'<div class="token-strip">'
    +'<div><div class="token-strip-name">'+tokenName+' · '+tokenSym+'</div><div class="token-strip-addr">'+tokenAddr+'</div></div>'
    +'<div class="token-strip-links">'
    +'<a class="token-strip-link" href="https://solscan.io/token/'+tokenAddr+'" target="_blank">Solscan ↗</a>'
    +'<a class="token-strip-link" href="'+(dexUrl||'#')+'" target="_blank">DexScreener ↗</a>'
    +'<a class="token-strip-link" href="https://web3.okx.com/pt-BR/token/solana/'+tokenAddr+'" target="_blank">OKX Web3 ↗</a>'
    +'</div></div>'
    +'<button class="concl-copy-btn" id="conclusionCopyBtn" onclick="copyConclusionNote()">Copiar diagnóstico para internal note</button>'
    +'</div>';
}

// ─────────────────────────────────────────────
function tabClass(lv){
  if(lv==='FRAUD') return 'tab-rug';
  if(lv==='CRIT')  return 'tab-crit';
  if(lv==='HIGH')  return 'tab-high';
  if(lv==='MED')   return 'tab-med';
  return '';
}

function renderPairTabs(pairs,risk,tokenAddr,fdv,mkt){
  var tabs='',contents='';
  pairs.forEach(function(p,i){
    var ps=risk.pairStatuses[i];
    tabs+='<div class="pair-tab '+tabClass(ps.level.level)+(i===0?' active':'')+'" onclick="switchTab('+i+')" id="tab-btn-'+i+'">'
      +'<div class="pair-tab-dot" style="background:'+ps.level.color+'"></div>'
      +'Pool '+(i+1)+' · '+(p.dexId||'—')+(ps.isSecondary?' <span style="font-size:9px;color:#378ADD">·sec</span>':'')
      +'</div>';
    contents+='<div class="pair-tab-content'+(i===0?' active':'')+'" id="tab-content-'+i+'">'
      +renderPairContent(p,ps.flags,ps.level,ps.score,tokenAddr,i,fdv,mkt,ps.isSecondary,risk)+'</div>';
  });
  return '<div class="pair-tabs-wrap"><div class="pair-tabs-header">'+tabs+'</div>'+contents+'</div>';
}

function switchTab(idx){
  document.querySelectorAll('.pair-tab').forEach(function(t){t.classList.remove('active');});
  document.querySelectorAll('.pair-tab-content').forEach(function(t){t.classList.remove('active');});
  var btn=document.getElementById('tab-btn-'+idx);
  var content=document.getElementById('tab-content-'+idx);
  if(btn) btn.classList.add('active');
  if(content) content.classList.add('active');
}

function renderPairContent(p,flags,lv,score,tokenAddr,idx,fdv,mkt,isSecondary,risk){
  var liq=(p.liquidity&&p.liquidity.usd)||0;
  var vol=(p.volume&&p.volume.h24)||0;
  var buys=(p.txns&&p.txns.h24&&p.txns.h24.buys)||0;
  var sells=(p.txns&&p.txns.h24&&p.txns.h24.sells)||0;
  var liqQ=(p.liquidity&&p.liquidity.quote)||0;
  var liqB=(p.liquidity&&p.liquidity.base)||0;
  var sym=(p.baseToken&&p.baseToken.symbol)||'—';
  var name=(p.baseToken&&p.baseToken.name)||'—';
  var pc=p.priceChange||{};
  var total=buys+sells,buyPct=total>0?Math.round((buys/total)*100):0;
  var age=ageDays(p.pairCreatedAt);
  var ageAlert=age<1?'alert-red':age<7?'alert-yellow':'';
  var liqColor=liq<5?'#E24B4A':liq<5000?'#EF9F27':'#1D9E75';
  var liqBarW=Math.min(100,(liq/100000)*100);
  var time=analysisTime?analysisTime.toLocaleString('pt-BR'):'';
  var isRug=lv.level==='FRAUD';
  var pairAddr=p.pairAddress||'';
  var html='';

  // Secondary pool notice
  if(isSecondary){
    html+='<div class="secondary-pool-notice">'
      +'ℹ Esta é uma <strong>pool secundária</strong> de um token com '+fmt(risk.totalLiq)+' de liquidez total. '
      +'Os sinais de atenção nesta pool são esperados para pools menores — o token possui pools principais com liquidez significativa.'
      +'</div>';
  }

  // Diag box
  html+='<div class="diag-box" style="border:1.5px solid '+lv.color+';box-shadow:0 0 20px '+lv.color+'33">'
    +'<div class="diag-header"><div>'
    +'<div class="diag-label">Pool '+(idx+1)+' · '+(p.dexId||'—')+' · '+time+'</div>'
    +'<div class="diag-title" style="color:'+lv.color+'">'+lv.label+'</div>'
    +'<div class="diag-sub">'+name+' · '+sym+(isSecondary?' · Pool secundária':' · Pool principal')+'</div>'
    +'</div>'
    +'<div class="pool-risk-badge" style="color:'+lv.color+';border-color:'+lv.color+'44;background:'+lv.color+'11">'+lv.label+'</div>'
    +'</div>'
    +'<div class="flags">'+renderFlags(flags)+'</div>'
    +'<div class="diag-footer">'
    +'<div class="data-ts">Dados obtidos em '+time+'</div>'
    +'<div style="display:flex;gap:8px">'
    +'<button class="reanalyze-btn" onclick="reanalyze()">↻ Reanalisar</button>'
    +'<button class="copy-btn" id="copyBtn-'+idx+'" onclick="copyResume('+idx+')">Copiar para internal note</button>'
    +'</div></div>'
    +'</div>';

  // Liquidity
  html+='<div class="card"><div class="card-title">Liquidez (Pool '+(idx+1)+')</div>'
    +'<div class="grid3">'
    +'<div class="stat'+(isRug?' alert-red':'')+'"><div class="stat-label">Total (USD)</div><div class="liq-big" style="color:'+liqColor+'">'+fmt(liq)+'</div><div class="bar-wrap"><div class="bar-fill" style="width:'+liqBarW+'%;background:'+liqColor+'"></div></div></div>'
    +'<div class="stat"><div class="stat-label">Pooled SOL</div><div class="stat-value">'+Number(liqQ).toFixed(4)+' SOL</div></div>'
    +'<div class="stat"><div class="stat-label">Pooled '+sym+'</div><div class="stat-value">'+Number(liqB).toLocaleString()+'</div></div>'
    +'</div>'
    +'<div class="liq-disclaimer">⚠ Valor fornecido pelo DexScreener — pode ter delay. <a href="https://solscan.io/account/'+pairAddr+'" target="_blank">Verificar no Solscan ↗</a></div>';
  if(isRug&&pairAddr){
    html+='<div class="rug-confirm-hint"><strong>Liquidez extremamente baixa — possível rug pull.</strong> Para confirmar:<ol>'
      +'<li><a class="rug-confirm-link" href="https://solscan.io/account/'+pairAddr+'#defiactivities" target="_blank">Abrir transações deste pool no Solscan ↗</a></li>'
      +'<li>Clicar em <strong>Action</strong> e selecionar apenas <strong>Remove Liquidity</strong></li>'
      +'<li>Sem transação → liquidez ainda presente (baixa, mas não removida)</li>'
      +'<li>Com transação → liquidez removida, rug pull confirmado</li>'
      +'</ol></div>';
  }
  html+='</div>';

  // Volume + Price
  html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">'
    +'<div class="card" style="margin-bottom:0"><div class="card-title">Volume e Negociações (24h)</div>'
    +'<div class="grid2">'
    +statCard('Volume',fmt(vol))+statCard('Transações',(buys+sells).toLocaleString())
    +statCard('Compras',buys.toLocaleString(),'#1D9E75')+statCard('Vendas',sells.toLocaleString(),'#E24B4A')
    +'</div>'
    +'<div class="buysell-wrap"><div class="buysell-labels"><span style="color:#1D9E75">Compras '+buyPct+'%</span><span style="color:#E24B4A">Vendas '+(100-buyPct)+'%</span></div><div class="buysell-bar"><div class="buysell-fill" style="width:'+buyPct+'%"></div></div></div>'
    +'</div>'
    +'<div class="card" style="margin-bottom:0"><div class="card-title">Preço e Variação</div>'
    +'<div style="font-size:18px;font-weight:500;color:#e0e0e0;margin-bottom:10px">$'+(p.priceUsd||'0')+'</div>'
    +'<div class="grid2">'+statCard('5m',pct(pc.m5),pctColor(pc.m5))+statCard('1h',pct(pc.h1),pctColor(pc.h1))+statCard('6h',pct(pc.h6),pctColor(pc.h6))+statCard('24h',pct(pc.h24),pctColor(pc.h24))+'</div>'
    +'</div></div>';

  // Supply
  html+='<div class="card"><div class="card-title">Supply fora de circulação</div>'+renderSupply(fdv,mkt)+'</div>';

  // Market cap
  html+='<div class="card"><div class="card-title">Market Cap</div><div class="grid4">'
    +statCard('Market Cap',fmt(mkt))+statCard('FDV',fmt(fdv))
    +statCard('Par criado',timeAgo(p.pairCreatedAt),age<1?'#E24B4A':age<7?'#EF9F27':'#e0e0e0',ageAlert)
    +statCard('DEX',p.dexId||'—')
    +'</div>'
    +(fdv>0&&mkt>0&&Math.abs(fdv-mkt)/fdv<0.01?'<div style="margin-top:8px;font-size:11px;color:#7F77DD;background:#10102a;border:0.5px solid #303070;border-radius:6px;padding:6px 10px">FDV = Market Cap — 100% do supply em circulação desde o lançamento</div>':'')
    +'</div>';

  return html;
}

function copyConclusionNote(){
  if(!currentToken) return;
  var risk=currentToken.risk;
  var lines=[
    '=== Rug Pull Detector v5.7 ===',
    'Token: '+currentToken.name+' ('+currentToken.symbol+')',
    'Contract: '+currentToken.address,
    'Analisado em: '+(analysisTime?analysisTime.toLocaleString('pt-BR'):''),
    'Diagnóstico: '+risk.label,
    'Liquidez total: '+fmt(risk.totalLiq),
    'Pools: '+risk.totalPairs+(risk.rugCount>0?' · Rug pull em '+risk.rugCount:''),
    (risk.recommendedPools.length>0?'Pools recomendadas: '+risk.recommendedPools.map(function(ps){return ps.dex+' ('+fmt(ps.liq)+')';}).join(', '):''),
    'Pontos críticos: '+(risk.allFlags.filter(function(k){return k!=='LIQ_SEC';}).map(function(k){return FLAG_SHORT[k]||k;}).join(', ')||'Nenhum'),

    lines.push('Pool '+(i+1)+' ('+ps.dex+'): '+fmt(ps.liq)+' · '+ps.level.label+(ps.isSecondary?' [secundária]':''));

  });
}

function reanalyze(){if(currentAddress){document.getElementById('addressInput').value=currentAddress;analyze();}}

function analyze(){
  var q=document.getElementById('addressInput').value.trim();
  var errEl=document.getElementById('inputError'),inputEl=document.getElementById('addressInput');
  errEl.style.display='none';inputEl.classList.remove('error');
  if(!q) return;
  if(!isValidSolanaAddress(q)){
    errEl.textContent='Endereço inválido. Um endereço Solana válido tem entre 32 e 44 caracteres alfanuméricos.';
    errEl.style.display='block';inputEl.classList.add('error');return;
  }
  currentAddress=q;
  var btn=document.getElementById('analyzeBtn');
  btn.disabled=true;btn.textContent='Analisando...';
  currentToken=null;allPairsData=[];
  document.getElementById('result').innerHTML='<div class="loading"><div class="spinner"></div>Buscando dados na blockchain...</div>';
  fetch(PROXY_BASE+'/api/proxy?address='+q)
    .then(function(r){if(!r.ok) throw new Error('HTTP '+r.status);return r.json();})
    .then(function(data){
      var pairs=Array.isArray(data)?data:[];
      if(pairs.length===0){renderNotFound(q);return;}
      pairs.sort(function(a,b){return((b.liquidity&&b.liquidity.usd)||0)-((a.liquidity&&a.liquidity.usd)||0);});
      analysisTime=new Date();
      renderAllPairs(pairs,q);
    })
    .catch(function(e){
      document.getElementById('result').innerHTML='<div class="error-box"><div class="error-title">Erro ao buscar dados</div><div class="error-msg">'+e.message+'</div></div>';
    })
    .finally(function(){btn.disabled=false;btn.textContent='Analisar →';});
}

document.getElementById('addressInput').addEventListener('keydown',function(e){if(e.key==='Enter') analyze();});
</script>
</body>
