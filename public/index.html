<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rug Pull Detector</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #080c12; color: #e0e0e0; min-height: 100vh; padding-bottom: 40px; }
  a { color: inherit; text-decoration: none; }

  .header { background: #0a0e16; border-bottom: 0.5px solid #1a2030; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .header-logo { width: 30px; height: 30px; background: linear-gradient(135deg, #1D9E75, #378ADD); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0; }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .header-title { font-size: 14px; font-weight: 500; color: #fff; }
  .header-sub { font-size: 10px; color: #444; }

  .container { max-width: 780px; margin: 0 auto; padding: 0 20px; }
  .card { background: #0d1117; border: 0.5px solid #1e2530; border-radius: 12px; padding: 14px 16px; margin-bottom: 12px; }
  .card-title { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }

  .search-wrap { display: flex; gap: 10px; align-items: center; }
  .search-input { flex: 1; font-size: 13px; padding: 10px 14px; border-radius: 8px; border: 0.5px solid #1e2530; outline: none; color: #e0e0e0; background: #060a10; font-family: inherit; }
  .search-input.error { border-color: #E24B4A55; }
  .search-btn { padding: 10px 22px; border-radius: 8px; background: #1D9E75; color: #fff; font-size: 13px; font-weight: 500; border: none; cursor: pointer; white-space: nowrap; }
  .search-btn:disabled { background: #1a2030; cursor: not-allowed; }
  .input-error { font-size: 11px; color: #E24B4A; margin-top: 6px; padding: 0 2px; }

  .history-wrap { margin-top: 10px; display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .history-label { font-size: 10px; color: #444; flex-shrink: 0; }
  .history-btn { font-size: 11px; padding: 3px 8px; border-radius: 5px; border: 0.5px solid #1e2530; background: #060a10; color: #666; cursor: pointer; max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .history-btn:hover { color: #999; border-color: #2a3040; }

  .loading { text-align: center; padding: 48px 0; color: #444; font-size: 13px; }
  .spinner { width: 28px; height: 28px; border: 2px solid #1e2530; border-top: 2px solid #1D9E75; border-radius: 50%; margin: 0 auto 14px; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-box { background: #1a0808; border: 0.5px solid rgba(226,75,74,0.2); border-radius: 12px; padding: 24px; text-align: center; margin-bottom: 12px; }
  .error-title { font-size: 14px; font-weight: 500; color: #E24B4A; margin-bottom: 6px; }
  .error-msg { font-size: 12px; color: #884444; line-height: 1.6; }

  .not-found-box { background: #0d1117; border: 1.5px solid #EF9F27; border-radius: 14px; padding: 20px; margin-bottom: 12px; }
  .not-found-title { font-size: 15px; font-weight: 500; color: #EF9F27; margin-bottom: 6px; }
  .not-found-msg { font-size: 12px; color: #888; line-height: 1.7; margin-bottom: 16px; }

  .steps-box { background: #060a10; border: 0.5px solid #1e2530; border-radius: 10px; padding: 14px 16px; margin-bottom: 14px; }
  .steps-title { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
  .step { display: flex; gap: 10px; margin-bottom: 10px; }
  .step:last-child { margin-bottom: 0; }
  .step-num { width: 20px; height: 20px; border-radius: 50%; background: #EF9F2722; border: 0.5px solid #EF9F2755; color: #EF9F27; font-size: 10px; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
  .step-title { font-size: 12px; font-weight: 500; color: #e0e0e0; margin-bottom: 2px; }
  .step-desc { font-size: 11px; color: #666; line-height: 1.5; }

  .not-found-links { display: flex; gap: 8px; flex-wrap: wrap; }
  .nf-btn { font-size: 12px; padding: 7px 14px; border-radius: 8px; border: 0.5px solid; cursor: pointer; display: inline-block; }

  .action-box { border-radius: 12px; padding: 16px 18px; margin-bottom: 12px; border: 1.5px solid; }
  .action-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; font-weight: 500; }
  .action-title { font-size: 16px; font-weight: 500; margin-bottom: 6px; }
  .action-desc { font-size: 12px; line-height: 1.6; opacity: 0.85; }

  .diag-box { background: #0a0e16; border-radius: 14px; padding: 18px 20px; margin-bottom: 12px; }
  .diag-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 14px; gap: 12px; }
  .diag-label { font-size: 10px; color: #555; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
  .diag-title { font-size: 20px; font-weight: 500; margin-bottom: 4px; }
  .diag-sub { font-size: 12px; color: #888; }
  .flags { display: flex; flex-direction: column; gap: 5px; }
  .flag-item { display: flex; gap: 8px; align-items: flex-start; border-radius: 7px; padding: 8px 12px; }
  .flag-badge { font-size: 9px; font-weight: 500; padding: 2px 5px; border-radius: 3px; flex-shrink: 0; margin-top: 1px; white-space: nowrap; }
  .flag-tech { font-size: 10px; color: #555; margin-top: 2px; }

  .diag-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 14px; gap: 10px; }
  .reanalyze-btn { font-size: 11px; padding: 6px 12px; border-radius: 6px; border: 0.5px solid #1e2530; background: #060a10; color: #555; cursor: pointer; }
  .reanalyze-btn:hover { color: #999; }
  .copy-btn { font-size: 11px; padding: 6px 14px; border-radius: 6px; border: 0.5px solid #1e2530; background: #060a10; color: #666; cursor: pointer; }
  .copy-btn.copied { border-color: #1D9E75; color: #1D9E75; background: #081a12; }
  .data-ts { font-size: 10px; color: #333; }

  /* ── CONSOLIDATED SUMMARY BAR ── */
  .consolidated-bar { border-radius: 12px; padding: 14px 16px; margin-bottom: 12px; border: 1.5px solid; }
  .consolidated-bar-title { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; font-weight: 500; }
  .consolidated-stats { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; }
  .consolidated-stat { display: flex; flex-direction: column; gap: 2px; }
  .consolidated-stat-label { font-size: 10px; color: #555; }
  .consolidated-stat-value { font-size: 14px; font-weight: 500; }
  .pool-status-list { margin-top: 10px; display: flex; flex-direction: column; gap: 5px; }
  .pool-status-row { display: flex; align-items: center; gap: 8px; font-size: 11px; }
  .pool-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

  /* ── PAIR TABS ── */
  .pair-tabs-wrap { margin-bottom: 12px; }
  .pair-tabs-header { display: flex; gap: 0; border-bottom: 0.5px solid #1e2530; margin-bottom: 0; overflow-x: auto; }
  .pair-tab { padding: 9px 16px; font-size: 12px; cursor: pointer; border-bottom: 2px solid transparent; color: #555; white-space: nowrap; display: flex; align-items: center; gap: 6px; transition: color 0.15s; }
  .pair-tab:hover { color: #999; }
  .pair-tab.active { color: #e0e0e0; border-bottom-color: #1D9E75; }
  .pair-tab.tab-rug { }
  .pair-tab.tab-rug.active { border-bottom-color: #E24B4A; color: #E24B4A; }
  .pair-tab.tab-high.active { border-bottom-color: #EF9F27; color: #EF9F27; }
  .pair-tab.tab-med.active { border-bottom-color: #7F77DD; color: #7F77DD; }
  .pair-tab-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .pair-tab-content { display: none; }
  .pair-tab-content.active { display: block; }

  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .grid4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; }

  .stat { background: #060a10; border: 0.5px solid #1e2530; border-radius: 8px; padding: 10px 12px; }
  .stat-label { font-size: 10px; color: #555; margin-bottom: 3px; }
  .stat-value { font-size: 14px; font-weight: 500; color: #e0e0e0; }
  .stat.alert-yellow { border-color: #EF9F2744; background: #1f1208; }
  .stat.alert-red { border-color: #E24B4A44; background: #200808; }

  /* ── AUTHORITIES ── */
  .auth-card { background: #060a10; border: 0.5px solid #1e2530; border-radius: 8px; padding: 10px 12px; }
  .auth-label { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .auth-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
  .auth-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .auth-val { font-size: 11px; font-family: monospace; word-break: break-all; }
  .auth-hint { font-size: 10px; color: #444; line-height: 1.4; margin-top: 4px; }
  .auth-badge { font-size: 10px; font-weight: 600; padding: 2px 6px; border-radius: 4px; }
  .auth-loading { font-size: 11px; color: #444; display: flex; align-items: center; gap: 6px; }
  .auth-spinner { width: 10px; height: 10px; border: 1.5px solid #1e2530; border-top-color: #1D9E75; border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0; }

  .bar-wrap { height: 4px; border-radius: 2px; background: #1e2530; overflow: hidden; margin-top: 6px; }
  .bar-fill { height: 100%; border-radius: 2px; }
  .buysell-wrap { margin-top: 10px; }
  .buysell-labels { display: flex; justify-content: space-between; font-size: 10px; color: #555; margin-bottom: 3px; }
  .buysell-bar { height: 4px; border-radius: 2px; background: #3a1a1a; overflow: hidden; }
  .buysell-fill { height: 100%; background: #1D9E75; border-radius: 2px; }

  .links { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
  .ext-link { font-size: 11px; padding: 4px 10px; border-radius: 6px; border: 0.5px solid #1e2530; color: #666; background: #060a10; }
  .ext-link:hover { color: #999; }

  .score-ring { display: flex; flex-direction: column; align-items: center; gap: 4px; flex-shrink: 0; }
  .score-lbl { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 0.5px; }

  .supply-inner { background: #060a10; border: 0.5px solid #1e2530; border-radius: 8px; padding: 12px 14px; }
  .supply-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .supply-text { font-size: 12px; font-weight: 500; margin-bottom: 2px; }
  .supply-sub { font-size: 11px; color: #555; }
  .supply-pct { font-size: 18px; font-weight: 500; flex-shrink: 0; margin-left: 12px; }
  .supply-foot { display: flex; justify-content: space-between; font-size: 10px; color: #444; margin-top: 4px; }

  .pool-box { background: #060a10; border: 0.5px solid #1e2530; border-radius: 8px; padding: 10px 12px; }
  .pool-addr { font-size: 11px; color: #7F77DD; font-family: monospace; word-break: break-all; margin-bottom: 6px; }
  .pool-hint { font-size: 10px; color: #444; line-height: 1.4; }

  .footer { text-align: center; font-size: 10px; color: #1e2530; margin-top: 8px; }
  .liq-big { font-size: 20px; font-weight: 500; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-logo">R</div>
    <div>
      <div class="header-title">Rug Pull Detector <span style="font-size:10px;color:#444;font-weight:400">v5.0</span></div>
      <div class="header-sub">Token Risk Analyzer · Solana</div>
    </div>
  </div>
</div>

<div class="container">
  <div class="card">
    <div class="search-wrap">
      <input class="search-input" id="addressInput" placeholder="Cole o contract address do token Solana..." />
      <button class="search-btn" id="analyzeBtn" onclick="analyze()">Analisar →</button>
    </div>
    <div id="inputError" class="input-error" style="display:none"></div>
    <div class="history-wrap" id="historyWrap" style="display:none">
      <span class="history-label">Recentes:</span>
      <div id="historyList" style="display:flex;gap:6px;flex-wrap:wrap"></div>
    </div>
  </div>

  <div id="result"></div>
  <div class="footer">Feito por Vinicius Fernandes · Solana</div>
</div>

<script>
var currentToken = null;
var analysisTime = null;
var currentAddress = null;
var sessionHistory = [];
var allPairsData = [];
var authoritiesCache = {};

// ─────────────────────────────────────────────
// UTILITIES
// ─────────────────────────────────────────────
function isValidSolanaAddress(addr) {
  return /^[1-9A-HJ-NP-Za-km-z]{32,44}$/.test(addr);
}

function fmt(n) {
  if (n == null || isNaN(n)) return '—';
  if (n >= 1e6) return '$' + (n/1e6).toFixed(2) + 'M';
  if (n >= 1e3) return '$' + (n/1e3).toFixed(2) + 'K';
  return '$' + Number(n).toFixed(2);
}

function pct(n) {
  if (n == null) return '—';
  var v = Number(n).toFixed(2);
  return (v > 0 ? '+' : '') + v + '%';
}

function pctColor(v) {
  if (v == null) return '#666';
  return Number(v) >= 0 ? '#1D9E75' : '#E24B4A';
}

function timeAgo(ts) {
  if (!ts) return '—';
  var diff = Date.now() - ts;
  var d = Math.floor(diff/86400000);
  var h = Math.floor(diff/3600000);
  var m = Math.floor(diff/60000);
  if (d > 0) return d + (d>1?' dias':' dia') + ' atrás';
  if (h > 0) return h + (h>1?' horas':' hora') + ' atrás';
  return m + ' min atrás';
}

function ageDays(ts) {
  if (!ts) return 999;
  return (Date.now() - ts) / 86400000;
}

function shortAddr(addr) {
  if (!addr) return '—';
  return addr.substring(0,6) + '...' + addr.substring(addr.length-4);
}

// ─────────────────────────────────────────────
// HISTORY
// ─────────────────────────────────────────────
function addToHistory(addr, name, sym) {
  sessionHistory = sessionHistory.filter(function(h){ return h.addr !== addr; });
  sessionHistory.unshift({ addr: addr, label: (sym || addr.substring(0,8)+'...') + (name ? ' · ' + name.substring(0,12) : '') });
  if (sessionHistory.length > 5) sessionHistory = sessionHistory.slice(0, 5);
  renderHistory();
}

function renderHistory() {
  if (sessionHistory.length === 0) { document.getElementById('historyWrap').style.display = 'none'; return; }
  document.getElementById('historyWrap').style.display = 'flex';
  document.getElementById('historyList').innerHTML = sessionHistory.map(function(h) {
    return '<button class="history-btn" title="' + h.addr + '" onclick="loadHistory(\'' + h.addr + '\')">' + h.label + '</button>';
  }).join('');
}

function loadHistory(addr) {
  document.getElementById('addressInput').value = addr;
  analyze();
}

// ─────────────────────────────────────────────
// SCORE RING SVG
// ─────────────────────────────────────────────
function scoreRing(score, color) {
  var r = 28, circ = 2 * Math.PI * r;
  var dash = circ * (1 - score/100);
  return '<svg width="72" height="72" style="transform:rotate(-90deg)">'
    + '<circle cx="36" cy="36" r="' + r + '" fill="none" stroke="#1e2530" stroke-width="5"/>'
    + '<circle cx="36" cy="36" r="' + r + '" fill="none" stroke="' + color + '" stroke-width="5" stroke-dasharray="' + circ + '" stroke-dashoffset="' + dash + '" stroke-linecap="round"/>'
    + '<text x="36" y="36" text-anchor="middle" dominant-baseline="central" style="transform:rotate(90deg);transform-origin:36px 36px;font-size:16px;font-weight:600;fill:' + color + '">' + score + '</text>'
    + '</svg>';
}

// ─────────────────────────────────────────────
// FLAG ANALYSIS (per pair)
// ─────────────────────────────────────────────
function analyzeFlags(liq, vol, buys, sells, fdv, mkt, pairCreatedAt) {
  var flags = [];
  var total = buys + sells;
  var buyRatio = total > 0 ? (buys/total)*100 : 50;
  var age = ageDays(pairCreatedAt);

  if (liq < 1) {
    flags.push({ level:'RUG', agent:'O pool deste token está vazio. O cliente não conseguirá vender — isso é característica de rug pull.', tech:'Liquidez menor que $1.' });
  } else if (liq < 1000) {
    flags.push({ level:'HIGH', agent:'A liquidez disponível é insuficiente para realizar qualquer troca. A venda pode falhar ou resultar em grande perda de valor.', tech:'Liquidez crítica de ' + fmt(liq) + '.' });
  } else if (liq < 5000) {
    flags.push({ level:'MED', agent:'Liquidez baixa — o cliente pode conseguir vender mas receberá menos do que o valor exibido.', tech:'Liquidez de ' + fmt(liq) + '.' });
  }

  if (liq > 0 && vol > liq * 10) {
    flags.push({ level:'HIGH', agent:'Volume desproporcional à liquidez — transações artificiais para simular atividade.', tech:'Volume 24h (' + fmt(vol) + ') é ' + Math.round(vol/liq) + 'x maior que a liquidez.' });
  }

  if (buyRatio > 90) {
    flags.push({ level:'MED', agent:'Quase todas as transações são compras, sem vendas equilibradas. Possível pump artificial.', tech: Math.round(buyRatio) + '% das transações são compras.' });
  }

  if (age < 1) {
    flags.push({ level:'HIGH', agent:'Token criado há menos de 24 horas. Histórico insuficiente para avaliação.', tech:'Par criado há ' + timeAgo(pairCreatedAt) + '.' });
  } else if (age < 7) {
    flags.push({ level:'MED', agent:'Token com menos de 7 dias de existência. Histórico limitado.', tech:'Par criado há ' + timeAgo(pairCreatedAt) + '.' });
  }

  if (fdv > 0 && mkt > 0 && Math.abs(fdv-mkt)/fdv < 0.01) {
    flags.push({ level:'MED', agent:'100% do supply já está em circulação. O criador pode vender qualquer quantidade sem restrições.', tech:'FDV igual ao Market Cap.' });
  }

  if (flags.length === 0) {
    flags.push({ level:'OK', agent:'Nenhum sinal de alerta automático detectado. Análise manual recomendada.', tech:'Nenhuma flag crítica detectada.' });
  }

  return flags;
}

// ─────────────────────────────────────────────
// CONSOLIDATED SCORE (all pairs)
// ─────────────────────────────────────────────
function getConsolidatedRisk(pairs) {
  var totalLiq = 0;
  var rugCount = 0;
  var highCount = 0;
  var pairStatuses = [];

  pairs.forEach(function(p) {
    var liq = (p.liquidity && p.liquidity.usd) || 0;
    totalLiq += liq;
    var vol = (p.volume && p.volume.h24) || 0;
    var buys = (p.txns && p.txns.h24 && p.txns.h24.buys) || 0;
    var sells = (p.txns && p.txns.h24 && p.txns.h24.sells) || 0;
    var fdv = p.fdv || 0;
    var mkt = p.marketCap || 0;
    var flags = analyzeFlags(liq, vol, buys, sells, fdv, mkt, p.pairCreatedAt);
    var sc = getScenario(flags);

    if (sc.level === 'RUG') rugCount++;
    else if (sc.level === 'HIGH') highCount++;

    pairStatuses.push({
      dex: p.dexId || '—',
      pairAddr: p.pairAddress || '',
      liq: liq,
      level: sc.level,
      color: sc.color,
      label: sc.label
    });
  });

  // Determine consolidated risk
  var consolidatedLevel, consolidatedColor, consolidatedScore, consolidatedLabel;
  var totalPairs = pairs.length;

  // All pools drained → definitive rug pull
  if (rugCount === totalPairs) {
    consolidatedLevel = 'RUG';
    consolidatedColor = '#E24B4A';
    consolidatedScore = 100;
    consolidatedLabel = 'Rug Pull Confirmado';
  }
  // Majority drained or at least one rug + global liquidity critical
  else if (rugCount > 0 && totalLiq < 500) {
    consolidatedLevel = 'RUG';
    consolidatedColor = '#E24B4A';
    consolidatedScore = 97;
    consolidatedLabel = 'Rug Pull Confirmado';
  }
  else if (rugCount > 0 || (highCount >= 2 && totalLiq < 5000)) {
    consolidatedLevel = 'HIGH';
    consolidatedColor = '#EF9F27';
    consolidatedScore = 85;
    consolidatedLabel = 'Alto Risco';
  }
  else if (highCount > 0 || totalLiq < 5000) {
    consolidatedLevel = 'HIGH';
    consolidatedColor = '#EF9F27';
    consolidatedScore = 70;
    consolidatedLabel = 'Alto Risco';
  }
  else {
    consolidatedLevel = 'OK';
    consolidatedColor = '#1D9E75';
    consolidatedScore = 15;
    consolidatedLabel = 'Aparentemente Normal';
  }

  return {
    totalLiq: totalLiq,
    rugCount: rugCount,
    highCount: highCount,
    totalPairs: totalPairs,
    level: consolidatedLevel,
    color: consolidatedColor,
    score: consolidatedScore,
    label: consolidatedLabel,
    pairStatuses: pairStatuses
  };
}

// ─────────────────────────────────────────────
// SCENARIO (per pair, used by flag analysis)
// ─────────────────────────────────────────────
function getScenario(flags) {
  if (flags.some(function(f){ return f.level==='RUG'; }))
    return { level:'RUG', label:'Rug Pull', color:'#E24B4A', glow:'#E24B4A33', score:100, action:'NÃO confirme a possibilidade de venda ao cliente.', actionDesc:'A liquidez deste pool foi removida. O token existe na carteira mas não pode ser vendido. Informe com empatia que o valor não é recuperável neste pool.' };
  if (flags.some(function(f){ return f.level==='HIGH'; }))
    return { level:'HIGH', label:'Alto Risco', color:'#EF9F27', glow:'#EF9F2733', score:75, action:'Não garanta a venda. Oriente o cliente com cautela.', actionDesc:'Este pool apresenta múltiplos sinais de alerta. A venda pode não ser possível ou resultar em perda significativa.' };
  if (flags.some(function(f){ return f.level==='MED'; }))
    return { level:'MED', label:'Atenção', color:'#7F77DD', glow:'#7F77DD33', score:42, action:'Oriente o cliente sobre os riscos antes de prosseguir.', actionDesc:'Foram detectados sinais de atenção. A venda pode ser possível mas há riscos.' };
  return { level:'OK', label:'Normal', color:'#1D9E75', glow:'#1D9E7533', score:12, action:'Nenhum sinal crítico detectado. Prossiga com a análise manual.', actionDesc:'Os dados automáticos não indicam fraude. Verifique as authorities para confirmar.' };
}

var FLAG_STYLE = {

// ─────────────────────────────────────────────
// AUTHORITIES — Solana RPC
// ─────────────────────────────────────────────
function fetchAuthorities(mintAddr, containerId) {
  // Fetch mint account info from Solana public RPC
  var RPC_URL = 'https://api.mainnet-beta.solana.com';

  // Render loading state
  var el = document.getElementById(containerId);
  if (!el) return;
  el.innerHTML = renderAuthLoading();

  fetch(RPC_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      jsonrpc: '2.0',
      id: 1,
      method: 'getAccountInfo',
      params: [mintAddr, { encoding: 'jsonParsed' }]
    })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    var info = data && data.result && data.result.value;
    if (!info || !info.data || !info.data.parsed) {
      el.innerHTML = renderAuthError('Conta não encontrada ou não é um mint Solana padrão.');
      return;
    }
    var parsed = info.data.parsed;
    var mintInfo = parsed.info || {};
    var mintAuth = mintInfo.mintAuthority || null;
    var freezeAuth = mintInfo.freezeAuthority || null;
    // Fetch metadata for update authority (Metaplex)
    fetchMetaplexAuthority(mintAddr, function(updateAuth) {
      el.innerHTML = renderAuthCards(mintAuth, freezeAuth, updateAuth);
    });
  })
  .catch(function(e) {
    el.innerHTML = renderAuthError('Erro ao consultar RPC: ' + e.message);
  });
}

function fetchMetaplexAuthority(mintAddr, cb) {
  // Derive Metaplex metadata PDA
  // PDA: ['metadata', metaplex_program, mint_pubkey]
  // We use a secondary RPC call with getProgramAccounts filtered by mint
  var RPC_URL = 'https://api.mainnet-beta.solana.com';
  var METADATA_PROGRAM = 'metaqbxxUerdq28cj1RbAWkYQm3ybzjb6a8bt518x1s';

  // Use getAccountInfo on the derived metadata PDA
  // Since we can't do PDA derivation in pure JS without @solana/web3.js,
  // we fall back to a heuristic: query DAS or indicate manual check
  // Instead, we use the token-metadata program known endpoint pattern
  fetch(RPC_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      jsonrpc: '2.0',
      id: 2,
      method: 'getProgramAccounts',
      params: [METADATA_PROGRAM, {
        encoding: 'jsonParsed',
        filters: [
          { dataSize: 679 },
          { memcmp: { offset: 33, bytes: mintAddr } }
        ]
      }]
    })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    var accounts = data && data.result;
    if (Array.isArray(accounts) && accounts.length > 0) {
      var acc = accounts[0];
      var parsed = acc && acc.account && acc.account.data && acc.account.data.parsed;
      if (parsed && parsed.info && parsed.info.updateAuthority) {
        cb(parsed.info.updateAuthority);
        return;
      }
    }
    // fallback: not found, return null
    cb(null);
  })
  .catch(function() { cb(null); });
}

var NULL_PATTERNS = [
  '11111111111111111111111111111111',
  'TokenkegQfeZyiNwAJbNbGKPFXCWuBvf9Ss623VQ5DA'
];

function isNullAuth(val) {
  if (!val) return true;
  return NULL_PATTERNS.indexOf(val) >= 0;
}

function renderAuthCards(mintAuth, freezeAuth, updateAuth) {
  function card(label, value, hint) {
    var isNull = isNullAuth(value);
    var color = isNull ? '#1D9E75' : '#E24B4A';

    var fullVal = isNull ? '' : ('<div class="auth-val" style="color:#555;font-size:10px;margin-top:2px">' + value + '</div>');
    return '<div class="auth-card"><div class="auth-label">' + label + '</div>'
      + '<div class="auth-row">'
      + '<div class="auth-dot" style="background:' + color + '"></div>'
      + '<span class="auth-badge" style="color:' + color + ';background:' + badgeBg + ';border:0.5px solid ' + color + '44">' + badgeText + '</span>'
      + '</div>'
      + fullVal
      + '<div class="auth-hint">' + hint + '</div></div>';
  }

  return '<div class="grid3">'
    + card('Mint Authority', mintAuth, isNullAuth(mintAuth)
        ? 'Sem risco: o criador não pode gerar tokens adicionais.'
        : '⚠ Autoridade ativa — o criador pode cunhar tokens ilimitados a qualquer momento.')
    + card('Freeze Authority', freezeAuth, isNullAuth(freezeAuth)
        ? 'Sem risco: ninguém pode bloquear a carteira do cliente.'
        : '⚠ Autoridade ativa — o criador pode congelar a carteira do cliente e impedir vendas.')
    + card('Update Authority', updateAuth, isNullAuth(updateAuth)
        ? 'Sem risco: metadados do token não podem ser alterados.'
        : '⚠ Autoridade ativa — o criador pode alterar nome, símbolo e metadados do token.')
    + '</div>';

    + '<div class="step"><div class="step-num">1</div><div><div class="step-title">Confirme o endereço com o cliente</div><div class="step-desc">Verifique se o endereço do token está correto e completo. Um endereço Solana válido tem entre 32 e 44 caracteres.</div></div></div>'
    + '<div class="step"><div class="step-num">2</div><div><div class="step-title">Verifique na OKX Web3</div><div class="step-desc">Acesse o link abaixo para verificar se o token existe na blockchain mas sem pares ativos.</div></div></div>'
    + '<div class="step"><div class="step-num">3</div><div><div class="step-title">Verifique no Solscan</div><div class="step-desc">Se o token aparecer no Solscan mas não no DexScreener, verifique a aba Activities para confirmar se houve Remove Liquidity recente.</div></div></div>'
    + '<div class="step"><div class="step-num">4</div><div><div class="step-title">Oriente o cliente</div><div class="step-desc">Se confirmado que não há liquidez disponível em nenhuma plataforma, informe ao cliente que a venda não é possível no momento. Isso não é uma limitação da OKX — é o estado atual do token na blockchain.</div></div></div>'
    + '</div>'
    + '<div class="not-found-links">'
    + '<a class="nf-btn" href="https://web3.okx.com/pt-BR/token/solana/' + addr + '" target="_blank" style="border-color:#EF9F27;color:#EF9F27;background:#EF9F2711">Verificar na OKX Web3 ↗</a>'
    + '<a class="nf-btn" href="https://solscan.io/token/' + addr + '" target="_blank" style="border-color:#1e2530;color:#666;background:#060a10">Verificar no Solscan ↗</a>'
    + '</div></div>';
  document.getElementById('result').innerHTML = html;
}

// ─────────────────────────────────────────────
// MAIN RENDER
// ─────────────────────────────────────────────
function renderAllPairs(pairs, addr) {
  allPairsData = pairs;
  var sym = (pairs[0].baseToken && pairs[0].baseToken.symbol) || '—';
  var name = (pairs[0].baseToken && pairs[0].baseToken.name) || '—';
  var tokenAddr = (pairs[0].baseToken && pairs[0].baseToken.address) || addr;

  addToHistory(tokenAddr, name, sym);

  var risk = getConsolidatedRisk(pairs);

  var html = '';

  // Consolidated bar (always visible)
  html += renderConsolidatedBar(risk, sym);

  // Global action box based on consolidated risk
  var globalSc = getScenario(
    risk.level === 'RUG' ? [{ level:'RUG' }] :
    risk.level === 'HIGH' ? [{ level:'HIGH' }] :
    risk.level === 'MED' ? [{ level:'MED' }] :
    [{ level:'OK' }]
  );
  html += '<div class="action-box" style="background:' + globalSc.color + '11;border-color:' + globalSc.color + '">'
    + '<div class="action-label" style="color:' + globalSc.color + '">DIAGNÓSTICO CONSOLIDADO · ' + risk.totalPairs + ' POOLS</div>'
    + '<div class="action-title" style="color:' + globalSc.color + '">' + globalSc.action + '</div>'
    + '<div class="action-desc" style="color:' + globalSc.color + 'cc">' + globalSc.actionDesc + '</div>'
    + '</div>';

  // Pair tabs
  html += renderPairTabs(pairs, risk, tokenAddr);

  document.getElementById('result').innerHTML = html;

  // Now fetch authorities once (same mint for all pairs)
  pairs.forEach(function(p, i) {
    fetchAuthorities(tokenAddr, 'auth-container-' + i);
  });

  // Store for copy
  currentToken = { name: name, symbol: sym, address: tokenAddr, risk: risk };
}

// ─────────────────────────────────────────────
// REANALYZE
// ─────────────────────────────────────────────
function reanalyze() {
  if (currentAddress) {
    document.getElementById('addressInput').value = currentAddress;
    analyze();
  }
}

// ─────────────────────────────────────────────
// ANALYZE
// ─────────────────────────────────────────────
function analyze() {
  var q = document.getElementById('addressInput').value.trim();
  var errEl = document.getElementById('inputError');
  var inputEl = document.getElementById('addressInput');

  errEl.style.display = 'none';
  inputEl.classList.remove('error');

  if (!q) return;

  if (!isValidSolanaAddress(q)) {
    errEl.textContent = 'Endereço inválido. Um endereço Solana válido tem entre 32 e 44 caracteres alfanuméricos.';
    errEl.style.display = 'block';
    inputEl.classList.add('error');
    return;
  }

  currentAddress = q;
  var btn = document.getElementById('analyzeBtn');
  btn.disabled = true;
  btn.textContent = 'Analisando...';
  currentToken = null;
  allPairsData = [];
  document.getElementById('result').innerHTML = '<div class="loading"><div class="spinner"></div>Buscando dados na blockchain...</div>';

  fetch('https://okx-rugpull-proxy.vercel.app/api/proxy?address=' + q)
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(function(data) {
      var pairs = Array.isArray(data) ? data : [];
      if (pairs.length === 0) { renderNotFound(q); return; }
      // Sort by liquidity desc
      pairs.sort(function(a,b){ return ((b.liquidity&&b.liquidity.usd)||0) - ((a.liquidity&&a.liquidity.usd)||0); });
      analysisTime = new Date();
      renderAllPairs(pairs, q);
    })
    .catch(function(e) {
      document.getElementById('result').innerHTML = '<div class="error-box"><div class="error-title">Erro ao buscar dados</div><div class="error-msg">' + e.message + '</div></div>';
    })
    .finally(function() {
      btn.disabled = false;
      btn.textContent = 'Analisar →';
    });
}

document.getElementById('addressInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') analyze();
});
</script>
</body>
</html>
