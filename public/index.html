<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rug Pull Detector</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #080c12; color: #e0e0e0; min-height: 100vh; padding-bottom: 40px; }
  a { color: inherit; text-decoration: none; }

  .header { background: #0a0e16; border-bottom: 0.5px solid #1a2030; padding: 12px 24px; display: flex; align-items: center; margin-bottom: 24px; }
  .header-logo { width: 30px; height: 30px; background: linear-gradient(135deg, #1D9E75, #378ADD); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0; }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .header-title { font-size: 14px; font-weight: 500; color: #fff; }
  .header-sub { font-size: 10px; color: #444; }

  .container { max-width: 780px; margin: 0 auto; padding: 0 20px; }
  .card { background: #0d1117; border: 0.5px solid #1e2530; border-radius: 12px; padding: 14px 16px; margin-bottom: 12px; }
  .card-title { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }

  .search-wrap { display: flex; gap: 10px; align-items: center; }
  .search-input { flex: 1; font-size: 13px; padding: 10px 14px; border-radius: 8px; border: 0.5px solid #1e2530; outline: none; color: #e0e0e0; background: #060a10; font-family: inherit; }
  .search-input.error { border-color: #E24B4A55; }
  .search-btn { padding: 10px 22px; border-radius: 8px; background: #1D9E75; color: #fff; font-size: 13px; font-weight: 500; border: none; cursor: pointer; white-space: nowrap; }
  .search-btn:disabled { background: #1a2030; cursor: not-allowed; }
  .input-error { font-size: 11px; color: #E24B4A; margin-top: 6px; padding: 0 2px; }

  .history-wrap { margin-top: 10px; display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .history-label { font-size: 10px; color: #444; flex-shrink: 0; }
  .history-btn { font-size: 11px; padding: 3px 8px; border-radius: 5px; border: 0.5px solid #1e2530; background: #060a10; color: #666; cursor: pointer; max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .history-btn:hover { color: #999; border-color: #2a3040; }

  .loading { text-align: center; padding: 48px 0; color: #444; font-size: 13px; }
  .spinner { width: 28px; height: 28px; border: 2px solid #1e2530; border-top: 2px solid #1D9E75; border-radius: 50%; margin: 0 auto 14px; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-box { background: #1a0808; border: 0.5px solid rgba(226,75,74,0.2); border-radius: 12px; padding: 24px; text-align: center; margin-bottom: 12px; }
  .error-title { font-size: 14px; font-weight: 500; color: #E24B4A; margin-bottom: 6px; }
  .error-msg { font-size: 12px; color: #884444; line-height: 1.6; }

  .not-found-box { background: #0d1117; border: 1.5px solid #EF9F27; border-radius: 14px; padding: 20px; margin-bottom: 12px; }
  .not-found-title { font-size: 15px; font-weight: 500; color: #EF9F27; margin-bottom: 6px; }
  .not-found-msg { font-size: 12px; color: #888; line-height: 1.7; margin-bottom: 16px; }
  .steps-box { background: #060a10; border: 0.5px solid #1e2530; border-radius: 10px; padding: 14px 16px; margin-bottom: 14px; }
  .steps-title { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
  .step { display: flex; gap: 10px; margin-bottom: 10px; }
  .step:last-child { margin-bottom: 0; }
  .step-num { width: 20px; height: 20px; border-radius: 50%; background: #EF9F2722; border: 0.5px solid #EF9F2755; color: #EF9F27; font-size: 10px; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
  .step-title { font-size: 12px; font-weight: 500; color: #e0e0e0; margin-bottom: 2px; }
  .step-desc { font-size: 11px; color: #666; line-height: 1.5; }
  .not-found-links { display: flex; gap: 8px; flex-wrap: wrap; }
  .nf-btn { font-size: 12px; padding: 7px 14px; border-radius: 8px; border: 0.5px solid; cursor: pointer; display: inline-block; }

  /* CONSOLIDATED CARD */
  .consolidated-card { border-radius: 12px; padding: 16px 18px; margin-bottom: 12px; border: 1.5px solid; }
  .consolidated-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
  .consolidated-left { flex: 1; }
  .consolidated-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; font-weight: 500; }
  .consolidated-title { font-size: 18px; font-weight: 500; margin-bottom: 4px; }
  .consolidated-desc { font-size: 12px; line-height: 1.6; opacity: 0.85; margin-bottom: 4px; }
  .consolidated-stats { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 0.5px solid #1e253088; }
  .consolidated-stat-label { font-size: 10px; color: #555; margin-bottom: 2px; }
  .consolidated-stat-value { font-size: 14px; font-weight: 500; }

  /* CRITICAL POINTS STRIP */
  .critical-points { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 0.5px solid #1e253088; }
  .critical-point { display: flex; align-items: center; gap: 5px; font-size: 11px; padding: 4px 9px; border-radius: 5px; border: 0.5px solid; }
  .critical-point-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

  /* POOL STATUS */
  .pool-status-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
  .pool-status-row { display: flex; align-items: center; gap: 8px; font-size: 11px; padding: 6px 10px; border-radius: 6px; background: #060a1066; }
  .pool-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .pool-row-link { color: #555; font-family: monospace; font-size: 10px; text-decoration: underline; text-decoration-color: #2a3040; }
  .pool-row-link:hover { color: #888; }

  /* TOKEN STRIP */
  .token-strip { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 10px 12px; background: #060a1088; border: 0.5px solid #1e2530; border-radius: 8px; flex-wrap: wrap; }
  .token-strip-name { font-size: 12px; font-weight: 500; color: #e0e0e0; }
  .token-strip-addr { font-size: 10px; color: #7F77DD; font-family: monospace; word-break: break-all; margin-top: 2px; }
  .token-strip-links { display: flex; gap: 6px; flex-shrink: 0; flex-wrap: wrap; }
  .token-strip-link { font-size: 11px; padding: 3px 9px; border-radius: 5px; border: 0.5px solid #1e2530; color: #666; background: #060a10; white-space: nowrap; }
  .token-strip-link:hover { color: #999; }

  /* ACTION BOX */
  .action-box { border-radius: 12px; padding: 14px 16px; margin-bottom: 12px; border: 1.5px solid; }
  .action-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; font-weight: 500; }
  .action-title { font-size: 15px; font-weight: 500; margin-bottom: 5px; }
  .action-desc { font-size: 12px; line-height: 1.6; opacity: 0.85; }

  .diag-box { background: #0a0e16; border-radius: 14px; padding: 18px 20px; margin-bottom: 12px; }
  .diag-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 14px; gap: 12px; }
  .diag-label { font-size: 10px; color: #555; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
  .diag-title { font-size: 20px; font-weight: 500; margin-bottom: 4px; }
  .diag-sub { font-size: 12px; color: #888; }
  .flags { display: flex; flex-direction: column; gap: 5px; }
  .flag-item { display: flex; gap: 8px; align-items: flex-start; border-radius: 7px; padding: 8px 12px; }
  .flag-badge { font-size: 9px; font-weight: 500; padding: 2px 5px; border-radius: 3px; flex-shrink: 0; margin-top: 1px; white-space: nowrap; }
  .flag-tech { font-size: 10px; color: #555; margin-top: 2px; }

  .diag-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 14px; gap: 10px; }
  .reanalyze-btn { font-size: 11px; padding: 6px 12px; border-radius: 6px; border: 0.5px solid #1e2530; background: #060a10; color: #555; cursor: pointer; }
  .reanalyze-btn:hover { color: #999; }
  .copy-btn { font-size: 11px; padding: 6px 14px; border-radius: 6px; border: 0.5px solid #1e2530; background: #060a10; color: #666; cursor: pointer; }
  .copy-btn.copied { border-color: #1D9E75; color: #1D9E75; background: #081a12; }
  .data-ts { font-size: 10px; color: #333; }

  /* PAIR TABS */
  .pair-tabs-wrap { margin-bottom: 12px; }
  .pair-tabs-header { display: flex; border-bottom: 0.5px solid #1e2530; overflow-x: auto; }
  .pair-tab { padding: 9px 16px; font-size: 12px; cursor: pointer; border-bottom: 2px solid transparent; color: #555; white-space: nowrap; display: flex; align-items: center; gap: 6px; transition: color 0.15s; }
  .pair-tab:hover { color: #999; }
  .pair-tab.active { color: #e0e0e0; border-bottom-color: #1D9E75; }
  .pair-tab.tab-rug.active  { border-bottom-color: #E24B4A; color: #E24B4A; }
  .pair-tab.tab-crit.active { border-bottom-color: #E24B4A; color: #E24B4A; }
  .pair-tab.tab-high.active { border-bottom-color: #EF9F27; color: #EF9F27; }
  .pair-tab.tab-med.active  { border-bottom-color: #7F77DD; color: #7F77DD; }
  .pair-tab.tab-concl.active { border-bottom-color: #378ADD; color: #378ADD; }
  .pair-tab-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .pair-tab-content { display: none; }
  .pair-tab-content.active { display: block; padding-top: 12px; }

  /* CONCLUSION TAB */
  .concl-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .concl-icon { width: 36px; height: 36px; border-radius: 10px; background: #378ADD22; border: 0.5px solid #378ADD44; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .concl-title { font-size: 16px; font-weight: 500; color: #e0e0e0; }
  .concl-sub { font-size: 11px; color: #555; margin-top: 2px; }
  .concl-verdicts { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .concl-verdict { display: flex; align-items: flex-start; gap: 10px; padding: 12px 14px; border-radius: 10px; border: 0.5px solid; }
  .concl-verdict-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
  .concl-verdict-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .concl-verdict-text { font-size: 12px; line-height: 1.6; color: #ccc; }
  .concl-summary { background: #060a10; border: 0.5px solid #1e2530; border-radius: 10px; padding: 14px 16px; margin-bottom: 12px; }
  .concl-summary-title { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
  .concl-summary-text { font-size: 12px; color: #888; line-height: 1.8; }
  .concl-copy-btn { width: 100%; padding: 10px; border-radius: 8px; border: 0.5px solid #1e2530; background: #060a10; color: #666; font-size: 12px; cursor: pointer; margin-top: 4px; }
  .concl-copy-btn:hover { color: #999; }
  .concl-copy-btn.copied { border-color: #1D9E75; color: #1D9E75; background: #081a12; }

  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .grid4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; }

  .stat { background: #060a10; border: 0.5px solid #1e2530; border-radius: 8px; padding: 10px 12px; }
  .stat-label { font-size: 10px; color: #555; margin-bottom: 3px; }
  .stat-value { font-size: 14px; font-weight: 500; color: #e0e0e0; }
  .stat.alert-yellow { border-color: #EF9F2744; background: #1f1208; }
  .stat.alert-red { border-color: #E24B4A44; background: #200808; }

  .rug-confirm-hint { background: #130808; border: 0.5px solid #5a151533; border-radius: 8px; padding: 12px 14px; margin-top: 8px; font-size: 11px; color: #999; line-height: 1.8; }
  .rug-confirm-hint strong { color: #e0e0e0; }
  .rug-confirm-hint ol { margin: 8px 0 8px 16px; }
  .rug-confirm-hint ol li { margin-bottom: 4px; }
  .rug-confirm-link { color: #E24B4A; text-decoration: underline; }

  .liq-disclaimer { font-size: 10px; color: #444; margin-top: 8px; }
  .liq-disclaimer a { color: #555; text-decoration: underline; }

  .bar-wrap { height: 4px; border-radius: 2px; background: #1e2530; overflow: hidden; margin-top: 6px; }
  .bar-fill { height: 100%; border-radius: 2px; }
  .buysell-wrap { margin-top: 10px; }
  .buysell-labels { display: flex; justify-content: space-between; font-size: 10px; color: #555; margin-bottom: 3px; }
  .buysell-bar { height: 4px; border-radius: 2px; background: #3a1a1a; overflow: hidden; }
  .buysell-fill { height: 100%; background: #1D9E75; border-radius: 2px; }

  .score-ring { display: flex; flex-direction: column; align-items: center; gap: 4px; flex-shrink: 0; }
  .score-lbl { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 0.5px; }

  .supply-inner { background: #060a10; border: 0.5px solid #1e2530; border-radius: 8px; padding: 12px 14px; }
  .supply-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .supply-text { font-size: 12px; font-weight: 500; margin-bottom: 2px; }
  .supply-sub { font-size: 11px; color: #555; }
  .supply-pct { font-size: 18px; font-weight: 500; flex-shrink: 0; margin-left: 12px; }
  .supply-foot { display: flex; justify-content: space-between; font-size: 10px; color: #444; margin-top: 4px; }

  .footer { text-align: center; font-size: 10px; color: #1e2530; margin-top: 8px; }
  .liq-big { font-size: 20px; font-weight: 500; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-logo">R</div>
    <div>
      <div class="header-title">Rug Pull Detector <span style="font-size:10px;color:#444;font-weight:400">v5.4</span></div>
      <div class="header-sub">Token Risk Analyzer · Solana</div>
    </div>
  </div>
</div>

<div class="container">
  <div class="card">
    <div class="search-wrap">
      <input class="search-input" id="addressInput" placeholder="Cole o contract address do token Solana..." />
      <button class="search-btn" id="analyzeBtn" onclick="analyze()">Analisar →</button>
    </div>
    <div id="inputError" class="input-error" style="display:none"></div>
    <div class="history-wrap" id="historyWrap" style="display:none">
      <span class="history-label">Recentes:</span>
      <div id="historyList" style="display:flex;gap:6px;flex-wrap:wrap"></div>
    </div>
  </div>
  <div id="result"></div>
  <div class="footer">Feito por Vinicius Fernandes · Solana</div>
</div>

<script>
var currentToken = null;
var analysisTime = null;
var currentAddress = null;
var sessionHistory = [];
var allPairsData = [];
var PROXY_BASE = 'https://okx-rugpull-proxy.vercel.app';

// ─────────────────────────────────────────────
// UTILITIES
// ─────────────────────────────────────────────
function isValidSolanaAddress(a) { return /^[1-9A-HJ-NP-Za-km-z]{32,44}$/.test(a); }
function fmt(n) {
  if (n==null||isNaN(n)) return '—';
  if (n>=1e6) return '$'+(n/1e6).toFixed(2)+'M';
  if (n>=1e3) return '$'+(n/1e3).toFixed(2)+'K';
  return '$'+Number(n).toFixed(2);
}
function pct(n) { if(n==null) return '—'; var v=Number(n).toFixed(2); return (Number(v)>0?'+':'')+v+'%'; }
function pctColor(v) { if(v==null) return '#666'; return Number(v)>=0?'#1D9E75':'#E24B4A'; }
function timeAgo(ts) {
  if (!ts) return '—';
  var diff=Date.now()-ts, d=Math.floor(diff/86400000), h=Math.floor(diff/3600000), m=Math.floor(diff/60000);
  if(d>0) return d+(d>1?' dias':' dia')+' atrás';
  if(h>0) return h+(h>1?' horas':' hora')+' atrás';
  return m+' min atrás';
}
function ageDays(ts) { return ts?(Date.now()-ts)/86400000:999; }
function shortAddr(a) { if(!a) return '—'; return a.substring(0,6)+'...'+a.substring(a.length-4); }

// ─────────────────────────────────────────────
// HISTORY
// ─────────────────────────────────────────────
function addToHistory(addr,name,sym) {
  sessionHistory=sessionHistory.filter(function(h){return h.addr!==addr;});
  sessionHistory.unshift({addr:addr,label:(sym||addr.substring(0,8)+'...')+(name?' · '+name.substring(0,12):'')});
  if(sessionHistory.length>5) sessionHistory=sessionHistory.slice(0,5);
  renderHistory();
}
function renderHistory() {
  if(sessionHistory.length===0){document.getElementById('historyWrap').style.display='none';return;}
  document.getElementById('historyWrap').style.display='flex';
  document.getElementById('historyList').innerHTML=sessionHistory.map(function(h){
    return '<button class="history-btn" title="'+h.addr+'" onclick="loadHistory(\''+h.addr+'\')">'+h.label+'</button>';
  }).join('');
}
function loadHistory(addr){document.getElementById('addressInput').value=addr;analyze();}

// ─────────────────────────────────────────────
// SCORE RING
// ─────────────────────────────────────────────
function scoreRing(score,color) {
  var r=28,circ=2*Math.PI*r,dash=circ*(1-score/100);
  return '<svg width="72" height="72" style="transform:rotate(-90deg)">'
    +'<circle cx="36" cy="36" r="'+r+'" fill="none" stroke="#1e2530" stroke-width="5"/>'
    +'<circle cx="36" cy="36" r="'+r+'" fill="none" stroke="'+color+'" stroke-width="5" stroke-dasharray="'+circ+'" stroke-dashoffset="'+dash+'" stroke-linecap="round"/>'
    +'<text x="36" y="36" text-anchor="middle" dominant-baseline="central" style="transform:rotate(90deg);transform-origin:36px 36px;font-size:16px;font-weight:600;fill:'+color+'">'+score+'</text>'
    +'</svg>';
}

// ─────────────────────────────────────────────
// FLAGS + SCORE (accumulative)
// Max raw without RUG: 35+20+25+25+15+20+10+5+20+30+15+20+10+15 = 265
// ─────────────────────────────────────────────
var MAX_RAW = 265;

function getScoreAndFlags(liq, vol, buys, sells, fdv, mkt, pairCreatedAt, pc24, liqBase, liqQuote) {
  var flags=[], rawScore=0;
  var total=buys+sells;
  var sellRatio=total>0?(sells/total)*100:50;
  var buyRatio =total>0?(buys/total)*100:50;
  var age=ageDays(pairCreatedAt);
  var pc24n = pc24!=null ? Number(pc24) : null;

  // ── RUG (short-circuit) ──
  if (liq<5) {
    flags.push({key:'RUG', agent:'A liquidez deste pool é praticamente zero ('+fmt(liq)+'). O cliente não conseguirá vender — liquidez possivelmente removida.', tech:'Liquidez menor que $5.'});
    return {rawScore:100, flags:flags};
  }

  // ── LIQUIDEZ ──
  if (liq<1000) {
    rawScore+=35;
    flags.push({key:'LIQ_HI', agent:'Liquidez insuficiente para qualquer troca. A venda pode falhar ou resultar em grande perda de valor.', tech:'Liquidez crítica de '+fmt(liq)+'.'});
  } else if (liq<5000) {
    rawScore+=15;
    flags.push({key:'LIQ_MED', agent:'Liquidez baixa — o cliente pode conseguir vender mas receberá menos do que o valor exibido.', tech:'Liquidez de '+fmt(liq)+'.'});
  }

  // ── VOLUME DESPROPORCIONAL ──
  if (vol>liq*10) {
    rawScore+=20;
    flags.push({key:'VOL', agent:'Volume desproporcional à liquidez — possíveis transações artificiais para simular atividade.', tech:'Volume 24h ('+fmt(vol)+') é '+Math.round(vol/liq)+'x maior que a liquidez.'});
  }

  // ── IDADE ──
  if (age<1) {
    rawScore+=25;
    flags.push({key:'AGE_HI', agent:'Token criado há menos de 24 horas. Histórico insuficiente para avaliação.', tech:'Par criado há '+timeAgo(pairCreatedAt)+'.'});
  } else if (age<7) {
    rawScore+=10;
    flags.push({key:'AGE_MED', agent:'Token com menos de 7 dias de existência. Histórico limitado.', tech:'Par criado há '+timeAgo(pairCreatedAt)+'.'});
  }

  // ── DUMP EM ANDAMENTO ──
  if (pc24n!=null && pc24n<=-90) {
    rawScore+=25;
    flags.push({key:'DUMP', agent:'Queda de '+Math.abs(pc24n).toFixed(1)+'% nas últimas 24h — possível dump em andamento ou rug pull em curso.', tech:'Variação 24h: '+pct(pc24)+'.'});
  }

  // ── PRESSÃO VENDEDORA ──
  if (sellRatio>80 && total>0) {
    rawScore+=15;
    flags.push({key:'SELL', agent:'Mais de 80% das transações são vendas. Pressão vendedora anormal — possível dump coordenado.', tech:Math.round(sellRatio)+'% das transações são vendas.'});
  }

  // ── POOL ABANDONADA ──
  if (total===0) {
    rawScore+=20;
    flags.push({key:'ABANDON', agent:'Nenhuma transação nas últimas 24 horas. Pool inativa — liquidez pode estar travada ou sem interesse de mercado.', tech:'Zero transações nas últimas 24h.'});
  }

  // ── PUMP ARTIFICIAL ──
  if (buyRatio>90 && total>0) {
    rawScore+=10;
    flags.push({key:'PUMP', agent:'Quase todas as transações são compras, sem vendas equilibradas. Possível pump artificial.', tech:Math.round(buyRatio)+'% das transações são compras.'});
  }

  // ── SUPPLY TOTAL ──
  if (fdv>0 && mkt>0 && Math.abs(fdv-mkt)/fdv<0.01) {
    rawScore+=5;
    flags.push({key:'SUPPLY', agent:'100% do supply já está em circulação. O criador pode vender qualquer quantidade sem restrições de prazo.', tech:'FDV igual ao Market Cap.'});
  }

  // ── TOKEN MORTO ──
  if (vol<500 && age>7 && total<50) {
    rawScore+=20;
    flags.push({key:'DEAD', agent:'Volume extremamente baixo para um token com mais de 7 dias. Pool praticamente inativa — dificilmente haverá liquidez suficiente para executar uma venda.', tech:'Volume 24h de apenas '+fmt(vol)+' com '+total+' transações.'});
  }

  // ── PUMP & DUMP ──
  if (pc24n!=null && pc24n<=-85 && vol<500 && age>7) {
    rawScore+=30;
    flags.push({key:'PUMP_DUMP', agent:'Padrão consistente com pump & dump: queda severa de preço após período de alta atividade histórica. O token perdeu quase todo o valor desde o lançamento.', tech:'Queda de '+Math.abs(pc24n).toFixed(1)+'% em 24h com volume atual de apenas '+fmt(vol)+'.'});
  }

  // ── LIQUIDEZ vs MARKET CAP ──
  if (mkt>0 && liq>0 && liq<mkt*0.01) {
    rawScore+=15;
    flags.push({key:'LIQ_MCAP', agent:'A liquidez disponível é inferior a 1% do Market Cap. Qualquer venda de volume médio vai colapsar o preço antes de ser executada.', tech:'Liquidez ('+fmt(liq)+') é apenas '+((liq/mkt)*100).toFixed(2)+'% do Market Cap ('+fmt(mkt)+').'});
  }

  // ── FDV ALTÍSSIMO vs LIQUIDEZ ──
  if (fdv>0 && liq>0 && fdv>liq*1000) {
    rawScore+=20;
    flags.push({key:'FDV_LIQ', agent:'O valor total do token no papel é mais de 1000x maior que a liquidez disponível. É praticamente impossível liquidar qualquer posição relevante.', tech:'FDV ('+fmt(fdv)+') é '+Math.round(fdv/liq)+'x maior que a liquidez ('+fmt(liq)+').'});
  }

  // ── PREÇO PRÓXIMO DE ZERO ──
  if (mkt>0 && fdv>0 && mkt<100) {
    rawScore+=10;
    flags.push({key:'NEAR_ZERO', agent:'Market Cap abaixo de $100. O token praticamente não possui valor de mercado — venda pode resultar em valor irrisório para o cliente.', tech:'Market Cap de apenas '+fmt(mkt)+'.'});
  }

  // ── SPREAD EXTREMO (quase só token, pouco SOL) ──
  if (liqBase>0 && liqQuote>0) {
    var totalLiqTokens = liqBase + liqQuote;
    var baseRatio = (liqBase / totalLiqTokens) * 100;
    if (baseRatio > 99) {
      rawScore+=15;
      flags.push({key:'SPREAD', agent:'O pool contém quase exclusivamente tokens e muito pouco SOL. Qualquer tentativa de venda vai colapsar o preço imediatamente por falta de contraparte.', tech:'Token representa '+baseRatio.toFixed(1)+'% da liquidez do pool.'});
    }
  }

  if (flags.length===0) {
    flags.push({key:'OK', agent:'Nenhum sinal de alerta automático detectado. Análise manual recomendada.', tech:'Nenhuma flag crítica detectada.'});
  }

  return {rawScore:rawScore, flags:flags};
}

function normalizeScore(raw) {
  if (raw>=100) return 100;
  return Math.min(99, Math.round((raw/MAX_RAW)*99));
}

function scoreToScenario(score) {
  if (score>=100) return {label:'Rug Pull',           color:'#E24B4A', level:'RUG',  action:'NÃO confirme a possibilidade de venda ao cliente.',      actionDesc:'A liquidez deste pool foi removida. O token existe na carteira mas não pode ser vendido.'};
  if (score>=75)  return {label:'Alto Risco Crítico', color:'#E24B4A', level:'CRIT', action:'Não confirme a venda. Riscos críticos detectados.',        actionDesc:'Este pool apresenta sinais críticos acumulados. A venda pode não ser possível ou resultar em perda severa.'};
  if (score>=46)  return {label:'Alto Risco',         color:'#EF9F27', level:'HIGH', action:'Não garanta a venda. Oriente o cliente com cautela.',      actionDesc:'Múltiplos sinais de alerta detectados. A venda pode não ser possível ou resultar em perda significativa.'};
  if (score>=21)  return {label:'Atenção',            color:'#7F77DD', level:'MED',  action:'Oriente o cliente sobre os riscos antes de prosseguir.',  actionDesc:'Sinais de atenção detectados. A venda pode ser possível mas há riscos.'};
  return                  {label:'Normal',             color:'#1D9E75', level:'OK',   action:'Nenhum sinal crítico detectado. Prossiga com análise manual.', actionDesc:'Os dados automáticos não indicam fraude.'};
}

function getConsolidatedRisk(pairs) {
  var totalLiq=0, rugCount=0, weightedSum=0, totalWeight=0;
  var pairStatuses=[], allFlags=[];

  pairs.forEach(function(p,i) {
    var liq  =(p.liquidity&&p.liquidity.usd)||0;
    var vol  =(p.volume&&p.volume.h24)||0;
    var buys =(p.txns&&p.txns.h24&&p.txns.h24.buys)||0;
    var sells=(p.txns&&p.txns.h24&&p.txns.h24.sells)||0;
    var fdv  =p.fdv||0, mkt=p.marketCap||0;
    var pc24 =p.priceChange&&p.priceChange.h24;
    var liqB =(p.liquidity&&p.liquidity.base)||0;
    var liqQ =(p.liquidity&&p.liquidity.quote)||0;
    totalLiq+=liq;
    var result=getScoreAndFlags(liq,vol,buys,sells,fdv,mkt,p.pairCreatedAt,pc24,liqB,liqQ);
    var score=normalizeScore(result.rawScore);
    var sc=scoreToScenario(score);
    var weight=sc.level==='RUG'?3:sc.level==='CRIT'?2:1;
    weightedSum+=score*weight; totalWeight+=weight;
    if(sc.level==='RUG') rugCount++;
    // Collect unique flag keys across all pools for consolidated view
    result.flags.forEach(function(f){
      if(f.key!=='OK' && allFlags.indexOf(f.key)<0) allFlags.push(f.key);
    });
    pairStatuses.push({dex:p.dexId||'—',pairAddr:p.pairAddress||'',liq:liq,level:sc.level,color:sc.color,label:sc.label,score:score,flags:result.flags});
  });

  var total=pairs.length, activeCount=total-rugCount;
  var consolidatedScore,sc,label,actionTitle,actionDesc;

  if(rugCount===total){
    consolidatedScore=100; sc=scoreToScenario(100);
    label='Rug Pull Confirmado';
    actionTitle='NÃO confirme a possibilidade de venda ao cliente.';
    actionDesc='Todas as '+total+' pools tiveram liquidez removida.';
  } else {
    consolidatedScore=Math.min(99,Math.round(weightedSum/totalWeight));
    sc=scoreToScenario(consolidatedScore);
    if(rugCount>0){
      label='Rug Pull em '+rugCount+' Pool'+(rugCount>1?'s':'')+' · '+activeCount+' ainda ativa'+(activeCount>1?'s':'');
      actionTitle='Atenção: parte da liquidez foi removida.';
      actionDesc=rugCount+' de '+total+' pools com liquidez removida. '+activeCount+' pool'+(activeCount>1?' ainda estão ativas':' ainda está ativa')+' — verifique cada pool nas abas abaixo.';
    } else {
      label=sc.label; actionTitle=sc.action; actionDesc=sc.actionDesc;
    }
  }

  return {totalLiq,rugCount,totalPairs:total,activeCount,level:rugCount===total?'RUG':sc.level,color:rugCount===total?'#E24B4A':sc.color,score:consolidatedScore,label,actionTitle,actionDesc,pairStatuses,allFlags};
}

function renderSupply(fdv,mkt) {
  var diff=fdv-mkt, pctOut=fdv>0?(diff/fdv)*100:0;
  var isEqual=Math.abs(pctOut)<1;
  var color=isEqual?'#1D9E75':pctOut<20?'#1D9E75':pctOut<50?'#EF9F27':'#E24B4A';
  var label=isEqual?'100% do supply em circulação — nenhum token bloqueado'
    :pctOut<20?Math.round(pctOut)+'% fora de circulação — diferença pequena, risco baixo'
    :pctOut<50?Math.round(pctOut)+'% fora de circulação — quantidade relevante, monitorar'
    :Math.round(pctOut)+'% ainda não circula — risco alto de pressão vendedora futura';
  var barW=Math.min(100,Math.max(0,100-pctOut));
  return '<div class="supply-inner">'
    +'<div class="supply-row"><div><div class="supply-text" style="color:'+color+'">'+label+'</div>'
    +(!isEqual?'<div class="supply-sub">Valor estimado fora de circulação: '+fmt(diff>0?diff:0)+'</div>':'')
    +'</div><div class="supply-pct" style="color:'+color+'">'+(isEqual?'0%':Math.round(pctOut)+'%')+'</div></div>'
    +'<div class="bar-wrap"><div class="bar-fill" style="width:'+barW+'%;background:'+color+'"></div></div>'
    +'<div class="supply-foot"><span>Em circulação: '+fmt(mkt)+'</span><span>FDV total: '+fmt(fdv)+'</span></div>'
    +'</div>';
}

function buildConclusion(risk, tokenName, tokenSym) {
  // Determine which verdicts to show based on flags across all pools
  var shownVerdicts = [];
  var flagSet = risk.allFlags;

  // Priority order for verdicts
  var verdictOrder = ['RUG','PUMP_DUMP','DEAD','DUMP','SELL','VOL','FDV_LIQ','LIQ_MCAP','SPREAD','NEAR_ZERO'];
  verdictOrder.forEach(function(key) {
    if (flagSet.indexOf(key) >= 0 && VERDICT_DEFS[key]) {
      shownVerdicts.push(key);
    }
  });

  // If rug detected from rugCount
  if (risk.rugCount > 0 && shownVerdicts.indexOf('RUG') < 0) {
    shownVerdicts.unshift('RUG');
  }

  // Build summary text
  var summaryParts = [];
  if (risk.rugCount === risk.totalPairs) {
    summaryParts.push('Todas as '+risk.totalPairs+' pools tiveram liquidez removida. O cliente não conseguirá vender em nenhuma plataforma descentralizada.');
  } else if (risk.rugCount > 0) {
    summaryParts.push(risk.rugCount+' de '+risk.totalPairs+' pools tiveram liquidez removida. Ainda há '+risk.activeCount+' pool'+(risk.activeCount>1?' ativas':' ativa')+', mas com risco elevado.');

    +'<div class="concl-summary">'
    +'<div class="concl-summary-title">Resumo para o agente</div>'
    +'<div class="concl-summary-text">'+summaryText+'</div>'
    +'</div>'
    +'<button class="concl-copy-btn" id="conclusionCopyBtn" onclick="copyConclusionNote()">Copiar conclusão para internal note</button>'
    +'</div>';
}

function copyConclusionNote() {
  if (!currentToken) return;
  var risk = currentToken.risk;
  var lines = [
    '=== Conclusão · Rug Pull Detector v5.4 ===',
    'Token: '+currentToken.name+' ('+currentToken.symbol+')',
    'Contract: '+currentToken.address,
    'Analisado em: '+(analysisTime?analysisTime.toLocaleString('pt-BR'):''),
    'Risk Score Consolidado: '+risk.score+'/100',
    'Diagnóstico: '+risk.label,
    '',
    'Pontos críticos: '+(risk.allFlags.length>0?risk.allFlags.map(function(k){return FLAG_SHORT[k]||k;}).join(', '):'Nenhum'),
    '',
    'Pools analisadas: '+risk.totalPairs,
  ];
  if (risk.rugCount>0) lines.push('Pools com rug pull: '+risk.rugCount);
  lines.push('Liquidez total: '+fmt(risk.totalLiq));
  risk.pairStatuses.forEach(function(ps,i){
    lines.push('Pool '+(i+1)+' ('+ps.dex+'): '+fmt(ps.liq)+' · '+ps.label+' · Score '+ps.score);
  });
  var text = lines.join('\n');
  navigator.clipboard.writeText(text).then(function() {
    var btn = document.getElementById('conclusionCopyBtn');
    if (btn) { btn.textContent='✓ Copiado!'; btn.classList.add('copied'); setTimeout(function(){ btn.textContent='Copiar conclusão para internal note'; btn.classList.remove('copied'); },2500); }
  });
}

// ─────────────────────────────────────────────
// PAIR TABS
// ─────────────────────────────────────────────
function tabClass(level) {
  if(level==='RUG')  return 'tab-rug';
  if(level==='CRIT') return 'tab-crit';
  if(level==='HIGH') return 'tab-high';
  if(level==='MED')  return 'tab-med';
  return '';
}

function renderPairTabs(pairs, risk, tokenAddr, tokenName, tokenSym) {
  var tabs='', contents='';
  pairs.forEach(function(p,i) {
    var liq  =(p.liquidity&&p.liquidity.usd)||0;
    var vol  =(p.volume&&p.volume.h24)||0;
    var buys =(p.txns&&p.txns.h24&&p.txns.h24.buys)||0;
    var sells=(p.txns&&p.txns.h24&&p.txns.h24.sells)||0;
    var fdv  =p.fdv||0, mkt=p.marketCap||0;
    var pc24 =p.priceChange&&p.priceChange.h24;
    var liqB =(p.liquidity&&p.liquidity.base)||0;
    var liqQ =(p.liquidity&&p.liquidity.quote)||0;
    var result=getScoreAndFlags(liq,vol,buys,sells,fdv,mkt,p.pairCreatedAt,pc24,liqB,liqQ);
    var score=normalizeScore(result.rawScore);
    var sc=scoreToScenario(score);
    tabs+='<div class="pair-tab '+tabClass(sc.level)+(i===0?' active':'')+'" onclick="switchTab('+i+')" id="tab-btn-'+i+'">'
      +'<div class="pair-tab-dot" style="background:'+sc.color+'"></div>'
      +'Pool '+(i+1)+' · '+(p.dexId||'—')+'</div>';
    contents+='<div class="pair-tab-content'+(i===0?' active':'')+'" id="tab-content-'+i+'">'
      +renderPairContent(p,result.flags,sc,score,tokenAddr,i)+'</div>';
  });
  // Conclusion tab (always last)
  var conclusionTabIdx = pairs.length;
  tabs+='<div class="pair-tab tab-concl" onclick="switchTab('+conclusionTabIdx+')" id="tab-btn-'+conclusionTabIdx+'">🔍 Conclusão</div>';
  contents+='<div class="pair-tab-content" id="tab-content-'+conclusionTabIdx+'">'+buildConclusion(risk, tokenName, tokenSym)+'</div>';

  return '<div class="pair-tabs-wrap"><div class="pair-tabs-header">'+tabs+'</div>'+contents+'</div>';
}

function switchTab(idx) {
  document.querySelectorAll('.pair-tab').forEach(function(t){t.classList.remove('active');});
  document.querySelectorAll('.pair-tab-content').forEach(function(t){t.classList.remove('active');});
  var btn=document.getElementById('tab-btn-'+idx);
  var content=document.getElementById('tab-content-'+idx);
  if(btn) btn.classList.add('active');
  if(content) content.classList.add('active');
}

function renderPairContent(p, flags, sc, score, tokenAddr, idx) {
  var liq  =(p.liquidity&&p.liquidity.usd)||0;
  var vol  =(p.volume&&p.volume.h24)||0;
  var buys =(p.txns&&p.txns.h24&&p.txns.h24.buys)||0;
  var sells=(p.txns&&p.txns.h24&&p.txns.h24.sells)||0;
  var liqQ =(p.liquidity&&p.liquidity.quote)||0;
  var liqB =(p.liquidity&&p.liquidity.base)||0;
  var fdv  =p.fdv||0, mkt=p.marketCap||0;
  var sym  =(p.baseToken&&p.baseToken.symbol)||'—';
  var name =(p.baseToken&&p.baseToken.name)||'—';
  var pc   =p.priceChange||{};
  var total=buys+sells, buyPct=total>0?Math.round((buys/total)*100):0;
  var age  =ageDays(p.pairCreatedAt);
  var ageAlert=age<1?'alert-red':age<7?'alert-yellow':'';
  var liqColor=liq<5?'#E24B4A':liq<5000?'#EF9F27':'#1D9E75';
  var liqBarW=Math.min(100,(liq/100000)*100);
  var time=analysisTime?analysisTime.toLocaleString('pt-BR'):'';
  var isRug=sc.level==='RUG';
  var pairAddr=p.pairAddress||'';
  var solscanPoolUrl='https://solscan.io/account/'+pairAddr+'#defiactivities';
  var html='';

  html+='<div class="action-box" style="background:'+sc.color+'11;border-color:'+sc.color+'">'
    +'<div class="action-label" style="color:'+sc.color+'">O QUE FAZER NESTE POOL</div>'
    +'<div class="action-title" style="color:'+sc.color+'">'+sc.action+'</div>'
    +'<div class="action-desc" style="color:'+sc.color+'cc">'+sc.actionDesc+'</div>'
    +'</div>';

  html+='<div class="diag-box" style="border:1.5px solid '+sc.color+';box-shadow:0 0 20px '+sc.color+'33">'
    +'<div class="diag-header"><div>'
    +'<div class="diag-label">Pool '+(idx+1)+' · '+(p.dexId||'—')+' · '+time+'</div>'
    +'<div class="diag-title" style="color:'+sc.color+'">'+sc.label+'</div>'
    +'<div class="diag-sub">'+name+' · '+sym+'</div>'
    +'</div>'
    +'<div class="score-ring">'+scoreRing(score,sc.color)+'<div class="score-lbl">Pool Score</div></div>'
    +'</div>'
    +'<div class="flags">'+renderFlags(flags)+'</div>'
    +'<div class="diag-footer">'
    +'<div class="data-ts">Dados obtidos em '+time+'</div>'
    +'<div style="display:flex;gap:8px">'
    +'<button class="reanalyze-btn" onclick="reanalyze()">↻ Reanalisar</button>'
    +'<button class="copy-btn" id="copyBtn-'+idx+'" onclick="copyResume('+idx+')">Copiar para internal note</button>'
    +'</div></div>'
    +'</div>';

  html+='<div class="card"><div class="card-title">Liquidez (Pool '+(idx+1)+')</div>'
    +'<div class="grid3">'
    +'<div class="stat'+(isRug?' alert-red':'')+'"><div class="stat-label">Total (USD)</div><div class="liq-big" style="color:'+liqColor+'">'+fmt(liq)+'</div><div class="bar-wrap"><div class="bar-fill" style="width:'+liqBarW+'%;background:'+liqColor+'"></div></div></div>'
    +'<div class="stat"><div class="stat-label">Pooled SOL</div><div class="stat-value">'+Number(liqQ).toFixed(4)+' SOL</div></div>'
    +'<div class="stat"><div class="stat-label">Pooled '+sym+'</div><div class="stat-value">'+Number(liqB).toLocaleString()+'</div></div>'
    +'</div>'
    +'<div class="liq-disclaimer">⚠ Valor fornecido pelo DexScreener — pode ter delay. Para o valor atual, <a href="https://solscan.io/account/'+pairAddr+'" target="_blank">verifique o pool no Solscan ↗</a></div>';

  if (isRug && pairAddr) {
    html+='<div class="rug-confirm-hint">'
      +'<strong>Liquidez extremamente baixa — possível rug pull.</strong> Para confirmar:<ol>'
      +'<li><a class="rug-confirm-link" href="'+solscanPoolUrl+'" target="_blank">Abrir transações deste pool no Solscan ↗</a></li>'
      +'<li>Clicar em <strong>Action</strong> e selecionar apenas <strong>Remove Liquidity</strong></li>'
      +'<li>Sem transação → liquidez ainda presente (baixa, mas não removida)</li>'
      +'<li>Com transação → liquidez removida, rug pull confirmado</li>'
      +'</ol></div>';
  }
  html+='</div>';

  html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">'
    +'<div class="card" style="margin-bottom:0"><div class="card-title">Volume e Negociações (24h)</div>'
    +'<div class="grid2">'
    +statCard('Volume',fmt(vol))
    +statCard('Transações',(buys+sells).toLocaleString())
    +statCard('Compras',buys.toLocaleString(),'#1D9E75')
    +statCard('Vendas',sells.toLocaleString(),'#E24B4A')
    +'</div>'
    +'<div class="buysell-wrap"><div class="buysell-labels"><span style="color:#1D9E75">Compras '+buyPct+'%</span><span style="color:#E24B4A">Vendas '+(100-buyPct)+'%</span></div><div class="buysell-bar"><div class="buysell-fill" style="width:'+buyPct+'%"></div></div></div>'
    +'</div>'

    +'<div style="font-size:18px;font-weight:500;color:#e0e0e0;margin-bottom:10px">$'+(p.priceUsd||'0')+'</div>'

  html+='<div class="card"><div class="card-title">Market Cap</div><div class="grid4">'
    +statCard('Market Cap',fmt(mkt))

    +statCard('DEX',p.dexId||'—')
    +'</div>'
    +(fdv>0&&mkt>0&&Math.abs(fdv-mkt)/fdv<0.01?'<div style="margin-top:8px;font-size:11px;color:#7F77DD;background:#10102a;border:0.5px solid #303070;border-radius:6px;padding:6px 10px">FDV = Market Cap — 100% do supply em circulação desde o lançamento</div>':'')
    +'</div>';

  return html;
}

  var p=allPairsData[idx]; if(!p) return;
  var liq=(p.liquidity&&p.liquidity.usd)||0, vol=(p.volume&&p.volume.h24)||0;
  var mkt=p.marketCap||0, fdv=p.fdv||0;
  var sym=(p.baseToken&&p.baseToken.symbol)||'—', name=(p.baseToken&&p.baseToken.name)||'—';
  var addr=(p.baseToken&&p.baseToken.address)||currentAddress;
  var buys=(p.txns&&p.txns.h24&&p.txns.h24.buys)||0, sells=(p.txns&&p.txns.h24&&p.txns.h24.sells)||0;
  var pc24=p.priceChange&&p.priceChange.h24;
  var liqB=(p.liquidity&&p.liquidity.base)||0, liqQ=(p.liquidity&&p.liquidity.quote)||0;
  var result=getScoreAndFlags(liq,vol,buys,sells,fdv,mkt,p.pairCreatedAt,pc24,liqB,liqQ);
  var score=normalizeScore(result.rawScore), sc=scoreToScenario(score);
  var risk=getConsolidatedRisk(allPairsData);
  var flagText=result.flags.map(function(f){return '• ['+f.key+'] '+f.agent;}).join('\n');
  var text=[
    '=== Rug Pull Detector v5.4 ===',
    'Analisado em: '+(analysisTime?analysisTime.toLocaleString('pt-BR'):''),
    'Token: '+name+' ('+sym+')', 'Contract: '+addr,'',
    '-- VISÃO CONSOLIDADA --',
    'Total de pools: '+risk.totalPairs,
    'Pools com rug pull: '+risk.rugCount,
    'Liquidez total: '+fmt(risk.totalLiq),
    'Risk Score Consolidado: '+risk.score+'/100',
    'Diagnóstico: '+risk.label,
    'Pontos críticos: '+(risk.allFlags.length>0?risk.allFlags.map(function(k){return FLAG_SHORT[k]||k;}).join(', '):'Nenhum'),
    '',
    '-- POOL '+(idx+1)+' · '+(p.dexId||'—')+' --',
    'Risk Score: '+score+'/100', 'Diagnóstico: '+sc.label,
    'Liquidez: '+fmt(liq), 'Volume 24h: '+fmt(vol),
    'Market Cap: '+fmt(mkt), 'FDV: '+fmt(fdv), 'Preço: $'+(p.priceUsd||'0'),'',
    'Flags:', flagText, '==============================='
  ].join('\n');
  navigator.clipboard.writeText(text).then(function(){
    var btn=document.getElementById('copyBtn-'+idx);
    if(btn){btn.textContent='✓ Copiado!';btn.classList.add('copied');setTimeout(function(){btn.textContent='Copiar para internal note';btn.classList.remove('copied');},2500);}
  });
}

// ─────────────────────────────────────────────
function renderAllPairs(pairs, addr) {
  allPairsData=pairs;
  var sym=(pairs[0].baseToken&&pairs[0].baseToken.symbol)||'—';
  var name=(pairs[0].baseToken&&pairs[0].baseToken.name)||'—';
  var tokenAddr=(pairs[0].baseToken&&pairs[0].baseToken.address)||addr;
  var fdv=pairs[0].fdv||0, mkt=pairs[0].marketCap||0;
  var dexUrl=pairs[0].url||'#';
  addToHistory(tokenAddr,name,sym);
  var risk=getConsolidatedRisk(pairs);
  var html='';
  html+=renderConsolidatedCard(risk,tokenAddr,name,sym,dexUrl);
  html+='<div class="card" style="margin-bottom:12px"><div class="card-title">Supply fora de circulação</div>'+renderSupply(fdv,mkt)+'</div>';
  html+=renderPairTabs(pairs,risk,tokenAddr,name,sym);
  document.getElementById('result').innerHTML=html;
  currentToken={name:name,symbol:sym,address:tokenAddr,risk:risk};
}

// ─────────────────────────────────────────────
// REANALYZE / ANALYZE
// ─────────────────────────────────────────────
function reanalyze(){if(currentAddress){document.getElementById('addressInput').value=currentAddress;analyze();}}

function analyze() {
  var q=document.getElementById('addressInput').value.trim();
  var errEl=document.getElementById('inputError'), inputEl=document.getElementById('addressInput');
  errEl.style.display='none'; inputEl.classList.remove('error');
  if(!q) return;
  if(!isValidSolanaAddress(q)){
    errEl.textContent='Endereço inválido. Um endereço Solana válido tem entre 32 e 44 caracteres alfanuméricos.';
    errEl.style.display='block'; inputEl.classList.add('error'); return;
  }
  currentAddress=q;
  var btn=document.getElementById('analyzeBtn');
  btn.disabled=true; btn.textContent='Analisando...';
  currentToken=null; allPairsData=[];
  document.getElementById('result').innerHTML='<div class="loading"><div class="spinner"></div>Buscando dados na blockchain...</div>';
  fetch(PROXY_BASE+'/api/proxy?address='+q)
    .then(function(r){if(!r.ok) throw new Error('HTTP '+r.status); return r.json();})
    .then(function(data){
      var pairs=Array.isArray(data)?data:[];
      if(pairs.length===0){renderNotFound(q);return;}
      pairs.sort(function(a,b){return ((b.liquidity&&b.liquidity.usd)||0)-((a.liquidity&&a.liquidity.usd)||0);});
      analysisTime=new Date();
      renderAllPairs(pairs,q);
    })
    .catch(function(e){
      document.getElementById('result').innerHTML='<div class="error-box"><div class="error-title">Erro ao buscar dados</div><div class="error-msg">'+e.message+'</div></div>';
    })
    .finally(function(){btn.disabled=false;btn.textContent='Analisar →';});
}

document.getElementById('addressInput').addEventListener('keydown',function(e){if(e.key==='Enter') analyze();});
</script>
