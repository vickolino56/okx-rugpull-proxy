<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Token Risk Analyzer</title>
<style>

  .header-title { font-size: 14px; font-weight: 500; color: #fff; }
  .header-sub { font-size: 10px; color: #444; }
  .container { max-width: 780px; margin: 0 auto; padding: 0 20px; }

  .input-error { font-size: 11px; color: #E24B4A; margin-top: 6px; padding: 0 2px; }

  .error-msg { font-size: 12px; color: #884444; line-height: 1.6; }
  .not-found-box { background: #0d1117; border: 1.5px solid #EF9F27; border-radius: 14px; padding: 20px; margin-bottom: 12px; }
  .not-found-title { font-size: 15px; font-weight: 500; color: #EF9F27; margin-bottom: 6px; }
  .not-found-msg { font-size: 12px; color: #888; line-height: 1.7; margin-bottom: 16px; }
  .steps-box { background: #060a10; border: 0.5px solid #1e2530; border-radius: 10px; padding: 14px 16px; margin-bottom: 14px; }
  .steps-title { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
  .step { display: flex; gap: 10px; margin-bottom: 10px; }
  .step:last-child { margin-bottom: 0; }
  .step-num { width: 20px; height: 20px; border-radius: 50%; background: #EF9F2722; border: 0.5px solid #EF9F2755; color: #EF9F27; font-size: 10px; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
  .step-title { font-size: 12px; font-weight: 500; color: #e0e0e0; margin-bottom: 2px; }
  .step-desc { font-size: 11px; color: #666; line-height: 1.5; }
  .not-found-links { display: flex; gap: 8px; flex-wrap: wrap; }
  .nf-btn { font-size: 12px; padding: 7px 14px; border-radius: 8px; border: 0.5px solid; cursor: pointer; display: inline-block; }
  .consolidated-card { border-radius: 12px; padding: 16px 18px; margin-bottom: 12px; border: 1.5px solid; }
  .consolidated-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
  .consolidated-left { flex: 1; }

  .consolidated-title { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
  .consolidated-stats { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 0.5px solid #1e253088; }
  .consolidated-stat-label { font-size: 10px; color: #555; margin-bottom: 2px; }
  .consolidated-stat-value { font-size: 14px; font-weight: 500; }
  .risk-badge { display: flex; flex-direction: column; align-items: center; gap: 6px; flex-shrink: 0; }
  .risk-badge-pill { padding: 6px 14px; border-radius: 20px; font-size: 11px; font-weight: 600; border: 1.5px solid; white-space: nowrap; text-align: center; }
  .critical-points { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
  .critical-point { display: flex; align-items: center; gap: 5px; font-size: 11px; padding: 4px 9px; border-radius: 5px; border: 0.5px solid; transition: opacity 0.15s; }
  .critical-point:hover { opacity: 0.8; }
  .critical-point-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
  .pool-status-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
  .pool-status-row { display: flex; align-items: center; gap: 8px; font-size: 11px; padding: 6px 10px; border-radius: 6px; background: #060a1066; }
  .pool-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .pool-row-link { color: #555; font-family: monospace; font-size: 10px; text-decoration: underline; text-decoration-color: #2a3040; }
  .pool-row-link:hover { color: #888; }
  .context-note { font-size: 10px; color: #378ADD; background: #378ADD11; border: 0.5px solid #378ADD33; border-radius: 4px; padding: 2px 6px; white-space: nowrap; flex-shrink: 0; }
  .token-strip { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 10px 12px; background: #060a1088; border: 0.5px solid #1e2530; border-radius: 8px; flex-wrap: wrap; margin-top: 12px; }

  .recommended-pool-row { display: flex; align-items: center; gap: 8px; font-size: 11px; padding: 5px 8px; border-radius: 5px; background: #081a1288; border: 0.5px solid #1D9E7533; margin-bottom: 4px; }
  .concl-copy-btn { width: 100%; padding: 9px; border-radius: 8px; border: 0.5px solid #1e2530; background: #060a10; color: #555; font-size: 11px; cursor: pointer; margin-top: 12px; }

  .pair-tab:hover { color: #999; }
  .pair-tab.active { color: #e0e0e0; border-bottom-color: #1D9E75; }
  .pair-tab.tab-rug.active  { border-bottom-color: #E24B4A; color: #E24B4A; }
  .pair-tab.tab-crit.active { border-bottom-color: #E24B4A; color: #E24B4A; }
  .pair-tab.tab-high.active { border-bottom-color: #EF9F27; color: #EF9F27; }
  .pair-tab.tab-mod.active  { border-bottom-color: #E8A838; color: #E8A838; }
  .pair-tab.tab-med.active  { border-bottom-color: #7F77DD; color: #7F77DD; }
  .pair-tab-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .pair-tab-content { display: none; }
  .pair-tab-content.active { display: block; padding-top: 12px; }
  .diag-box { background: #0a0e16; border-radius: 14px; padding: 18px 20px; margin-bottom: 12px; }
  .diag-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 14px; gap: 12px; }
  .diag-label { font-size: 10px; color: #555; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
  .diag-title { font-size: 20px; font-weight: 500; margin-bottom: 4px; }
  .diag-sub { font-size: 12px; color: #888; }
  .pool-risk-badge { padding: 5px 12px; border-radius: 16px; font-size: 11px; font-weight: 600; border: 1.5px solid; white-space: nowrap; flex-shrink: 0; }
  .secondary-pool-notice { background: #0a1a2a; border: 0.5px solid #378ADD33; border-radius: 8px; padding: 10px 14px; margin-bottom: 12px; font-size: 11px; color: #378ADD; line-height: 1.6; }
  .expand-pools-btn { width: 100%; padding: 8px; border-radius: 8px; border: 0.5px solid #1e2530; background: #060a10; color: #555; font-size: 11px; cursor: pointer; margin-top: 4px; }
  .expand-pools-btn:hover { color: #999; border-color: #2a3040; }
  .pool-rows-extra { display: none; }
  .pool-rows-extra.expanded { display: flex; flex-direction: column; gap: 6px; }
  .flags { display: flex; flex-direction: column; gap: 5px; }
  .flag-item { display: flex; gap: 8px; align-items: flex-start; border-radius: 7px; padding: 8px 12px; }
  .flag-badge { font-size: 9px; font-weight: 500; padding: 2px 5px; border-radius: 3px; flex-shrink: 0; margin-top: 1px; white-space: nowrap; }
  .flag-tech { font-size: 10px; color: #555; margin-top: 2px; }
  .diag-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 14px; gap: 10px; }
  .reanalyze-btn { font-size: 11px; padding: 6px 12px; border-radius: 6px; border: 0.5px solid #1e2530; background: #060a10; color: #555; cursor: pointer; }
  .reanalyze-btn:hover { color: #999; }
  .copy-btn { font-size: 11px; padding: 6px 14px; border-radius: 6px; border: 0.5px solid #1e2530; background: #060a10; color: #666; cursor: pointer; }
  .copy-btn.copied { border-color: #1D9E75; color: #1D9E75; background: #081a12; }
  .data-ts { font-size: 10px; color: #333; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .grid4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; }
  .stat { background: #060a10; border: 0.5px solid #1e2530; border-radius: 8px; padding: 10px 12px; }
  .stat-label { font-size: 10px; color: #555; margin-bottom: 3px; }
  .stat-value { font-size: 14px; font-weight: 500; color: #e0e0e0; }
  .stat.alert-yellow { border-color: #EF9F2744; background: #1f1208; }
  .stat.alert-red { border-color: #E24B4A44; background: #200808; }
  .rug-confirm-hint { background: #130808; border: 0.5px solid #5a151533; border-radius: 8px; padding: 12px 14px; margin-top: 8px; font-size: 11px; color: #999; line-height: 1.8; }

  .liq-disclaimer { font-size: 10px; color: #444; margin-top: 8px; }

  .bar-wrap { height: 4px; border-radius: 2px; background: #1e2530; overflow: hidden; margin-top: 6px; }
  .bar-fill { height: 100%; border-radius: 2px; }
  .buysell-wrap { margin-top: 10px; }

  .supply-sub { font-size: 11px; color: #555; }
  .supply-pct { font-size: 18px; font-weight: 500; flex-shrink: 0; margin-left: 12px; }
  .supply-foot { display: flex; justify-content: space-between; font-size: 10px; color: #444; margin-top: 4px; }
  .footer { text-align: center; font-size: 10px; color: #1e2530; margin-top: 8px; }
  .liq-big { font-size: 20px; font-weight: 500; }

  /* TOOLTIPS */
  .tip { display:inline-flex; align-items:center; justify-content:center; width:14px; height:14px; border-radius:50%; background:#1e2530; color:#555; font-size:9px; cursor:help; margin-left:4px; flex-shrink:0; position:relative; }
  .tip:hover { background:#2a3540; color:#999; }
  .tip:hover::after { content:attr(data-tip); position:absolute; bottom:calc(100% + 6px); left:50%; transform:translateX(-50%); background:#0d1117; border:0.5px solid #2a3540; color:#ccc; font-size:11px; line-height:1.5; padding:8px 12px; border-radius:8px; white-space:nowrap; max-width:260px; white-space:normal; width:260px; z-index:100; pointer-events:none; font-weight:400; box-shadow:0 4px 16px #00000066; }

  /* GLOSSARY */
  .glossary-wrap { margin-top: 24px; }
  .glossary-toggle { width:100%; padding:10px 14px; border-radius:8px; border:0.5px solid #1e2530; background:#0d1117; color:#444; font-size:11px; cursor:pointer; text-align:left; display:flex; justify-content:space-between; align-items:center; }
  .glossary-toggle:hover { color:#777; }
  .glossary-body { display:none; background:#0d1117; border:0.5px solid #1e2530; border-top:none; border-radius:0 0 8px 8px; padding:14px 16px; }
  .glossary-body.open { display:block; }
  .glossary-item { display:flex; gap:10px; padding:8px 0; border-bottom:0.5px solid #1e253044; }
  .glossary-item:last-child { border-bottom:none; }
  .glossary-term { font-size:11px; font-weight:600; color:#e0e0e0; min-width:120px; flex-shrink:0; }
  .glossary-def { font-size:11px; color:#666; line-height:1.6; }

  /* SUGGESTED APPROACH BLOCK */
  .suggested-approach { margin-top:10px; padding:12px 14px; border-radius:8px; border:0.5px solid #1e2530; background:#060a10; }
  .suggested-approach-title { font-size:10px; color:#555; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:8px; }
  .suggested-approach-text { font-size:11px; color:#888; line-height:1.8; font-style:italic; }
  .suggested-approach-note { font-size:10px; color:#444; margin-top:6px; }
  .known-token-card { border-radius: 12px; padding: 20px 22px; margin-bottom: 12px; border: 1.5px solid; }
  .known-token-badge { display: inline-flex; align-items: center; gap: 6px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; padding: 4px 10px; border-radius: 20px; border: 1px solid; margin-bottom: 14px; }
  .known-token-name { font-size: 24px; font-weight: 600; margin-bottom: 4px; }
  .known-token-issuer { font-size: 12px; opacity: 0.7; margin-bottom: 16px; }
  .known-token-note { font-size: 12px; color: #ccc; line-height: 1.8; background: #060a1088; border: 0.5px solid #1e2530; border-radius: 8px; padding: 12px 14px; margin-bottom: 16px; }
  .known-token-addr { font-size: 10px; font-family: monospace; color: #555; word-break: break-all; margin-bottom: 12px; }
  .known-token-links { display: flex; gap: 8px; flex-wrap: wrap; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-logo">R</div>
    <div>
      <div class="header-title">Token Risk Analyzer <span style="font-size:10px;color:#444;font-weight:400">v1.0</span></div>
      <div class="header-sub">Solana · Token Risk Analysis</div>
    </div>
  </div>
</div>

<div class="container">
  <div class="card">
    <div class="search-wrap">
      <input class="search-input" id="addressInput" placeholder="Paste the Solana token contract address..." />
      <button class="search-btn" id="analyzeBtn" onclick="analyze()">Analyze →</button>

      <span id="glossaryArrow" style="font-size:10px">↓</span>
    </button>
    <div class="glossary-body" id="glossaryBody"></div>
  </div>

  <div class="footer">Token Risk Analyzer · Built by Vinicius Fernandes · Solana</div>
</div>

<script>
var currentToken=null,analysisTime=null,currentAddress=null,sessionHistory=[],allPairsData=[];
var PROXY_BASE='https://risktokenanalyzer.vercel.app';

// ─────────────────────────────────────────────
// KNOWN TOKENS WHITELIST

// ─────────────────────────────────────────────
// GLOSSARY
// ─────────────────────────────────────────────
var GLOSSARY=[
  {term:'Liquidity (Liq.)',   def:'The amount of funds available in a pool for trading. Low liquidity means large orders will significantly move the price — or fail entirely.'},
  {term:'FDV',                def:'Fully Diluted Valuation — the theoretical total market cap if 100% of the token supply were in circulation. A very high FDV vs low liquidity means the "value" exists only on paper.'},
  {term:'Market Cap',         def:'Current value of all tokens currently in circulation. Different from FDV when part of the supply is still locked.'},
  {term:'Rug Pull',           def:'A type of fraud where the token creators remove all liquidity from the pool, making it impossible for holders to sell. The token still appears in wallets but has no real value.'},
  {term:'Liquidity Pool',     def:'A smart contract holding two tokens (e.g. SOL and a meme coin) that allows users to trade between them. Without a pool, a token cannot be sold on a DEX.'},
  {term:'DEX',                def:'Decentralized Exchange — a platform like Raydium, Orca or Meteora where anyone can trade tokens directly on the blockchain, without an intermediary like OKX. OKX does not control or guarantee transactions on DEXs.'},
  {term:'Meteora',            def:'A decentralized exchange (DEX) on Solana known for concentrated liquidity pools. Similar to Raydium and Orca — it\'s where users provide and trade liquidity directly on the blockchain.'},
  {term:'Raydium',            def:'One of the largest DEXs on Solana. Provides automated market making (AMM) and is commonly used for token launches and liquidity pools.'},
  {term:'Orca',               def:'A user-friendly DEX on Solana focused on concentrated liquidity. Often used for stablecoin pairs and more established tokens.'},

// Tooltip helper — inserts an info icon with hover definition
function tip(text){
  return '<span class="tip" data-tip="'+text.replace(/"/g,'&quot;')+'">ⓘ</span>';
}

function isValidSolanaAddress(a){return /^[1-9A-HJ-NP-Za-km-z]{32,44}$/.test(a);}
function fmt(n){
  if(n==null||isNaN(n)) return '—';
  if(n>=1e6) return '$'+(n/1e6).toFixed(2)+'M';
  if(n>=1e3) return '$'+(n/1e3).toFixed(2)+'K';
  return '$'+Number(n).toFixed(2);
}
function pct(n){if(n==null) return '—'; var v=Number(n).toFixed(2); return (Number(v)>0?'+':'')+v+'%';}
function pctColor(v){if(v==null) return '#666'; return Number(v)>=0?'#1D9E75':'#E24B4A';}
function timeAgo(ts){
  if(!ts) return '—';
  var diff=Date.now()-ts,d=Math.floor(diff/86400000),h=Math.floor(diff/3600000),m=Math.floor(diff/60000);
  if(d>0) return d+(d===1?' day':' days')+' ago';
  if(h>0) return h+(h===1?' hour':' hours')+' ago';
  return m+' min ago';
}
function ageDays(ts){return ts?(Date.now()-ts)/86400000:999;}
function shortAddr(a){if(!a) return '—'; return a.substring(0,6)+'...'+a.substring(a.length-4);}

function addToHistory(addr,name,sym){
  sessionHistory=sessionHistory.filter(function(h){return h.addr!==addr;});
  sessionHistory.unshift({addr:addr,label:(sym||addr.substring(0,8)+'...')+(name?' · '+name.substring(0,12):'')});
  if(sessionHistory.length>5) sessionHistory=sessionHistory.slice(0,5);
  renderHistory();
}
function renderHistory(){
  if(sessionHistory.length===0){document.getElementById('historyWrap').style.display='none';return;}
  document.getElementById('historyWrap').style.display='flex';
  document.getElementById('historyList').innerHTML=sessionHistory.map(function(h){
    return '<button class="history-btn" title="'+h.addr+'" onclick="loadHistory(\''+h.addr+'\')">'+h.label+'</button>';
  }).join('');
}
function loadHistory(addr){document.getElementById('addressInput').value=addr;analyze();}

function getVolRatioThresholds(age){
  if(age<7)   return {low:0,  mod:0 };
  if(age<30)  return {low:10, mod:3 };
  if(age<90)  return {low:20, mod:8 };
  if(age<180) return {low:30, mod:15};
  return             {low:40, mod:20};
}

function getScoreAndFlags(liq,vol,buys,sells,fdv,mkt,pairCreatedAt,pc24,liqBase,liqQuote,makers,ctx){
  var flags=[],rawScore=0;
  var total=buys+sells;
  var sellRatio=total>0?(sells/total)*100:50;
  var buyRatio =total>0?(buys/total)*100:50;
  var age=ageDays(pairCreatedAt);
  var pc24n=pc24!=null?Number(pc24):null;
  var isHighLiq=ctx&&ctx.isHighLiqToken;
  var isMedLiq =ctx&&ctx.isMedLiqToken;
  var isSecondary=ctx&&ctx.isSecondaryPool;

  function add(key,agent,tech){rawScore+=FLAG_DEFS[key].weight;flags.push({key:key,agent:agent,tech:tech});}

  if(liq<5){
    flags.push({key:'RUG',agent:'This pool has virtually no liquidity ('+fmt(liq)+'). The client will not be able to sell — liquidity was likely removed.',tech:'Liquidity below $5.'});
    return {rawScore:100,flags:flags};
  }

  // LIQUIDITY FLAGS
  if(liq<5000){
    if(isHighLiq&&isSecondary){
      if(liq<1000){
        add('LIQ_HI','This secondary pool has very low liquidity ('+fmt(liq)+'). Any sell attempt will result in significant value loss.','Secondary pool with only '+fmt(liq)+' in liquidity.');
      } else {
        add('LIQ_SEC','This is a secondary pool with low liquidity ('+fmt(liq)+'). The token has significant liquidity in other pools — the client should use the main pools to sell.','Secondary pool with '+fmt(liq)+'. Token total: '+fmt(ctx.totalLiq)+'.');
      }
    } else if(isMedLiq&&isSecondary){
      add('LIQ_MED','Low liquidity in this pool ('+fmt(liq)+'). Check other token pools for better sell conditions.','Liquidity of '+fmt(liq)+' in this pool.');
    } else {
      add('LIQ_HI','Insufficient liquidity for any swap. The sell may fail or result in significant value loss.','Critical liquidity of '+fmt(liq)+'.');
    }
  } else if(liq<20000){
    if(isHighLiq&&isSecondary){
      if(liq<10000){
        add('LIQ_SEC','Secondary pool with limited liquidity ('+fmt(liq)+'). The token has main pools with much higher liquidity — prefer those for executing the sell.','Secondary pool with '+fmt(liq)+'. Token total: '+fmt(ctx.totalLiq)+'.');
      }
    } else {
      add('LIQ_MED','Low liquidity — the client may be able to sell but will receive less than the displayed value.','Liquidity of '+fmt(liq)+'.');
    }
  }

  // VOLUME HIGH — 3 tiers
  var volRatio=liq>0?vol/liq:0;
  if(!(isHighLiq&&liq>50000)){
    if(volRatio>10)      add('VOL',    'Volume is disproportionate to liquidity — possible artificial transactions to simulate activity.','24h volume ('+fmt(vol)+') is '+volRatio.toFixed(1)+'x the liquidity.');
    else if(volRatio>7)  add('VOL_MOD','Volume is elevated relative to liquidity — may indicate artificial activity or intense speculative interest.','24h volume ('+fmt(vol)+') is '+volRatio.toFixed(1)+'x the liquidity.');
    else if(volRatio>4)  add('VOL_LOW','Volume is moderately high relative to liquidity. Monitor price stability.','24h volume ('+fmt(vol)+') is '+volRatio.toFixed(1)+'x the liquidity.');
  }

  // VOLUME LOW — proportional by age
  if(!isHighLiq&&liq>0&&age>=7){
    var volPct=(vol/liq)*100;
    var thr=getVolRatioThresholds(age);
    var alreadyFlagged=flags.some(function(f){return f.key==='DEAD'||f.key==='STAGNANT'||f.key==='ABANDONED'||f.key==='PUMP_DUMP';});
    if(!alreadyFlagged){
      if(volPct<thr.mod){
        add('STAGNANT','Volume is very low for the token\'s age: '+volPct.toFixed(1)+'% of liquidity in the last 24h (expected ≥ '+thr.low+'% for a '+Math.floor(age)+'-day-old token). Project may be inactive or have lost market interest.','Vol/Liq 24h: '+volPct.toFixed(1)+'% · Age: '+Math.floor(age)+' days.');
      } else if(volPct<thr.low){
        add('LOW_ACTIVITY','Volume is relatively low for the token\'s age: '+volPct.toFixed(1)+'% of liquidity in the last 24h (expected ≥ '+thr.low+'% for a '+Math.floor(age)+'-day-old token). Activity below expected.','Vol/Liq 24h: '+volPct.toFixed(1)+'% · Age: '+Math.floor(age)+' days.');
      }
    }
  }

  // TOKEN AGE — uses oldest pool as proxy
  var tokenAge=ctx&&ctx.tokenAge!=null?ctx.tokenAge:age;
  var isPoolNew=ctx&&ctx.isPoolNew;
  if(tokenAge<1)     add('AGE_HI','Token created less than 24 hours ago. Insufficient history for evaluation.','Token created '+timeAgo(ctx&&ctx.oldestPairCreatedAt||pairCreatedAt)+'.');
  else if(tokenAge<7) add('AGE_MED','Token is less than 7 days old. Limited history.','Token created '+timeAgo(ctx&&ctx.oldestPairCreatedAt||pairCreatedAt)+'.');

  if(isPoolNew){
    add('POOL_NEW','This pool was created less than 24h ago on a token that is '+Math.floor(tokenAge)+' days old. May indicate new liquidity injection, project reactivation, or a pump attempt.','Pool created '+timeAgo(pairCreatedAt)+' · Token is '+Math.floor(tokenAge)+' days old.');
  }

  if(pc24n!=null&&pc24n<=-90) add('DUMP','Drop of '+Math.abs(pc24n).toFixed(1)+'% in the last 24h — possible dump in progress or rug pull underway.','24h change: '+pct(pc24)+'.');
  if(sellRatio>80&&total>0&&!isHighLiq) add('SELL','More than 80% of transactions are sells. Abnormal selling pressure.',Math.round(sellRatio)+'% of transactions are sells.');
  if(total===0&&!isHighLiq) add('ABANDON','No transactions in the last 24 hours. Pool is inactive.','Zero transactions in 24h.');
  if(buyRatio>90&&total>0&&!isHighLiq) add('PUMP','Nearly all transactions are buys. Possible artificial pump.',Math.round(buyRatio)+'% of transactions are buys.');
  if(fdv>0&&mkt>0&&Math.abs(fdv-mkt)/fdv<0.01) add('SUPPLY','100% of supply is already in circulation. The creator can sell any amount without vesting restrictions.','FDV equals Market Cap.');

  if(vol<500&&age>7&&total<50&&!isHighLiq&&!isMedLiq){
    add('DEAD','Extremely low volume for a token over 7 days old. Pool is practically inactive.','24h volume of only '+fmt(vol)+' with '+total+' transactions.');
  }

  if(!isHighLiq&&age>90&&total<10&&flags.every(function(f){return f.key!=='DEAD'&&f.key!=='STAGNANT'&&f.key!=='LOW_ACTIVITY';})){
    add('ABANDONED','Token is '+Math.floor(age)+' days old with only '+total+' transaction'+(total===1?'':'s')+' in the last 24h. Project appears abandoned — selling is technically possible but demand is near zero.','Age: '+Math.floor(age)+' days · 24h transactions: '+total+'.');
  }

  if(pc24n!=null&&pc24n<=-85&&vol<500&&age>7&&!isHighLiq) add('PUMP_DUMP','Consistent pump & dump pattern: severe price drop combined with near-zero volume.','Drop of '+Math.abs(pc24n).toFixed(1)+'% with only '+fmt(vol)+' in volume.');
  if(mkt>0&&liq>0&&liq<mkt*0.01&&!isHighLiq) add('LIQ_MCAP','Liquidity is below 1% of Market Cap. Any medium-sized sell will collapse the price before executing.','Liquidity ('+fmt(liq)+') is only '+((liq/mkt)*100).toFixed(2)+'% of Market Cap.');
  if(fdv>0&&liq>0&&fdv>liq*1000&&!isHighLiq) add('FDV_LIQ','Total token value is more than 1000x the available liquidity.','FDV ('+fmt(fdv)+') is '+Math.round(fdv/liq)+'x the liquidity ('+fmt(liq)+').');
  if(mkt>0&&mkt<100) add('NEAR_ZERO','Market Cap below $100. The token has virtually no market value.','Market Cap of only '+fmt(mkt)+'.');

  if(liqBase>0&&liqQuote>0&&liq>0){
    var solPriceUSD=0;
    if(ctx&&ctx.priceUsd&&ctx.priceNative&&Number(ctx.priceNative)>0) solPriceUSD=Number(ctx.priceUsd)/Number(ctx.priceNative);
    if(solPriceUSD>0){
      var quoteUSD=liqQuote*solPriceUSD;
      var quotePct=liq>0?(quoteUSD/liq)*100:50;
      if(quotePct<5&&quoteUSD<750000){
        add('SPREAD','Pool contains almost exclusively tokens with very little SOL by value ('+quotePct.toFixed(1)+'% of pool in SOL = '+fmt(quoteUSD)+'). Any sell will collapse the price immediately due to lack of counterpart.','SOL represents only '+quotePct.toFixed(1)+'% of total pool value ('+fmt(quoteUSD)+' of '+fmt(liq)+').');
      }
    }
  }

  if(makers!=null&&makers<20&&age>7&&total>0&&!isHighLiq) add('MAKERS','Fewer than 20 unique traders in the last 24h. Concentrated activity — possible wash trading or manipulation.','Only '+makers+' unique traders in the last 24h.');

  if(flags.length===0) flags.push({key:'OK',agent:'No warning signals detected in this pool. Manual review recommended.',tech:'No critical flags detected.'});
  return {rawScore:rawScore,flags:flags};
}

function normalizeScore(raw,flags){
  if(raw>=100) return 100;
  var n=Math.min(99,Math.round((raw/MAX_RAW)*99));
  var floor=0;
  flags.forEach(function(f){
    if(f.key==='RUG') return;
    var def=FLAG_DEFS[f.key];
    if(def){var lf=LEVEL_FLOOR[def.level]||0;if(lf>floor) floor=lf;}
  });
  return Math.max(n,floor);
}

function getConsolidatedRisk(pairs){
  var totalLiq=0,oldestPairCreatedAt=null;
  pairs.forEach(function(p){
    totalLiq+=((p.liquidity&&p.liquidity.usd)||0);
    var ts=p.pairCreatedAt;
    if(ts&&(!oldestPairCreatedAt||ts<oldestPairCreatedAt)) oldestPairCreatedAt=ts;
  });
  var isHighLiqToken=totalLiq>=HIGH_LIQ_THRESHOLD;
  var isMedLiqToken =totalLiq>=MEDIUM_LIQ_THRESHOLD;
  var primaryLiq=(pairs[0]&&pairs[0].liquidity&&pairs[0].liquidity.usd)||0;
  var rugCount=0,weightedSum=0,totalWeight=0;
  var pairStatuses=[],allFlags=[];

  pairs.forEach(function(p,i){
    var liq=(p.liquidity&&p.liquidity.usd)||0;
    var vol=(p.volume&&p.volume.h24)||0;
    var buys=(p.txns&&p.txns.h24&&p.txns.h24.buys)||0;
    var sells=(p.txns&&p.txns.h24&&p.txns.h24.sells)||0;
    var fdv=p.fdv||0,mkt=p.marketCap||0;
    var pc24=p.priceChange&&p.priceChange.h24;
    var liqB=(p.liquidity&&p.liquidity.base)||0;
    var liqQ=(p.liquidity&&p.liquidity.quote)||0;
    var makers=p.makers!=null?p.makers:(p.txns&&p.txns.h24&&p.txns.h24.makers)||null;
    var isSecondaryPool=isHighLiqToken&&liq<(totalLiq*0.1)&&i>0;
    var tokenAge=ageDays(oldestPairCreatedAt);
    var poolAge=ageDays(p.pairCreatedAt);
    var isPoolNew=poolAge<1&&tokenAge>=1;
    var ctx={totalLiq:totalLiq,isHighLiqToken:isHighLiqToken,isMedLiqToken:isMedLiqToken,
      isSecondaryPool:isSecondaryPool,priceUsd:p.priceUsd||0,priceNative:p.priceNative||0,
      tokenAge:tokenAge,poolAge:poolAge,isPoolNew:isPoolNew,oldestPairCreatedAt:oldestPairCreatedAt};
    var result=getScoreAndFlags(liq,vol,buys,sells,fdv,mkt,p.pairCreatedAt,pc24,liqB,liqQ,makers,ctx);
    var score=normalizeScore(result.rawScore,result.flags);
    var lv=scoreToLevel(score);
    var weight=isSecondaryPool?0.3:(lv.level==='FRAUD'?3:lv.level==='CRIT'?2:1);
    weightedSum+=score*weight; totalWeight+=weight;
    if(lv.level==='FRAUD') rugCount++;
    result.flags.forEach(function(f){if(f.key!=='OK'&&allFlags.indexOf(f.key)<0) allFlags.push(f.key);});
    pairStatuses.push({dex:p.dexId||'—',pairAddr:p.pairAddress||'',liq:liq,level:lv,score:score,flags:result.flags,isSecondary:isSecondaryPool,ctx:ctx});
  });

  var total=pairs.length,activeCount=total-rugCount;
  var consolidatedScore,finalLevel,label;

  if(rugCount===total){
    consolidatedScore=100; finalLevel=scoreToLevel(100);
    label='Rug Pull Confirmed · Liquidity Fully Removed';
  } else {
    consolidatedScore=totalWeight>0?Math.min(99,Math.round(weightedSum/totalWeight)):0;
    var floor=0,floorCap=isHighLiqToken?34:999;
    allFlags.forEach(function(k){
      if(k==='RUG'||k==='LIQ_SEC') return;
      var onPrimary=pairStatuses.some(function(ps){return !ps.isSecondary&&ps.flags.some(function(f){return f.key===k;});});
      if(!onPrimary&&isHighLiqToken) return;
      var def=FLAG_DEFS[k];
      if(def){var lf=Math.min(LEVEL_FLOOR[def.level]||0,floorCap);if(lf>floor) floor=lf;}
    });
    consolidatedScore=Math.max(consolidatedScore,floor);
    if(isHighLiqToken&&rugCount===0){
      var top2healthy=pairStatuses.slice(0,2).every(function(ps){return ps.level.level==='OK'||ps.level.level==='MED';});
      if(top2healthy) consolidatedScore=Math.min(consolidatedScore,34);
    }
    finalLevel=scoreToLevel(consolidatedScore);
    if(rugCount>0){
      var zeroLabel=rugCount+' pool'+(rugCount>1?'s':'')+' with zero liquidity · '+activeCount+' still active';
      if(totalLiq>=500000){consolidatedScore=Math.min(consolidatedScore,45);finalLevel=scoreToLevel(consolidatedScore);label=zeroLabel;}
      else if(totalLiq>=100000){consolidatedScore=Math.max(consolidatedScore,35);finalLevel=scoreToLevel(consolidatedScore);label=zeroLabel;}
      else {consolidatedScore=Math.max(consolidatedScore,55);finalLevel=scoreToLevel(consolidatedScore);label=zeroLabel;}
    } else {
      label=finalLevel.label;
    }
  }

  var recommendedPools=pairStatuses.filter(function(ps){return (ps.level.level==='OK'||ps.level.level==='MED')&&ps.liq>=1000;});
  return {totalLiq:totalLiq,rugCount:rugCount,totalPairs:total,activeCount:activeCount,level:finalLevel,score:consolidatedScore,label:label,pairStatuses:pairStatuses,allFlags:allFlags,isHighLiqToken:isHighLiqToken,isMedLiqToken:isMedLiqToken,primaryLiq:primaryLiq,recommendedPools:recommendedPools};
}

function renderSupply(fdv,mkt){
  var diff=fdv-mkt,pctOut=fdv>0?(diff/fdv)*100:0;
  var isEqual=Math.abs(pctOut)<1;
  var color=isEqual?'#1D9E75':pctOut<20?'#1D9E75':pctOut<50?'#EF9F27':'#E24B4A';
  var label=isEqual?'100% of supply in circulation — no locked tokens'
    :pctOut<20?Math.round(pctOut)+'% out of circulation — small difference, low risk'
    :pctOut<50?Math.round(pctOut)+'% out of circulation — relevant amount, monitor'
    :Math.round(pctOut)+'% not yet circulating — high risk of future sell pressure';
  var barW=Math.min(100,Math.max(0,100-pctOut));
  return '<div class="supply-inner">'
    +'<div class="supply-row"><div><div class="supply-text" style="color:'+color+'">'+label+'</div>'
    +(!isEqual?'<div class="supply-sub">Estimated out of circulation: '+fmt(diff>0?diff:0)+'</div>':'')
    +'</div><div class="supply-pct" style="color:'+color+'">'+(isEqual?'0%':Math.round(pctOut)+'%')+'</div></div>'
    +'<div class="bar-wrap"><div class="bar-fill" style="width:'+barW+'%;background:'+color+'"></div></div>'
    +'<div class="supply-foot"><span>Circulating: '+fmt(mkt)+'</span><span>Total FDV: '+fmt(fdv)+'</span></div>'
    +'</div>';
}

function statCard(l,v,c,a){
  return '<div class="stat'+(a?' '+a:'')+'"><div class="stat-label">'+l+'</div><div class="stat-value" style="color:'+(c||'#e0e0e0')+'">'+v+'</div></div>';
}

function buildConclusion(risk){
  var flags=risk.allFlags;
  var hasGoodPools=risk.recommendedPools.length>0;
  var rugCount=risk.rugCount,total=risk.totalPairs,isHighLiq=risk.isHighLiqToken;
  var conclusionText,clientLabel,clientColor,clientText,recommendedHtml='';

  // Only show recommended pool when diagnosis is not Critical Risk or above
  // Avoids ambiguity between "DO NOT CONFIRM" and a green pool suggestion on the same screen
  if(hasGoodPools && rugCount>0 && risk.score<80){
    var bestPool=risk.recommendedPools[0];
    recommendedHtml='<div class="recommended-pools">'
      +'<div class="recommended-pools-label">✓ Recommended pool for sale</div>'
      +'<div class="recommended-pool-row" style="cursor:pointer" onclick="switchTab('+risk.pairStatuses.indexOf(bestPool)+')">'
      +'<div class="pool-dot" style="background:#1D9E75"></div>'
      +'<span style="color:#1D9E75">'+bestPool.dex+'</span>'
      +'<span style="color:#555;font-family:monospace;font-size:10px">'+shortAddr(bestPool.pairAddr)+'</span>'
      +'<span style="color:#1D9E75;margin-left:auto">'+fmt(bestPool.liq)+' · View analysis →</span>'
      +'</div></div>';
  }

  if(rugCount===total){
    conclusionText='All '+total+' pools for this token have had their liquidity removed. The token exists on the blockchain but cannot be sold on any decentralized exchange at this time.';
    clientLabel='Do not confirm the sale'; clientColor='#E24B4A';
    clientText='Inform the client that selling is not possible at this time. This is not a platform limitation — it is the current state of the token on the blockchain. Let the client know that the value is not recoverable under current conditions.';
  }
  else if(isHighLiq&&hasGoodPools&&risk.score<46){
    var top5=risk.pairStatuses.slice(0,5);
    var top5Liq=top5.reduce(function(s,ps){return s+ps.liq;},0);
    var top5Pct=risk.totalLiq>0?((top5Liq/risk.totalLiq)*100).toFixed(1):'—';
    var goodDesc=risk.recommendedPools.slice(0,3).map(function(ps){return ps.dex+' ('+fmt(ps.liq)+')';}).join(', ');
    var zeradaNote=rugCount>0?' ('+rugCount+' pool'+(rugCount>1?'s':'')+' with zero liquidity — no significant impact on total liquidity)':'';
    conclusionText='The top 5 pools hold '+fmt(top5Liq)+' of '+fmt(risk.totalLiq)+' total liquidity ('+top5Pct+'%)'+zeradaNote+'. Secondary pools may not have sufficient liquidity — direct the client to the main pools: '+goodDesc+'.';
    clientLabel='Healthy token · Direct client to the right pool'; clientColor='#1D9E75';
    clientText='The token has sufficient liquidity for selling. If the client is trying to sell in a secondary or zero-liquidity pool, instruct them to use the recommended pools: '+goodDesc+'.';
  }
  else if(isHighLiq&&hasGoodPools&&risk.score<75){
    var top5b=risk.pairStatuses.slice(0,5);
    var top5Liqb=top5b.reduce(function(s,ps){return s+ps.liq;},0);
    var top5Pctb=risk.totalLiq>0?((top5Liqb/risk.totalLiq)*100).toFixed(1):'—';
    conclusionText='The top 5 pools hold '+fmt(top5Liqb)+' of '+fmt(risk.totalLiq)+' total liquidity ('+top5Pctb+'%). Some pools show attention signals, but the main pools have good liquidity available for selling.';
    clientLabel='Attention · Direct client to the right pool'; clientColor='#7F77DD';
    clientText='The sell can be executed in the high-liquidity pools. Check if the client is trying to sell in a problematic pool and direct them to the main pools.';
  }
  else if(rugCount>0&&hasGoodPools&&risk.totalLiq>=100000){
    var goodDesc3=risk.recommendedPools.slice(0,3).map(function(ps){return ps.dex+' ('+fmt(ps.liq)+')';}).join(', ');
    conclusionText=rugCount+' pool'+(rugCount>1?'s':'')+' with zero liquidity, but the token has '+fmt(risk.totalLiq)+' in total liquidity across '+risk.activeCount+' active pools. Selling is viable in the available pools: '+goodDesc3+'.';
    clientLabel='Attention · Zero-liquidity pools detected'; clientColor='#7F77DD';
    clientText='Inform the client that some pools have no liquidity, but active pools are available for selling. Check which pool the client is using and guide them accordingly.';
  }
  else if(rugCount>0&&!hasGoodPools){
    conclusionText=rugCount+' of '+total+' pools have zero liquidity. The remaining pools have insufficient liquidity — the sell may not be executable without significant value loss.';
    clientLabel='Do not confirm the sale'; clientColor='#E24B4A';
    clientText='Inform the client that the zero-liquidity pools are inoperable and the remaining pools have insufficient liquidity. Sale is not recommended under current conditions.';
  }
  else if(flags.indexOf('PUMP_DUMP')>=0){
    conclusionText='Consistent pump & dump pattern: severe price drop combined with near-zero volume. The token has lost most of its value since launch.';
    clientLabel='High Risk · Inform client about actual value'; clientColor='#E24B4A';
    clientText='Inform the client that the token shows a pump & dump pattern. Selling may be attempted, but the value obtained will likely be far below what is displayed in the wallet. The client should be aware of this before proceeding.';
  }
  else if(flags.indexOf('ABANDONED')>=0){
    conclusionText='Token '+Math.floor(ageDays(risk.pairStatuses[0]&&risk.pairStatuses[0].ctx&&risk.pairStatuses[0].ctx.oldestPairCreatedAt))+' days old with near-zero activity. Liquidity is present and selling is technically possible, but market demand is almost nonexistent — project appears abandoned.';
    clientLabel='Moderate Risk · Project appears abandoned'; clientColor='#E8A838';
    clientText='Inform the client that the token has liquidity but shows signs of abandonment. Selling can be attempted, but the value obtained may be lower than expected due to extremely low demand.';
  }
  else if(flags.indexOf('STAGNANT')>=0){
    conclusionText='Token with a long history but very low activity for its age. Liquidity is present and selling is technically possible, but active market demand is low. May indicate a project that stalled or lost community interest.';
    clientLabel='Moderate Risk · Low activity token'; clientColor='#E8A838';
    clientText='Inform the client that the token has liquidity available for selling, but shows very low activity. The transaction can be executed, but the price received may differ significantly from the wallet display due to low market depth.';
  }
  else if(flags.indexOf('DEAD')>=0&&flags.indexOf('SPREAD')>=0){
    conclusionText='Nearly inactive token with an unbalanced pool — very little SOL available as counterpart. Any sell attempt will likely fail or result in immediate price collapse.';
    clientLabel='High Risk · Sale unlikely without severe loss'; clientColor='#EF9F27';
    clientText='Inform the client that the token has extremely low volume and the pool does not have enough SOL to absorb the sell. The value obtained may be a tiny fraction of what is displayed in the wallet.';
  }
  else if(flags.indexOf('DEAD')>=0){
    conclusionText='Token with negligible volume and very few transactions for its age. Pool is commercially inactive — there is liquidity, but market interest is nearly nonexistent.';
    clientLabel='Attention · Inform client about low liquidity'; clientColor='#EF9F27';
    clientText='Inform the client that the token has little market activity. Selling can be attempted, but the value obtained may be lower than expected due to low available liquidity.';
  }
  else if(flags.indexOf('DUMP')>=0&&flags.indexOf('PUMP_DUMP')<0){
    conclusionText='A drop of over 90% in the last 24h indicates a possible dump in progress. The value shown in the wallet may differ significantly from what the client can actually recover.';
    clientLabel='High Risk · Do not confirm redemption value'; clientColor='#E24B4A';
    clientText='Inform the client that the token is in steep decline. Do not confirm any value estimate — the execution price may be significantly lower than the current displayed price.';
  }
  else if(flags.indexOf('MAKERS')>=0&&flags.indexOf('VOL')>=0){
    conclusionText='Disproportionate volume generated by a very small number of unique traders. Consistent with wash trading — artificial transactions between wallets controlled by the same operator.';
    clientLabel='Attention · Possible wash trading'; clientColor='#EF9F27';
    clientText='Inform the client that the token\'s activity may be artificial. The displayed volume does not reflect real market interest, which may make it difficult to execute a sell at a fair price.';
  }
  else if(flags.indexOf('VOL_MOD')>=0){
    conclusionText='Volume is elevated relative to available liquidity. May indicate intense speculative interest or artificial activity. Selling is possible but the price may be unstable.';
    clientLabel='Moderate Risk · Elevated volume'; clientColor='#E8A838';
    clientText='Inform the client that the token has elevated volume relative to its liquidity. The sell can be executed, but the price is subject to significant variation. Do not confirm a specific redemption value.';
  }
  else if(flags.indexOf('VOL_LOW')>=0){
    conclusionText='Volume is relatively high relative to liquidity. Monitor price stability before advising the client on expected sell value.';
    clientLabel='Attention · High volume relative to liquidity'; clientColor='#7F77DD';
    clientText='Let the client know that volume is above what is expected for the available liquidity. The sell is likely possible, but the price obtained may differ from the wallet display.';
  }
  else if(flags.indexOf('LOW_ACTIVITY')>=0){
    conclusionText='Activity is below expected for the token\'s age. The project has been around for some time but shows low volume relative to its liquidity — may indicate loss of community interest.';
    clientLabel='Attention · Low activity for token age'; clientColor='#7F77DD';
    clientText='Inform the client that the token has low market activity for its age. Selling is technically possible, but the market has low depth — the value obtained may differ from the wallet display.';
  }
  else if(flags.indexOf('AGE_HI')>=0&&flags.indexOf('PUMP')>=0){
    conclusionText='Token created less than 24 hours ago with nearly 100% of transactions being buys. Typical pattern of an artificial pump on a newly launched token — high risk of sudden drop.';
    clientLabel='High Risk · Brand new token in pump'; clientColor='#EF9F27';
    clientText='Inform the client that the token is less than 24h old and shows signs of artificial pumping. There is insufficient history and the risk of total loss is high.';
  }
  else if(risk.score>=75){
    conclusionText='Multiple critical risk signals detected. The combination of factors indicates high potential for client loss.';
    clientLabel='Critical Risk · Do not confirm the sale'; clientColor='#E24B4A';
    clientText='Do not confirm any sell estimate or value. Manually verify the pools before advising the client. If viability cannot be confirmed, inform them of the risks and leave the decision with them.';
  }
  else if(risk.score>=46){
    conclusionText='High risk signals detected. Selling may be possible, but with risk of significant value loss.';
    clientLabel='High Risk · Proceed with caution'; clientColor='#EF9F27';
    clientText='Advise the client of the risks before proceeding. Selling can be attempted, but the value obtained may be lower than expected. Do not guarantee the outcome.';
  }
  else if(risk.score>=21){
    conclusionText='Some attention points detected, with no confirmed critical signals. The token appears tradeable but with caveats.';
    clientLabel='Attention · Inform client of detected points'; clientColor='#7F77DD';
    clientText='Inform the client of the attention points and proceed normally if they confirm they wish to sell.';
  }
  else {
    conclusionText='No fraud or elevated risk pattern identified. The token appears tradeable under current conditions.';
    clientLabel='No apparent risk · Proceed normally'; clientColor='#1D9E75';
    clientText='Automated checks indicate no fraud. Proceed normally with client support.';
  }

  // ── Suggested approach block for high-severity scenarios
  var suggestedHtml='';
  var showSuggested = rugCount===total || risk.score>=80 || flags.indexOf('PUMP_DUMP')>=0;
  var isAllRug = rugCount===total;
  var isCritical = risk.score>=80;

  var dexTipHtml='<span class="tip" data-tip="A decentralized exchange (DEX) is a platform where anyone trades directly on the blockchain — OKX does not control or guarantee these transactions.">ⓘ</span>';

  if(showSuggested){
    if(isAllRug){
      suggestedHtml='<div class="suggested-approach">'
        +'<div class="suggested-approach-title">Suggested approach with client</div>'
        +'<div class="suggested-approach-text">'
        +'"We have reviewed the token you mentioned. Unfortunately, the liquidity from this token\'s pools has been removed, which means it is currently not possible to sell or trade it on any decentralized exchange.'
        +'<br><br>It\'s important to note that this token trades on decentralized exchanges (DEXs) '+dexTipHtml+', which operate independently from OKX on the blockchain. OKX does not process or control transactions on decentralized platforms and is not able to intervene, reverse, or recover funds affected by liquidity removal.'
        +'<br><br>We understand this is a difficult situation. If you have further questions, we\'re here to help."'
        +'</div>'
        +'<div class="suggested-approach-note">⚠ Adapt tone as needed. Do not state it is definitively a fraud unless the client asks directly — say the liquidity was removed and selling is not currently possible.</div>'
        +'</div>';
    } else if(isCritical){
      suggestedHtml='<div class="suggested-approach">'
        +'<div class="suggested-approach-title">Suggested approach with client</div>'
        +'<div class="suggested-approach-text">'
        +'"We have reviewed the token you mentioned and identified several high-risk signals, including very low liquidity and unusual trading patterns. At this time, we are not able to confirm a safe or predictable outcome for a sell.'
        +'<br><br>Please be aware that this token trades on decentralized exchanges (DEXs) '+dexTipHtml+', which operate independently from OKX. OKX does not control or guarantee transactions on decentralized platforms.'
        +'<br><br>We strongly recommend verifying the token\'s current status on Solscan before attempting any transaction. If you choose to proceed, please be aware of the significant risk of loss."'
        +'</div>'
        +'<div class="suggested-approach-note">⚠ Do not confirm any specific sell value. Leave the final decision with the client.</div>'
        +'</div>';
    } else {
      suggestedHtml='<div class="suggested-approach">'
        +'<div class="suggested-approach-title">Suggested approach with client</div>'
        +'<div class="suggested-approach-text">'
        +'"We have reviewed this token and identified a pump & dump pattern — the price rose sharply and has since dropped significantly, with very little trading activity remaining. The value shown in your wallet may not reflect what you would actually receive if you sell.'
        +'<br><br>This token trades on decentralized exchanges (DEXs) '+dexTipHtml+', which are independent from OKX. We are not able to control or guarantee outcomes for trades on decentralized platforms.'
        +'<br><br>If you choose to sell, please be fully aware of the risk of receiving significantly less than the displayed value."'
        +'</div>'
        +'<div class="suggested-approach-note">⚠ Do not guarantee any outcome. Inform the client factually and let them decide.</div>'
        +'</div>';
    }
  }

  // ─── AGENT DECISION FLOW ───
  var hasActivePools = risk.activeCount > 0 && risk.recommendedPools.length > 0;
  var decisionFlow = '<div style="margin-top:12px;padding:12px 14px;border-radius:8px;background:#060a10;border:0.5px solid #1e2530">'
    +'<div style="font-size:10px;color:#444;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px">Agent decision flow</div>'
    +'<div style="display:flex;flex-direction:column;gap:8px">'

    // Step 1: Active pools?
    +'<div style="display:flex;gap:10px;align-items:flex-start">'
    +'<div style="width:20px;height:20px;border-radius:50%;background:'+(hasActivePools?'#1D9E75':'#E24B4A')+'22;border:0.5px solid '+(hasActivePools?'#1D9E75':'#E24B4A')+';color:'+(hasActivePools?'#1D9E75':'#E24B4A')+';font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">1</div>'
    +'<div><div style="font-size:11px;font-weight:600;color:#e0e0e0;margin-bottom:2px">Is there at least one active pool?'
    +'<span style="margin-left:6px;font-size:10px;font-weight:700;color:'+(hasActivePools?'#1D9E75':'#E24B4A')+'">'+(hasActivePools?'✓ YES — '+risk.activeCount+' pool'+(risk.activeCount>1?'s':'')+' active':'✗ NO — all pools have zero liquidity')+'</span>'
    +'</div>'
    +'<div style="font-size:11px;color:#555;line-height:1.6">'
    +(hasActivePools
      ? 'Inform the client that external options may exist, but the value received may be significantly lower than displayed. <strong style="color:#888">Do not indicate any specific pool.</strong>'
      : 'Inform the client that there is no available liquidity at this time. The token exists on the blockchain but cannot be traded on any DEX.')
    +'</div></div></div>'

    // Step 2: Confirm value?
    +'<div style="display:flex;gap:10px;align-items:flex-start">'
    +'<div style="width:20px;height:20px;border-radius:50%;background:#E24B4A22;border:0.5px solid #E24B4A;color:#E24B4A;font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">2</div>'
    +'<div><div style="font-size:11px;font-weight:600;color:#e0e0e0;margin-bottom:2px">Confirm value or guarantee outcome?'
    +'<span style="margin-left:6px;font-size:10px;font-weight:700;color:#E24B4A">✗ NEVER — in either case</span>'
    +'</div>'
    +'<div style="font-size:11px;color:#555;line-height:1.6">Do not confirm any specific sell value. Do not guarantee execution. The decision to proceed belongs to the client.</div>'
    +'</div></div>'

    // Step 3: Close
    +'<div style="display:flex;gap:10px;align-items:flex-start">'
    +'<div style="width:20px;height:20px;border-radius:50%;background:#7F77DD22;border:0.5px solid #7F77DD;color:#7F77DD;font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">3</div>'
    +'<div><div style="font-size:11px;font-weight:600;color:#e0e0e0;margin-bottom:2px">After informing the client</div>'
    +'<div style="font-size:11px;color:#555;line-height:1.6">Copy diagnosis to internal note → close the ticket. No escalation required unless your team has a specific fraud reporting process.</div>'
    +'</div></div>'

    +'</div></div>';

  return '<div class="conclusion-inline">'
    +'<div class="conclusion-inline-title">Conclusion</div>'
    +'<div class="conclusion-inline-text">'+conclusionText+'</div>'
    +recommendedHtml
    +'<div class="conclusion-inline-client">'
    +'<div class="conclusion-inline-client-label" style="color:'+clientColor+'">'+clientLabel+'</div>'
    +'<div class="conclusion-inline-client-text" style="color:'+clientColor+'cc">'+clientText+'</div>'
    +'</div>'
    +suggestedHtml
    +decisionFlow
    +'</div>';
}

function renderConsolidatedCard(risk,tokenAddr,tokenName,tokenSym,dexUrl){
  var color=risk.level.color;
  var critFlags=risk.allFlags.filter(function(k){return k!=='LIQ_SEC';});
  var critHtml=critFlags.length>0
    ?critFlags.map(function(key){
        var fs=FLAG_STYLE[key]||FLAG_STYLE.OK;
        var poolIdx=0;
        for(var pi=0;pi<risk.pairStatuses.length;pi++){
          if(risk.pairStatuses[pi].flags.some(function(f){return f.key===key;})){poolIdx=pi;break;}
        }
        return '<div class="critical-point" style="background:'+fs.bg+';border-color:'+fs.border+';cursor:pointer" onclick="switchTab('+poolIdx+')" title="View in Pool '+(poolIdx+1)+'">'
          +'<div class="critical-point-dot" style="background:'+fs.color+'"></div>'
          +'<span style="color:'+fs.color+'">'+(FLAG_SHORT[key]||key)+'</span></div>';
      }).join('')
    :'';

  var VISIBLE=5;
  var poolRowHtml=function(ps,i){
    var isZeroLiq=ps.level.level==='FRAUD';
    return '<div class="pool-status-row">'
      +'<div class="pool-dot" style="background:'+ps.level.color+'"></div>'
      +'<span style="color:#888;cursor:pointer;text-decoration:underline;text-decoration-color:#333" onclick="switchTab('+i+')" title="View pool analysis">Pool '+(i+1)+' · '+ps.dex+'</span>'
      +'<a class="pool-row-link" href="https://solscan.io/account/'+ps.pairAddr+'" target="_blank">'+shortAddr(ps.pairAddr)+' ↗</a>'
      +(isZeroLiq?'<span style="font-size:10px;color:#E24B4A;background:#E24B4A11;border:0.5px solid #E24B4A33;border-radius:4px;padding:2px 6px;flex-shrink:0">⚠ Zero Liquidity</span>':'')
      +(ps.isSecondary&&!isZeroLiq?'<span class="context-note">Secondary</span>':'')
      +'<span style="color:'+ps.level.color+';margin-left:auto">'+fmt(ps.liq)+' · '+ps.level.label+'</span>'
      +'</div>';
  };

  var visiblePools=risk.pairStatuses.slice(0,VISIBLE);
  var extraPools=risk.pairStatuses.slice(VISIBLE);
  var poolRows='<div class="pool-status-list">'+visiblePools.map(poolRowHtml).join('');
  if(extraPools.length>0){
    poolRows+='<div class="pool-rows-extra" id="poolRowsExtra">'+extraPools.map(function(ps,i){return poolRowHtml(ps,i+VISIBLE);}).join('')+'</div>'
      +'<button class="expand-pools-btn" id="expandPoolsBtn" onclick="toggleExtraPools()">↓ Show '+extraPools.length+' more secondary pool'+(extraPools.length>1?'s':'')+'</button>';
  }
  poolRows+='</div>';

  return '<div class="consolidated-card" style="background:'+color+'0d;border-color:'+color+'55">'
    +'<div class="consolidated-top"><div class="consolidated-left">'
    +'<div class="consolidated-meta" style="color:'+color+'">Consolidated Diagnosis · '+risk.totalPairs+' pool'+(risk.totalPairs>1?'s found':' found')+'</div>'
    +'<div class="consolidated-title" style="color:'+color+'">'+risk.label+'</div>'
    +'</div>'+riskBadge(risk.level,true)+'</div>'
    +'<div class="consolidated-stats">'
    +'<div><div class="consolidated-stat-label">Total liquidity</div><div class="consolidated-stat-value" style="color:'+color+'">'+fmt(risk.totalLiq)+'</div></div>'
    +'<div><div class="consolidated-stat-label">Pools analyzed</div><div class="consolidated-stat-value">'+risk.totalPairs+'</div></div>'
    +(risk.rugCount>0?'<div><div class="consolidated-stat-label">Pools with rug</div><div class="consolidated-stat-value" style="color:#E24B4A">'+risk.rugCount+'</div></div>':'')
    +(risk.recommendedPools.length>0?'<div><div class="consolidated-stat-label">Recommended pools</div><div class="consolidated-stat-value" style="color:#1D9E75">'+risk.recommendedPools.length+'</div></div>':'')
    +'</div>'
    +(critHtml?'<div style="font-size:10px;color:#444;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px">Critical points detected</div><div class="critical-points">'+critHtml+'</div>':'')
    +poolRows
    +buildConclusion(risk)
    +'<div class="token-strip">'
    +'<div><div class="token-strip-name">'+tokenName+' · '+tokenSym+'</div><div class="token-strip-addr">'+tokenAddr+'</div></div>'
    +'<div class="token-strip-links">'
    +'<a class="token-strip-link" href="https://solscan.io/token/'+tokenAddr+'" target="_blank">Solscan ↗</a>'
    +'<a class="token-strip-link" href="'+(dexUrl||'#')+'" target="_blank">DexScreener ↗</a>'
    +'<a class="token-strip-link" href="https://web3.okx.com/en/token/solana/'+tokenAddr+'" target="_blank">OKX Web3 ↗</a>'
    +'</div></div>'
    +'<button class="concl-copy-btn" id="conclusionCopyBtn" onclick="copyConclusionNote()">Copy diagnosis to internal note</button>'
    +'</div>';
}

function tabClass(lv){
  if(lv==='FRAUD') return 'tab-rug';
  if(lv==='CRIT')  return 'tab-crit';
  if(lv==='HIGH')  return 'tab-high';
  if(lv==='MOD')   return 'tab-mod';
  if(lv==='MED')   return 'tab-med';
  return '';
}

function renderPairTabs(pairs,risk,tokenAddr,fdv,mkt){
  var tabs='',contents='';
  pairs.forEach(function(p,i){
    var ps=risk.pairStatuses[i];
    tabs+='<div class="pair-tab '+tabClass(ps.level.level)+(i===0?' active':'')+'" onclick="switchTab('+i+')" id="tab-btn-'+i+'">'
      +'<div class="pair-tab-dot" style="background:'+ps.level.color+'"></div>'
      +'Pool '+(i+1)+' · '+(p.dexId||'—')+(ps.isSecondary?' <span style="font-size:9px;color:#378ADD">·sec</span>':'')
      +'</div>';
    contents+='<div class="pair-tab-content'+(i===0?' active':'')+'" id="tab-content-'+i+'">'+renderPairContent(p,ps.flags,ps.level,ps.score,tokenAddr,i,fdv,mkt,ps.isSecondary,risk)+'</div>';
  });
  return '<div class="pair-tabs-wrap"><div class="pair-tabs-header">'+tabs+'</div>'+contents+'</div>';
}

function switchTab(idx){
  document.querySelectorAll('.pair-tab').forEach(function(t){t.classList.remove('active');});
  document.querySelectorAll('.pair-tab-content').forEach(function(t){t.classList.remove('active');});
  var btn=document.getElementById('tab-btn-'+idx);
  var content=document.getElementById('tab-content-'+idx);
  if(btn) btn.classList.add('active');
  if(content) content.classList.add('active');
  var tabsEl=document.querySelector('.pair-tabs-wrap');
  if(tabsEl) tabsEl.scrollIntoView({behavior:'smooth',block:'start'});
}

function renderPairContent(p,flags,lv,score,tokenAddr,idx,fdv,mkt,isSecondary,risk){
  var liq=(p.liquidity&&p.liquidity.usd)||0;
  var vol=(p.volume&&p.volume.h24)||0;
  var buys=(p.txns&&p.txns.h24&&p.txns.h24.buys)||0;
  var sells=(p.txns&&p.txns.h24&&p.txns.h24.sells)||0;
  var liqQ=(p.liquidity&&p.liquidity.quote)||0;
  var liqB=(p.liquidity&&p.liquidity.base)||0;
  var sym=(p.baseToken&&p.baseToken.symbol)||'—';
  var name=(p.baseToken&&p.baseToken.name)||'—';
  var pc=p.priceChange||{};
  var total=buys+sells,buyPct=total>0?Math.round((buys/total)*100):0;
  var age=ageDays(p.pairCreatedAt);
  var ageAlert=age<1?'alert-red':age<7?'alert-yellow':'';
  var liqColor=liq<5?'#E24B4A':liq<5000?'#EF9F27':'#1D9E75';
  var liqBarW=Math.min(100,(liq/100000)*100);
  var time=analysisTime?analysisTime.toLocaleString('en-US'):'';
  var isRug=lv.level==='FRAUD';
  var pairAddr=p.pairAddress||'';
  var html='';

  if(isSecondary){
    html+='<div class="secondary-pool-notice">ℹ This is a <strong>secondary pool</strong> of a token with '+fmt(risk.totalLiq)+' in total liquidity. Attention signals in this pool are expected for smaller pools — the token has main pools with significant liquidity.</div>';
  }

  html+='<div class="diag-box" style="border:1.5px solid '+lv.color+';box-shadow:0 0 20px '+lv.color+'33">'
    +'<div class="diag-header"><div>'
    +'<div class="diag-label">Pool '+(idx+1)+' · '+(p.dexId||'—')+' · '+time+'</div>'
    +'<div class="diag-title" style="color:'+lv.color+'">'+lv.label+'</div>'
    +'<div class="diag-sub">'+name+' · '+sym+(isSecondary?' · Secondary pool':' · Main pool')+'</div>'
    +'</div>'
    +'<div class="pool-risk-badge" style="color:'+lv.color+';border-color:'+lv.color+'44;background:'+lv.color+'11">'+lv.label+'</div>'
    +'</div>'
    +'<div class="flags">'+renderFlags(flags)+'</div>'
    +'<div class="diag-footer">'
    +'<div class="data-ts">Data fetched at '+time+'</div>'
    +'<div style="display:flex;gap:8px">'
    +'<button class="reanalyze-btn" onclick="reanalyze()">↻ Re-analyze</button>'
    +'<button class="copy-btn" id="copyBtn-'+idx+'" onclick="copyResume('+idx+')">Copy to internal note</button>'
    +'</div></div></div>';

  html+='<div class="card"><div class="card-title">Liquidity (Pool '+(idx+1)+')</div>'
    +'<div class="grid3">'
    +'<div class="stat'+(isRug?' alert-red':'')+'"><div class="stat-label">Total (USD)</div><div class="liq-big" style="color:'+liqColor+'">'+fmt(liq)+'</div><div class="bar-wrap"><div class="bar-fill" style="width:'+liqBarW+'%;background:'+liqColor+'"></div></div></div>'
    +'<div class="stat"><div class="stat-label">Pooled SOL</div><div class="stat-value">'+Number(liqQ).toFixed(4)+' SOL</div></div>'
    +'<div class="stat"><div class="stat-label">Pooled '+sym+'</div><div class="stat-value">'+Number(liqB).toLocaleString()+'</div></div>'
    +'</div>'
    +'<div class="liq-disclaimer">⚠ Value provided by DexScreener — may have delay. <a href="https://solscan.io/account/'+pairAddr+'" target="_blank">Verify on Solscan ↗</a></div>';

  if(isRug&&pairAddr){
    html+='<div class="rug-confirm-hint"><strong>Extremely low liquidity — possible rug pull.</strong> To confirm:<ol>'
      +'<li><a class="rug-confirm-link" href="https://solscan.io/account/'+pairAddr+'#defiactivities" target="_blank">Open this pool\'s transactions on Solscan ↗</a></li>'
      +'<li>Click <strong>Action</strong> and filter by <strong>Remove Liquidity</strong></li>'
      +'<li>No transaction → liquidity still present (low, but not removed)</li>'
      +'<li>Transaction found → liquidity removed, rug pull confirmed</li>'
      +'</ol></div>';
  }
  html+='</div>';

  html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">'
    +'<div class="card" style="margin-bottom:0"><div class="card-title">Volume & Transactions (24h)</div>'
    +'<div class="grid2">'
    +statCard('Volume',fmt(vol))+statCard('Transactions',(buys+sells).toLocaleString())
    +statCard('Buys',buys.toLocaleString(),'#1D9E75')+statCard('Sells',sells.toLocaleString(),'#E24B4A')
    +'</div>'
    +'<div class="buysell-wrap"><div class="buysell-labels"><span style="color:#1D9E75">Buys '+buyPct+'%</span><span style="color:#E24B4A">Sells '+(100-buyPct)+'%</span></div><div class="buysell-bar"><div class="buysell-fill" style="width:'+buyPct+'%"></div></div></div>'
    +'</div>'
    +'<div class="card" style="margin-bottom:0"><div class="card-title">Price & Change</div>'
    +'<div style="font-size:18px;font-weight:500;color:#e0e0e0;margin-bottom:10px">$'+(p.priceUsd||'0')+'</div>'
    +'<div class="grid2">'+statCard('5m',pct(pc.m5),pctColor(pc.m5))+statCard('1h',pct(pc.h1),pctColor(pc.h1))+statCard('6h',pct(pc.h6),pctColor(pc.h6))+statCard('24h',pct(pc.h24),pctColor(pc.h24))+'</div>'
    +'</div></div>';

  html+='<div class="card"><div class="card-title">Supply Out of Circulation</div>'+renderSupply(fdv,mkt)+'</div>';

  var fdvLabel='FDV <span class="tip" data-tip="Fully Diluted Valuation — theoretical total market cap if 100% of supply were circulating. Very high FDV vs low liquidity means the value exists mainly on paper.">ⓘ</span>';
  var dexLabel='DEX <span class="tip" data-tip="Decentralized Exchange — platform where anyone trades directly on-chain. OKX does not control or guarantee transactions on DEXs.">ⓘ</span>';

  html+='<div class="card"><div class="card-title">Market Cap</div><div class="grid4">'
    +statCard('Market Cap',fmt(mkt))+statCard(fdvLabel,fmt(fdv))
    +statCard('Pair created',timeAgo(p.pairCreatedAt),age<1?'#E24B4A':age<7?'#EF9F27':'#e0e0e0',ageAlert)
    +statCard(dexLabel,p.dexId||'—')
    +'</div>'
    +(fdv>0&&mkt>0&&Math.abs(fdv-mkt)/fdv<0.01?'<div style="margin-top:8px;font-size:11px;color:#7F77DD;background:#10102a;border:0.5px solid #303070;border-radius:6px;padding:6px 10px">FDV = Market Cap — 100% of supply has been circulating since launch</div>':'')
    +'</div>';

  return html;
}

function copyConclusionNote(){
  if(!currentToken) return;
  var risk=currentToken.risk;
  var lines=[
    '=== Token Risk Analyzer v1.0 ===',
    'Token: '+currentToken.name+' ('+currentToken.symbol+')',
    'Contract: '+currentToken.address,
    'Analyzed at: '+(analysisTime?analysisTime.toLocaleString('en-US'):''),
    'Diagnosis: '+risk.label,
    'Total liquidity: '+fmt(risk.totalLiq),
    'Pools: '+risk.totalPairs+(risk.rugCount>0?' · '+risk.rugCount+' with zero liquidity':''),
    (risk.recommendedPools.length>0?'Recommended pools: '+risk.recommendedPools.map(function(ps){return ps.dex+' ('+fmt(ps.liq)+')';}).join(', '):''),
    'Critical points: '+(risk.allFlags.filter(function(k){return k!=='LIQ_SEC';}).map(function(k){return FLAG_SHORT[k]||k;}).join(', ')||'None'),
  ];
  risk.pairStatuses.forEach(function(ps,i){
    lines.push('Pool '+(i+1)+' ('+ps.dex+'): '+fmt(ps.liq)+' · '+ps.level.label+(ps.isSecondary?' [secondary]':''));
  });
  navigator.clipboard.writeText(lines.filter(Boolean).join('\n')).then(function(){
    var btn=document.getElementById('conclusionCopyBtn');
    if(btn){btn.textContent='✓ Copied!';btn.classList.add('copied');setTimeout(function(){btn.textContent='Copy diagnosis to internal note';btn.classList.remove('copied');},2500);}
  });
}

function copyResume(idx){
  var p=allPairsData[idx];if(!p) return;
  var liq=(p.liquidity&&p.liquidity.usd)||0,vol=(p.volume&&p.volume.h24)||0;
  var mkt=p.marketCap||0,fdv=p.fdv||0;
  var sym=(p.baseToken&&p.baseToken.symbol)||'—',name=(p.baseToken&&p.baseToken.name)||'—';
  var addr=(p.baseToken&&p.baseToken.address)||currentAddress;
  var risk=getConsolidatedRisk(allPairsData);
  var ps=risk.pairStatuses[idx];
  var flagText=(ps&&ps.flags||[]).map(function(f){return '• ['+f.key+'] '+f.agent;}).join('\n');
  var text=[
    '=== Token Risk Analyzer v1.0 ===',
    'Analyzed at: '+(analysisTime?analysisTime.toLocaleString('en-US'):''),
    'Token: '+name+' ('+sym+')','Contract: '+addr,'',
    '-- CONSOLIDATED VIEW --',
    'Diagnosis: '+risk.label,'Total liquidity: '+fmt(risk.totalLiq),
    'Critical points: '+(risk.allFlags.filter(function(k){return k!=='LIQ_SEC';}).map(function(k){return FLAG_SHORT[k]||k;}).join(', ')||'None'),
    '','-- POOL '+(idx+1)+' · '+(p.dexId||'—')+(ps&&ps.isSecondary?' (secondary pool)':'')+' --',
    'Diagnosis: '+(ps?ps.level.label:'—'),
    'Liquidity: '+fmt(liq),'24h Volume: '+fmt(vol),
    'Market Cap: '+fmt(mkt),'FDV: '+fmt(fdv),'Price: $'+(p.priceUsd||'0'),'',
    'Flags:',flagText,'==============================='
  ].join('\n');
  navigator.clipboard.writeText(text).then(function(){
    var btn=document.getElementById('copyBtn-'+idx);
    if(btn){btn.textContent='✓ Copied!';btn.classList.add('copied');setTimeout(function(){btn.textContent='Copy to internal note';btn.classList.remove('copied');},2500);}
  });
}

function renderNotFound(addr){
  document.getElementById('result').innerHTML='<div class="not-found-box">'
    +'<div class="not-found-title">⚠ Token not found on DexScreener</div>'
    +'<div class="not-found-msg">This token has no active pairs on any known decentralized exchange. This may indicate that liquidity was removed or the token has not been listed yet.</div>'
    +'<div class="steps-box"><div class="steps-title">What to do next</div>'
    +'<div class="step"><div class="step-num">1</div><div><div class="step-title">Confirm the address with the client</div><div class="step-desc">A valid Solana address is between 32 and 44 alphanumeric characters.</div></div></div>'
    +'<div class="step"><div class="step-num">2</div><div><div class="step-title">Check on OKX Web3</div><div class="step-desc">The token may exist on the blockchain but without active pairs.</div></div></div>'
    +'<div class="step"><div class="step-num">3</div><div><div class="step-title">Check on Solscan</div><div class="step-desc">Go to DeFi Activities, click Action and filter by Remove Liquidity. If a transaction exists, liquidity was removed.</div></div></div>'
    +'<div class="step"><div class="step-num">4</div><div><div class="step-title">Advise the client</div><div class="step-desc">If confirmed that there is no liquidity, inform the client that selling is not currently possible. This is not a platform limitation — it is the current state of the token on the blockchain.</div></div></div>'
    +'</div>'
    +'<div class="not-found-links">'
    +'<a class="nf-btn" href="https://web3.okx.com/en/token/solana/'+addr+'" target="_blank" style="border-color:#EF9F27;color:#EF9F27;background:#EF9F2711">Check on OKX Web3 ↗</a>'
    +'<a class="nf-btn" href="https://solscan.io/token/'+addr+'" target="_blank" style="border-color:#1e2530;color:#666;background:#060a10">Check on Solscan ↗</a>'
    +'</div></div>';
}

function renderAllPairs(pairs,addr){
  allPairsData=pairs;
  var sym=(pairs[0].baseToken&&pairs[0].baseToken.symbol)||'—';
  var name=(pairs[0].baseToken&&pairs[0].baseToken.name)||'—';
  var tokenAddr=(pairs[0].baseToken&&pairs[0].baseToken.address)||addr;
  var fdv=pairs[0].fdv||0,mkt=pairs[0].marketCap||0;
  var dexUrl=pairs[0].url||'#';
  addToHistory(tokenAddr,name,sym);
  var risk=getConsolidatedRisk(pairs);
  document.getElementById('result').innerHTML=renderConsolidatedCard(risk,tokenAddr,name,sym,dexUrl)+renderPairTabs(pairs,risk,tokenAddr,fdv,mkt);
  currentToken={name:name,symbol:sym,address:tokenAddr,risk:risk};
}

function toggleExtraPools(){
  var el=document.getElementById('poolRowsExtra');
  var btn=document.getElementById('expandPoolsBtn');
  if(!el||!btn) return;
  var expanded=el.classList.toggle('expanded');
  var extra=allPairsData.length-5;
  btn.textContent=expanded?'↑ Hide secondary pools':'↓ Show '+extra+' more secondary pool'+(extra>1?'s':'');
}

function renderKnownToken(addr,token){
  var c=token.color;
  document.getElementById('result').innerHTML='<div class="known-token-card" style="background:'+c+'0d;border-color:'+c+'55">'
    +'<div class="known-token-badge" style="color:'+c+';border-color:'+c+'44;background:'+c+'11">✓ Official Token · '+token.category+'</div>'
    +'<div class="known-token-name" style="color:'+c+'">'+token.name+'</div>'
    +'<div class="known-token-issuer">Issued by '+token.issuer+'</div>'
    +'<div class="known-token-note">'+token.note+'</div>'
    +'<div class="known-token-addr">Contract address: '+addr+'</div>'
    +'<div class="known-token-links">'
    +'<a class="token-strip-link" href="https://solscan.io/token/'+addr+'" target="_blank" style="padding:7px 14px;border-radius:8px;border:0.5px solid #1e2530;color:#666;background:#060a10;font-size:12px">Solscan ↗</a>'
    +'<a class="token-strip-link" href="https://web3.okx.com/en/token/solana/'+addr+'" target="_blank" style="padding:7px 14px;border-radius:8px;border:0.5px solid '+c+'44;color:'+c+';background:'+c+'11;font-size:12px">OKX Web3 ↗</a>'
    +'</div>'
    +'</div>';
}

function toggleGlossary(){
  var body=document.getElementById('glossaryBody');
  var arrow=document.getElementById('glossaryArrow');
  var open=body.classList.toggle('open');
  arrow.textContent=open?'↑':'↓';
  if(open&&!body.innerHTML){
    body.innerHTML=GLOSSARY.map(function(g){
      return '<div class="glossary-item"><div class="glossary-term">'+g.term+'</div><div class="glossary-def">'+g.def+'</div></div>';
    }).join('');
  }
}

function reanalyze(){if(currentAddress){document.getElementById('addressInput').value=currentAddress;analyze();}}

function analyze(){
  var q=document.getElementById('addressInput').value.trim();
  var errEl=document.getElementById('inputError'),inputEl=document.getElementById('addressInput');
  errEl.style.display='none';inputEl.classList.remove('error');
  if(!q) return;
  if(!isValidSolanaAddress(q)){
    errEl.textContent='Invalid address. A valid Solana address is between 32 and 44 alphanumeric characters.';
    errEl.style.display='block';inputEl.classList.add('error');return;
  }
  currentAddress=q;
  var btn=document.getElementById('analyzeBtn');
  btn.disabled=true;btn.textContent='Analyzing...';
  currentToken=null;allPairsData=[];

  // Check whitelist before hitting the API
  if(KNOWN_TOKENS[q]){
    renderKnownToken(q,KNOWN_TOKENS[q]);
    btn.disabled=false;btn.textContent='Analyze →';
    return;
  }

  document.getElementById('result').innerHTML='<div class="loading"><div class="spinner"></div>Fetching blockchain data...</div>';
  fetch(PROXY_BASE+'/api/proxy?address='+q)
    .then(function(r){if(!r.ok) throw new Error('HTTP '+r.status);return r.json();})
    .then(function(data){
      var pairs=Array.isArray(data)?data:[];
      if(pairs.length===0){renderNotFound(q);return;}
      pairs.sort(function(a,b){return((b.liquidity&&b.liquidity.usd)||0)-((a.liquidity&&a.liquidity.usd)||0);});
      analysisTime=new Date();
      renderAllPairs(pairs,q);
    })
    .catch(function(e){
      document.getElementById('result').innerHTML='<div class="error-box"><div class="error-title">Error fetching data</div><div class="error-msg">'+e.message+'</div></div>';
    })
    .finally(function(){btn.disabled=false;btn.textContent='Analyze →';});
}

document.getElementById('addressInput').addEventListener('keydown',function(e){if(e.key==='Enter') analyze();});
</script>
